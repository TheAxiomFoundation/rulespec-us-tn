format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-06/page-3
  summary: |-
    Participants in drug or alcohol treatment rehabilitation programs, either on a residential or outpatient basis, are exempt from work registration requirements. The regular participation of an individual in a treatment program may be verified through the organization or institution operating the program before granting the exemption, if the information is questionable. Drug addiction or alcohol treatment and rehabilitation program means any program recognized as a tax exempt organization by the IRS or non-profit by TDMHSAS; TDMHSAS must provide a license or issue a letter acknowledging that the facility is operating for this purpose.
rules:
  - name: treatment_program_participant_exempt_from_work_registration
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.06, page 3, item 7
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-06/page-3
    versions:
      - effective_from: '2019-07-01'
        formula: |-
          participates_in_drug_or_alcohol_treatment_rehabilitation_program_residential
          or participates_in_drug_or_alcohol_treatment_rehabilitation_program_outpatient

  - name: treatment_program_participation_verification_may_be_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.06, page 3, item 8
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-06/page-3
    versions:
      - effective_from: '2019-07-01'
        formula: |-
          information_about_regular_participation_is_questionable

  - name: facility_qualifies_as_drug_or_alcohol_treatment_rehabilitation_program
    kind: derived
    entity: Business
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.06, page 3, item 11
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-06/page-3
    versions:
      - effective_from: '2019-07-01'
        formula: |-
          (recognized_as_tax_exempt_organization_by_irs
          or recognized_as_nonprofit_by_tdmhsas)
          and (tdmhsas_provided_license
          or tdmhsas_issued_acknowledgment_letter_for_facility_purpose)

  - name: facility_snap_benefit_administration_requirements_met
    kind: derived
    entity: Business
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.06, page 3, item 4.b.ii
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-06/page-3
    versions:
      - effective_from: '2019-07-01'
        formula: |-
          organization_or_institution_applies_on_behalf_of_individual
          and receives_and_spends_snap_benefits_for_food_prepared_or_served_to_individual
