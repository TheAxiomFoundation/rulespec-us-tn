format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-7
  summary: |-
    Policy 24.22, effective 08/15/2019: TDHS will initiate collection action against the household on all inadvertent household or administrative error claims unless the claim is collected through offset or specified conditions apply. One condition is that the total claim is less than $35 and cannot be recovered through SNAP benefit allotment reduction; collection begins when multiple under-$35 claims total $35 or more. Other listed conditions are TDHS documentation that the household cannot be located, and postponement when an inadvertent household error claim is referred for possible prosecution or administrative disqualification and TDHS determines collection action will prejudice the case.
  deferred_outputs:
    - output: us-tn:policies/dhs/snap/24-22/page-7#administrative_disqualification_hearing_conducted
      reason: The source requires hearings in accordance with Section 1240-5-14-.04, but that cited procedure source is not available in copied context.
    - output: us-tn:policies/dhs/snap/24-22/page-7#administrative_disqualification_hearing_waiver_allowed
      reason: The source allows waiver in accordance with Section 1240-5-14-.05, but that cited procedure source is not available in copied context.
    - output: us-tn:policies/dhs/snap/24-22/page-7#court_referral_for_alleged_intentional_program_violation
      reason: The source requires referrals in accordance with Section 1240-5-14-.06, but that cited procedure source is not available in copied context.
    - output: us-tn:policies/dhs/snap/24-22/page-7#collection_action_required_for_intentional_program_violation_claim
      reason: The page begins the IPV collection rule and one exception, but the exception list is incomplete in this source unit after "The HH has repaid the over issuance already,".
rules:
  - name: small_claim_collection_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: Policy 24.22(K)(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-7
              excerpt: "less than thirty-five dollars ($35)"
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          35

  - name: collection_action_required_for_inadvertent_or_administrative_error_claim
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.22(K)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-7
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          household_has_inadvertent_or_administrative_error_claim
          and not claim_collected_through_offset
          and (
            claim_total_amount >= small_claim_collection_threshold
            or claim_recoverable_through_snap_benefit_allotment_reduction
            or multiple_under_threshold_claims_total_at_least_collection_threshold
          )
          and not tdhs_has_documentation_household_cannot_be_located
          and (
            not inadvertent_household_error_claim_referred_for_possible_prosecution_or_administrative_disqualification
            or not tdhs_determines_collection_action_will_prejudice_case
          )
