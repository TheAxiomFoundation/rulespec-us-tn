format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-06/page-7
  summary: |-
    "The group living arrangement must determine if any resident can apply for SNAP on his or her own behalf; the determination should be based on the resident's physical and mental ability to handle his or her own affairs." Residents must report changes; if the resident applied on his or her own behalf, the household reports changes to the county office, and if the group living arrangement acts as authorized representative, it notifies the county office of changes, must notify when the individual leaves, and must return benefits received after the household has left.
rules:
  - name: resident_can_apply_on_own_behalf
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.06, page 7, item 9
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-06/page-7
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-06/page-7
              excerpt: "Effective Date: 07/01/2019"
    versions:
      - effective_from: '2019-07-01'
        formula: |-
          resident_has_physical_ability_to_handle_own_affairs
          and resident_has_mental_ability_to_handle_own_affairs

  - name: household_reports_changes_when_resident_applies_on_own_behalf
