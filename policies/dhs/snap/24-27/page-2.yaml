format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-27/page-2
  summary: |-
    To be eligible to participate in SNAP a student of higher education as stated in Section A must meet at least one listed criterion, including paid employment averaging twenty hours per week or eighty hours per month; qualifying work-study; higher education through WIOA, Employment Career Services, E&T, Trade Act section 236, employer sponsored on-the-job training during the training period; or receipt of a TANF cash grant.
rules:
  - name: paid_employment_weekly_hours_threshold
    kind: parameter
    dtype: Count
    source: TN DHS SNAP Policy 24.27(C)(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-27/page-2
              excerpt: "average of twenty (20) hours per week"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-27/page-2
              excerpt: "Effective Date: 05/01/2019"
    versions:
      - effective_from: '2019-05-01'
        formula: |-
          20

  - name: paid_employment_monthly_hours_threshold
    kind: parameter
    dtype: Count
    source: TN DHS SNAP Policy 24.27(C)(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-27/page-2
              excerpt: "average of eighty (80) hours per month"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-27/page-2
              excerpt: "Effective Date: 05/01/2019"
    versions:
      - effective_from: '2019-05-01'
        formula: |-
          80

  - name: self_employment_minimum_wage_weekly_hours
    kind: parameter
    dtype: Count
    source: TN DHS SNAP Policy 24.27(C)(1)(a)(ii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-27/page-2
              excerpt: "federal minimum wage multiplied by twenty (20) hours"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-27/page-2
              excerpt: "Effective Date: 05/01/2019"
    versions:
      - effective_from: '2019-05-01'
        formula: |-
          20

  - name: student_paid_employment_hours_criterion
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: TN DHS SNAP Policy 24.27(C)(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-27/page-2
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-27/page-2
              excerpt: "Effective Date: 05/01/2019"
    versions:
      - effective_from: '2019-05-01'
        formula: |-
          student_is_paid_for_employment
          and (
            average_paid_employment_hours_per_week_excluding_wioa_class_attendance >= paid_employment_weekly_hours_threshold
            or average_paid_employment_hours_per_month_excluding_wioa_class_attendance >= paid_employment_monthly_hours_threshold
          )

  - name: student_self_employment_earnings_criterion
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: TN DHS SNAP Policy 24.27(C)(1)(a)(ii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-27/page-2
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-27/page-2
              excerpt: "Effective Date: 05/01/2019"
    versions:
      - effective_from: '2019-05-01'
        formula: |-
          student_is_self_employed
          and weekly_self_employment_earnings >= federal_minimum_wage_hourly_amount * self_employment_minimum_wage_weekly_hours

  - name: student_work_study_criterion
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: TN DHS SNAP Policy 24.27(C)(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-27/page-2
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-27/page-2
              excerpt: "Effective Date: 05/01/2019"
    versions:
      - effective_from: '2019-05-01'
        formula: |-
          student_participates_in_title_iv_part_c_state_or_federally_financed_work_study
          and student_actually_working_work_study_job_for_earnings_or_tuition_credit
          and student_approved_for_work_study_at_snap_application
          and work_study_approved_for_school_term
          and student_anticipates_actually_working_during_work_study_approved_school_term
          and month_is_on_or_after_later_of_school_term_begin_or_work_study_approval_month
          and month_is_on_or_before_end_of_month_in_which_school_term_ends
          and not student_refused_work_study_assignment_known_to_agency
          and (
            not month_is_between_terms_with_full_month_or_longer_break
            or student_participating_in_work_study_during_break
          )

  - name: higher_education_student_meets_snap_student_eligibility_criterion
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: TN DHS SNAP Policy 24.27(C)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-27/page-2
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-27/page-2
              excerpt: "Effective Date: 05/01/2019"
    versions:
      - effective_from: '2019-05-01'
        formula: |-
          student_is_higher_education_student_as_stated_in_section_a
          and (
            student_paid_employment_hours_criterion
            or student_self_employment_earnings_criterion
            or student_work_study_criterion
            or student_in_higher_education_through_wioa_program
            or student_enrolled_due_to_employment_career_services_program
            or student_assigned_to_higher_education_by_employment_and_training
            or student_assigned_to_program_under_section_236_trade_act_1974
            or (
              student_enrolled_in_employer_sponsored_on_the_job_training_program
              and month_is_during_employer_sponsored_on_the_job_training_period
            )
            or student_receiving_tanf_cash_grant
          )
