format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-14/page-1
  summary: |-
    "A regular household must meet both the net income eligibility standards and the gross income eligibility standards. An elderly or disabled household must meet only the net income eligibility standards. A categorically eligible household does not have to meet either the gross or net income eligibility standards."
rules:
  - name: gross_monthly_income_standard_met
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Income Policy 24.14, Policy A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-14/page-1
    versions:
      - effective_from: '2022-01-04'
        formula: |-
          gross_monthly_income <= gross_monthly_income_standard_for_household_size

  - name: gross_monthly_income_standard_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Income Policy 24.14, Policy A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-14/page-1
    versions:
      - effective_from: '2022-01-04'
        formula: |-
          not household_contains_elderly_or_disabled_member

  - name: income_eligibility_standards_met
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Income Policy 24.14, Policy A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-14/page-1
    versions:
      - effective_from: '2022-01-04'
        formula: |-
          household_is_categorically_eligible
          or (household_is_elderly_or_disabled and net_monthly_income_standard_met)
          or (household_is_regular and net_monthly_income_standard_met and gross_monthly_income_standard_met)
