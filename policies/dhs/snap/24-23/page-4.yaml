  summary: |-
    Definitions/Acronyms: Appeal is a procedure for grievances unresolved in the local office to go to the State Office for a hearing. Appellant is an individual dissatisfied with a Department administrative action regarding furnishing or denial of assistance and requesting a fair hearing before the State Office. Fair Hearing is a proceeding before an impartial official designated by the Commissioner where an appellant or representative may present the case. Effective Date: 07/15/2021.
