format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-03/page-2
  summary: |-
    SNAP Timeliness Standards (Policy 24.03, eff. 02/01/2022). Expedited entitlement lost if applicant prescreened expedited fails to complete interview within 4 calendar days; processed under 30-day normal standard. If pre-screener misses expedited status and Eligibility Counselor later discovers it, benefits must issue on or before the 7th day after discovery. Expedited eligibility: (B)(2) households with countable monthly gross income < $150 and total liquid resources <= $100; (B)(3) households whose monthly shelter costs plus utilities exceed combined liquid resources and countable gross income; (B)(4) migrant/seasonal farmworker households. Opportunity to participate: regular cases authorize SNAP by 27th calendar day so benefits in hand by 30th day; expedited cases authorize by 4th calendar day so benefits in hand by 7th day. Normal certification period: 30-day standard of promptness.
rules:
  - name: expedited_interview_completion_days
    kind: parameter
    dtype: Integer
    source: Policy 24.03 A.5.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-03/page-2
              excerpt: "fails to complete the interview process within four (4) calendar days of the application date"
    versions:
      - effective_from: '2022-02-01'
        formula: |-
          4
  - name: normal_processing_days
    kind: parameter
    dtype: Integer
    source: Policy 24.03 A.5.a; D.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-03/page-2
              excerpt: "normal timeliness standards of thirty (30) calendar days"
    versions:
      - effective_from: '2022-02-01'
        formula: |-
          30
  - name: late_discovered_expedited_issuance_days
    kind: parameter
    dtype: Integer
    source: Policy 24.03 A.6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-03/page-2
              excerpt: "must receive beneﬁts on or before the seventh (7th) day following the date of discovery"
    versions:
      - effective_from: '2022-02-01'
        formula: |-
          7
  - name: expedited_income_limit
    kind: parameter
    dtype: Money
    unit: USD
    source: Policy 24.03 B.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-03/page-2
              excerpt: "less than one hundred and ﬁfty dollars ($150) in countable monthly gross income"
    versions:
      - effective_from: '2022-02-01'
        formula: |-
          150
  - name: expedited_liquid_resources_limit
    kind: parameter
    dtype: Money
    unit: USD
    source: Policy 24.03 B.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-03/page-2
              excerpt: "total liquid resources do not exceed one hundred ($100)"
    versions:
      - effective_from: '2022-02-01'
        formula: |-
          100
  - name: regular_authorization_day
    kind: parameter
    dtype: Integer
    source: Policy 24.03 C.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-03/page-2
              excerpt: "authorize SNAP by the twenty-seventh (27th) calendar day"
    versions:
      - effective_from: '2022-02-01'
        formula: |-
          27
  - name: regular_benefits_in_hand_day
    kind: parameter
    dtype: Integer
    source: Policy 24.03 C.3; D.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-03/page-2
              excerpt: "beneﬁts can be in hand by the thirtieth (30th) calendar day"
    versions:
      - effective_from: '2022-02-01'
        formula: |-
          30
  - name: expedited_authorization_day
    kind: parameter
    dtype: Integer
    source: Policy 24.03 C.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-03/page-2
              excerpt: "authorize SNAP by the fourth (4th) calendar day"
    versions:
      - effective_from: '2022-02-01'
        formula: |-
          4
  - name: expedited_benefits_in_hand_day
    kind: parameter
    dtype: Integer
    source: Policy 24.03 C.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-03/page-2
              excerpt: "beneﬁts can be in hand by the seventh (7th) calendar day"
    versions:
      - effective_from: '2022-02-01'
        formula: |-
          7
  - name: household_loses_expedited_entitlement
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.03 A.5.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-03/page-2
              excerpt: "lose its entitlement to expedited service when an applicant who has been prescreened as expedited fails to complete the interview process within four (4) calendar days"
    versions:
      - effective_from: '2022-02-01'
        formula: |-
          household_prescreened_expedited
          and not household_completed_interview_within_expedited_window
  - name: household_meets_expedited_income_and_resource_test
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.03 B.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-03/page-2
              excerpt: "less than one hundred and ﬁfty dollars ($150) in countable monthly gross income and whose total liquid resources do not exceed one hundred ($100)"
    versions:
      - effective_from: '2022-02-01'
        formula: |-
          household_countable_monthly_gross_income < expedited_income_limit
          and household_total_liquid_resources <= expedited_liquid_resources_limit
  - name: household_meets_expedited_shelter_cost_test
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.03 B.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-03/page-2
              excerpt: "monthly shelter costs, together with its utilities, based upon actual costs or the standard utility allowances, exceed the combination of the household’s liquid resources and its gross income"
    versions:
      - effective_from: '2022-02-01'
        formula: |-
          household_monthly_shelter_and_utility_costs
          > household_total_liquid_resources + household_countable_monthly_gross_income
  - name: household_eligible_for_expedited_services
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.03 B.1-4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-03/page-2
              excerpt: "Expedited procedures apply at initial application only for the ﬁrst (1st) month of the certiﬁcation period."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-03/page-2
              excerpt: "Migrant or seasonal farmworker households may be entitled to expedited service"
    versions:
      - effective_from: '2022-02-01'
        formula: |-
          household_is_initial_application
          and (
            household_meets_expedited_income_and_resource_test
            or household_meets_expedited_shelter_cost_test
            or household_is_migrant_or_seasonal_farmworker
          )
