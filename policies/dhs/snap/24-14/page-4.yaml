format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-14/page-4
  summary: |-
    "E. Excluded Income Certain payments and benefits which might ordinarily be considered income are excluded under federal law or regulation from consideration as income for eligibility purposes." Excluded categories include relocation payments under Title II of the Uniform Relocation Assistance Act; specified Indian tribal judgment, claims, settlement, and submarginal lands payments; Older Americans Act benefits; WIC and special child food service value; support-service payments and out-of-pocket reimbursements to specified volunteers; and specified Domestic Volunteer Service Act payments.
rules:
  - name: domestic_volunteer_service_act_title_i_payment_excluded
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.14(E)(8)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-14/page-4
              excerpt: "receiving SNAP or FF at the time they joined"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-14/page-4
              excerpt: "before March 1, 1979"
    versions:
      - effective_from: '2022-01-04'
        formula: |-
          payment_is_domestic_volunteer_service_act_title_i_payment
          and (
            person_was_receiving_snap_or_ff_when_joined_title_i_program
            or (
              person_was_receiving_title_i_subsistence_allowance_before_reference_date
              and payment_is_within_reference_volunteer_contract_length
            )
          )
  - name: payment_excluded_from_snap_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.14(E)(1)-(8)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-14/page-4
    versions:
      - effective_from: '2022-01-04'
        formula: |-
          payment_is_relocation_payment_under_title_ii_uniform_relocation_act
          or payment_is_funds_held_in_trust_for_members_of_indian_tribes_under_listed_judgment_funds_laws
          or payment_is_listed_indian_claims_or_settlement_payment
          or payment_is_receipt_distributed_to_member_of_certain_indian_tribe_for_submarginal_lands
          or payment_is_older_americans_act_senior_community_service_employment_program_payment
          or payment_is_older_americans_act_nutrition_program_for_elderly_payment
          or payment_is_child_nutrition_act_wic_or_national_school_lunch_special_food_service_value
          or payment_is_support_service_or_out_of_pocket_reimbursement_to_specified_title_ii_volunteer
          or domestic_volunteer_service_act_title_i_payment_excluded
          or payment_is_domestic_volunteer_service_act_title_ii_payment
