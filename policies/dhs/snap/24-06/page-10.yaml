format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-06/page-10
  summary: |-
    Shelter residents whose former HHs were not certified before entering the shelter may be certified as a separate HH if otherwise eligible, and such residents can receive only one allotment per month. Shelter applications may use expedited or normal processing; only individual HH participants are processed under expedited provisions, and non-expedited residents are processed under normal procedures. Separate HH certification is based solely on the residents' income and resources; only expenses they are responsible for count, and jointly held former-HH resources are inaccessible. Former HH benefits must be reduced promptly for HH composition changes, changes must be reported, and the facility may act as point of sale while the participant is in the facility.
rules:
  - name: shelter_resident_one_allotment_monthly_limit
    kind: parameter
    dtype: Count
    period: Month
    source: Policy 24.06(4)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-06/page-10
              excerpt: "can receive only one allotment per month"
    versions:
      - effective_from: '2019-07-01'
        formula: |-
          1

  - name: shelter_resident_separate_household_certification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Policy 24.06(4)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-06/page-10
    versions:
      - effective_from: '2019-07-01'
        formula: |-
          resident_is_in_shelter_for_battered_persons_and_children
          and former_household_was_not_certified_before_member_entered_shelter
          and resident_is_otherwise_eligible

  - name: shelter_resident_monthly_allotment_cap
    kind: derived
    entity: Person
    dtype: Count
    period: Month
    source: Policy 24.06(4)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-06/page-10
              excerpt: "Such residents can receive only one allotment per month"
          - path: versions[0].formula
            kind: import
            import:
              target: us-tn:policies/dhs/snap/24-06/page-10#shelter_resident_one_allotment_monthly_limit
              output: shelter_resident_one_allotment_monthly_limit
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-tn:policies/dhs/snap/24-06/page-10#shelter_resident_separate_household_certification
              output: shelter_resident_separate_household_certification
              hash: sha256:local
    versions:
      - effective_from: '2019-07-01'
        formula: |-
          if shelter_resident_separate_household_certification: shelter_resident_one_allotment_monthly_limit else: 0

  - name: expedited_processing_for_shelter_resident_application
    kind: derived
    entity: Household
