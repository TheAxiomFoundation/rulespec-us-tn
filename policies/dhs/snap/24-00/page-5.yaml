  summary: |-
    SNAP Policy 24.00, Page 5 of 9: lists items for enforcement referral packages (names/titles/addresses of parties, assistance amount report for last three fiscal years, letters of failure to comply, expected defenses, recommendation for enforcement or voluntary compliance). TDHS staff trained annually on Civil Rights, Language Assistance Services, and Reasonable Modifications. Availability of Information: SNAP Policy is available to TDHS staff and the general public via the internet; public custodians may request copies at their own expense subject to conditions; other groups may copy the policy at the Commissioner's discretion; specific policy materials needed by an applicant/recipient or representative for a fair hearing are available without charge; portions of the manual are available electronically to students, researchers, and other agencies upon request.
