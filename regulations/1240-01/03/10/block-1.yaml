format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/regulation/1240-01/03/10/block-1
  summary: |-
    Acceptable forms of verification of citizenship include birth certificates, religious records, voter registration cards, certificates of citizenship or naturalization (INS Form I-179 or I-197), or US passports. If those forms cannot be obtained and the person provides a reasonable explanation, a signed statement under penalty of perjury from a US citizen will be accepted; the statement must contain a warning of the penalties for helping someone commit fraud.
rules:
  - name: citizenship_verification_accepted
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Tenn. Comp. R. & Regs. 1240-01-03-.10
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/regulation/1240-01/03/10/block-1
              excerpt: "Acceptable forms of verification of citizenship include birth certificates, religious records, voter registration cards, certificates of citizenship or naturalization provided by INS ... or US passports."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-tn/regulation/1240-01/03/10/block-1
              excerpt: "If the above forms of verification cannot be obtained and the person can provide a reasonable explanation ... a signed statement will be accepted from someone who is a US citizen which declares, under penalty of perjury, that the member in question is a US citizen. The signed statement shall contain a warning of the penalties for helping someone commit fraud."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          member_has_birth_certificate
          or member_has_religious_record
          or member_has_voter_registration_card
          or member_has_ins_certificate_of_citizenship_or_naturalization
          or member_has_us_passport
          or (
            primary_verification_unobtainable
            and reasonable_explanation_provided
            and signed_statement_from_us_citizen_under_penalty_of_perjury
            and signed_statement_contains_fraud_penalty_warning
          )
