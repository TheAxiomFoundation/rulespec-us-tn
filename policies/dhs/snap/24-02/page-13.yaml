format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-13
  summary: |-
    SNAP Policy 24.02, page 13: Certification Periods. Definite periods of time
    are established within which a household shall be eligible to receive
    benefits. SNAP certification periods shall conform to calendar months.
    Households shall be assigned the longest certification periods possible.
    Acceptable certification periods are six (6) months or less. A twenty-four
    (24) month certification can be approved for households where all adult
    members are elderly or disabled, with no earned income, and the household
    is not receiving or applying for Families First. Cases certified at least
    four (4) months can be considered simplified reporting households unless
    self-employment is the only earned income. Households certified for 24
    months must submit HS-3412 Mid-Certification Report at the twelfth month.
rules:
  - name: standard_maximum_certification_period_months
    kind: parameter
    dtype: Integer
    source: SNAP Policy 24.02, page 13, paragraph 7
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-13
              excerpt: "six (6) months or less"
    versions:
      - effective_from: '2022-12-01'
        formula: |-
          6
  - name: extended_certification_period_months
    kind: parameter
    dtype: Integer
    source: SNAP Policy 24.02, page 13, paragraph 7
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-13
              excerpt: "twenty-four (24) month certification can be approved"
    versions:
      - effective_from: '2022-12-01'
        formula: |-
          24
  - name: simplified_reporting_minimum_certification_months
    kind: parameter
    dtype: Integer
    source: SNAP Policy 24.02, page 13, paragraph 7.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-13
              excerpt: "Cases certified at least four (4) months can be considered simplified reporting households"
    versions:
      - effective_from: '2022-12-01'
        formula: |-
          4
  - name: mid_certification_report_due_month
    kind: parameter
    dtype: Integer
    source: SNAP Policy 24.02, page 13, paragraph 7.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-13
              excerpt: "submit HS-3412 Mid-Certification Report at the twelfth (12th) month"
    versions:
      - effective_from: '2022-12-01'
        formula: |-
          12
  - name: mid_certification_report_sent_month
    kind: parameter
    dtype: Integer
    source: SNAP Policy 24.02, page 13, paragraph 7.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-13
              excerpt: "sent their HS-3412 Mid-Certification Report in the tenth (10th) month"
    versions:
      - effective_from: '2022-12-01'
        formula: |-
          10
  - name: household_eligible_for_extended_certification_period
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.02, page 13, paragraph 7
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-13
              excerpt: "all adult members are elderly or disabled, with no earned income, and the household is not receiving or applying for Families First"
    versions:
      - effective_from: '2022-12-01'
        formula: |-
          all_adult_members_are_elderly_or_disabled
          and not household_has_earned_income
          and not household_receiving_or_applying_for_families_first
  - name: household_certification_period_months
    kind: derived
    entity: Household
    dtype: Integer
    period: Month
    source: SNAP Policy 24.02, page 13, paragraph 7
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-13
              excerpt: "longest certification periods possible based on the predictability of the household's circumstances"
    versions:
      - effective_from: '2022-12-01'
        formula: |-
          if household_eligible_for_extended_certification_period: extended_certification_period_months else: standard_maximum_certification_period_months
  - name: household_is_simplified_reporting
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.02, page 13, paragraph 7.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-13
              excerpt: "Cases certified at least four (4) months can be considered simplified reporting households unless self-employment is the only earned income in the case"
    versions:
      - effective_from: '2022-12-01'
        formula: |-
          household_certification_period_months >= simplified_reporting_minimum_certification_months
          and not self_employment_is_only_earned_income
  - name: household_must_submit_mid_certification_report
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.02, page 13, paragraph 7.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-13
              excerpt: "Households that are eligible and are certified for twenty-four (24) months will be required to submit HS-3412 Mid-Certification Report at the twelfth (12th) month"
    versions:
      - effective_from: '2022-12-01'
        formula: |-
          household_certification_period_months == extended_certification_period_months
