format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-17
  summary: '"If the HH reapplies at a later date, and is determined eligible, it will
    be verified whether the expense is reimbursable and the amount of the reimbursement.
    The currently existing balance owed on the one-time expense at the time the HH
    reapplies and is determined eligible will only be allowed. Recurring expenses
    that have been brought forward from previous billing periods will not be allowed."'
rules:
- name: one_time_medical_expense_balance_allowed_at_reapplication
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: USD
  source: SNAP Deductions from Income, Policy 24.18, p. 17, Ineligible at Recertification
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-17
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-17
  versions:
  - effective_from: '2018-09-17'
    formula: 'if household_reapplies_at_later_date and household_determined_eligible_on_reapplication
      and medical_expense_is_one_time: max(0, currently_existing_balance_owed_on_one_time_expense)
      else: 0'
- name: recurring_medical_expense_brought_forward_allowed_at_reapplication
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: SNAP Deductions from Income, Policy 24.18, p. 17, Ineligible at Recertification
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-17
  versions:
  - effective_from: '2018-09-17'
    formula: 'household_reapplies_at_later_date

      and household_determined_eligible_on_reapplication

      and not recurring_expense_brought_forward_from_previous_billing_periods'
