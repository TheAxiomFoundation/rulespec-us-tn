  summary: |-
    SNAP Application Processing (Policy 24.02, Page 2 of 20): Filing an Application. Applications can be filed in person, by an authorized representative, by mail, online, by fax, or other electronic transmission. Same-day filing right. The application file date is the date received by the county office during normal business hours; applications received outside normal business hours are designated as received the next business day. Online, faxed, or electronic applications are acceptable if they contain the applicant's name, address, and signature. Receipt of an original application in addition to an electronic application is not required. Households contacting by telephone shall be mailed an application the same day. Applications are mailed at benefit renewal appointments; if not returned and appointment not kept, the SNAP case closes automatically at end of certification period. Wrong office must still advise applicant of same-day filing and provide correct office address and telephone number.
  deferred_outputs:
    - output: us-tn:policies/dhs/snap/24-02/page-2#application_filing_procedures
      reason: |-
        Source text states administrative procedures for filing SNAP applications (acceptable filing methods, file date determination, mailing obligations, wrong-office handling) rather than computable eligibility conditions, amounts, rates, thresholds, caps, or limits. The provisions govern agency conduct and applicant rights in the application process, not benefit calculation or eligibility determination, so no executable parameter, derived, or derived_relation rule can faithfully represent the source text.
