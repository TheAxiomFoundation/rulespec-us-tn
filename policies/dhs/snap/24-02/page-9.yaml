  summary: |-
    SNAP Application Processing (Policy 24.02, page 9). Procedural caseworker
    guidance: Eligibility Counselor must complete application, conduct
    interview, verify information, document collateral contacts; allow at
    least ten (10) days following the day after the written request's mail
    date for verifications even if it pushes processing past the thirtieth
    (30th) day; authorize benefits if verifications are provided by the
    sixtieth (60th) day with benefits prorated from application date if
    denied before the 30th day; record actions within 48 hours or the next
    business day. Expedited procedures apply at initial application only for
    the first month of certification unless received after the fifteenth
    (15th) of the month then the customer may receive two (2) months as part
    of their initial allotment; households reapplying during the last month
    of their recertification period are not entitled to expedited services
    at reapplication. The source states administrative timeframes and
    caseworker documentation duties without defining a computable benefit
    amount, eligibility predicate, or numeric policy parameter that affects
    a household's SNAP calculation; the procedural timing requirements
    govern agency workflow rather than benefit computation.
