  summary: |-
    SNAP General Administrative Procedures, Policy 24.01, page 4 of 6. Covers
    case-file inspection by non-HH members (written HH authorization required),
    staff presence during review, no staff interpretation of documents,
    permission to obtain copies of pertinent information, one free copy of
    case material relevant to fair/fraud hearings on appellant request,
    charges for other copies per Tenn. Comp. R. & Regs. 1240-09-01-.05,
    and rules for releasing information to persons other than the
    applicant/participant (subpoenas/law enforcement requests routed to the
    Office of General Counsel; other requests routed through channels to the
    appropriate program Director).
