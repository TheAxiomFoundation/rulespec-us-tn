format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-19/page-1
  summary: |-
    "Transitional SNAP (T-SNAP) benefits may be provided to existing SNAP households when their Families First cash assistance closes because of new or increased earnings, or because another change in circumstances causes existing earnings to exceed the Families First income standard. The household has the option to choose T-SNAP or work incentive payments (WIP), but not both. If the customer chooses T-SNAP, benefits will start the first month following Families First closure and shall be received up to five (5) months. Transitional SNAP shall continue throughout the five-month period unless the household re-applies and is approved for Families First or the household re-applies and is approved for regular SNAP benefits."
rules:
  - name: transitional_snap_max_months
    kind: parameter
    dtype: Count
    period: Month
    source: Transitional SNAP Policy 24.19, Eligibility Requirements
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-19/page-1
              excerpt: "shall be received up to five (5) months"
    versions:
      - effective_from: '2021-06-15'
        formula: |-
          5

  - name: individual_transitional_snap_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Transitional SNAP Policy 24.19, Eligibility Requirements item 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-19/page-1
    versions:
      - effective_from: '2021-06-15'
        formula: |-
          individual_is_snap_eligible

  - name: transitional_snap_eligibility
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Transitional SNAP Policy 24.19, Eligibility Requirements
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-19/page-1
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-19/page-1
              excerpt: "up to five (5) months"
    versions:
      - effective_from: '2021-06-15'
        formula: |-
          household_is_existing_snap_household
          and families_first_cash_assistance_closed_due_to_new_or_increased_earnings_or_existing_earnings_exceeding_income_standard
          and household_chooses_transitional_snap
          and not household_chooses_work_incentive_payments
          and months_after_families_first_closure >= 1
          and months_after_families_first_closure <= transitional_snap_max_months
          and not household_reapplies_and_is_approved_for_families_first
          and not household_reapplies_and_is_approved_for_regular_snap
          and not household_sanctioned_for_families_first_non_compliance_with_corresponding_snap_sanction
          and not household_has_open_families_first_case_remaining_within_snap_household
