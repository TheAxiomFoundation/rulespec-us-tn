    kind: derived
    entity: Household
    dtype: Count
    period: Month
    source: Tables I-VII row key
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-tn/regulation/1240-01/04/27/block-1
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_member_count

