format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-06/page-13
  summary: |-
    "Eligible HH members sixty (60) years of age or over, or members who are housebound, feeble, have a physical disability, or otherwise disabled to the extent that they are unable to adequately prepare all their meals, and their spouses may use all or any part of the benefits issued to them to purchase meals from a non-profit meal delivery service authorized by FNS."
rules:
  - name: member_may_use_snap_benefits_for_meals_on_wheels
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.06(L)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-06/page-13
    versions:
      - effective_from: '2019-07-01'
        formula: |-
          member_is_eligible_household_member
          and meal_delivery_service_is_non_profit_and_authorized_by_fns
          and (
            member_is_sixty_years_of_age_or_over
            or member_is_housebound
            or member_is_feeble
            or member_has_physical_disability
            or member_is_otherwise_disabled_to_extent_unable_to_adequately_prepare_all_meals
            or member_is_spouse_of_member_who_meets_meals_on_wheels_condition
          )

  - name: meal_delivery_service
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.06(L)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-06/page-13
    versions:
      - effective_from: '2019-07-01'
        formula: |-
          meal_service_is_authorized_by_fns
          and meal_service_prepares_and_delivers_meals_at_concessional_price_to_listed_people
          and (
            meal_service_is_political_subdivision
            or meal_service_is_private_non_profit_organization
            or meal_service_is_private_establishment_contracted_with_state_or_local_agency
          )
