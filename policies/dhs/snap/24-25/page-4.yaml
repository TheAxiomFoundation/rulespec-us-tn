  summary: |-
    Tennessee is an Act on All Changes state; eligibility workers will act on all changes that become known to the department, both “recipient reported” and “non-recipient reported” within ten (10) days. All actions and notices sent to the household will require documentation in case records within two (2) business days. When returned mail is received, the county office shall enter the information in the case notes within two (2) business days.
