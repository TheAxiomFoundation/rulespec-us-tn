format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-27/page-6
  summary: |-
    Adequate childcare exists only when another responsible person lives in the home with the student and is able, and available, to care for the child. If the student must obtain childcare outside the home, adequate childcare does not exist. A student is deemed enrolled in an institution of higher education when admitted as a student starting on the first day of the school term.
rules:
  - name: adequate_child_care_exists
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.27, Definitions/Acronyms, Adequate Child Care
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-27/page-6
    versions:
      - effective_from: '2019-05-01'
        formula: |-
          responsible_person_lives_in_home_with_student
          and responsible_person_able_and_available_to_care_for_child
          and responsible_person_mentally_and_physically_capable_of_providing_childcare_for_household
          and not student_must_obtain_childcare_outside_home

  - name: enrolled_in_institution_of_higher_education
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.27, Definitions/Acronyms, Institution of Higher Education
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-27/page-6
    versions:
      - effective_from: '2019-05-01'
        formula: |-
          student_has_been_admitted_as_student
          and school_term_has_started

  - name: physically_or_mentally_fit_for_employment
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.27, Definitions/Acronyms, Physical or Mental Fitness
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-27/page-6
    versions:
      - effective_from: '2019-05-01'
        formula: |-
          individual_is_fit_for_employment
          and not individual_has_disability_preventing_gainful_employment
