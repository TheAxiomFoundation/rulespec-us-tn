format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-20/page-1
  summary: |-
    Households with striking members are ineligible to participate in SNAP unless eligible for benefits the day prior to the strike and otherwise eligible at application. The policy lists persons considered strikers and persons not considered strikers.
rules:
  - name: member_of_household
    kind: data_relation
    data_relation:
      predicate: member_of_household
      arity: 2
      arguments:
        - Person
        - Household

  - name: person_considered_striker
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Strikers Policy 24.20, Policy items 1-2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-20/page-1
    versions:
      - effective_from: '2021-07-01'
        formula: |-
          (
            person_involved_in_strike_or_concerted_work_stoppage
            or person_is_non_working_member_of_bargaining_unit_on_strike
            or person_participates_in_sympathy_or_support_strike_for_bargaining_unit
            or person_got_another_job_while_on_strike_without_resigning
          )
          and not person_not_in_bargaining_unit_not_sympathy_or_support_strike_and_afraid_to_cross_picket_line
          and not person_fired_by_company_while_on_strike
          and not person_officially_resigned_from_job_while_on_strike

  - name: household_contains_striking_member
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Strikers Policy 24.20, Policy
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-20/page-1
    versions:
      - effective_from: '2021-07-01'
        formula: |-
          count_where(member_of_household, person_considered_striker) > 0

  - name: household_eligible_under_strikers_policy
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Strikers Policy 24.20, Policy
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-20/page-1
    versions:
      - effective_from: '2021-07-01'
        formula: |-
          not household_contains_striking_member
          or (
            household_eligible_for_benefits_day_prior_to_strike
            and household_otherwise_eligible_at_application
          )
