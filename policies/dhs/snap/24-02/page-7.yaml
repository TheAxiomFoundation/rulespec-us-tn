format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-7
  summary: |-
    The applicant/recipient must be informed of the specific information needed
    and must be given sufficient time (at least ten days following the written
    request's mail date) to provide acceptable verification if the preferred
    document is not readily available.
rules:
  - name: minimum_verification_response_days
    kind: parameter
    dtype: Integer
    source: TN DHS SNAP Policy 24.02, page 7, item 7
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-7
              excerpt: "at least ten days following the written request's mail date"
    versions:
      - effective_from: '2022-12-01'
        formula: |-
          10
  - name: applicant_given_sufficient_verification_time
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: TN DHS SNAP Policy 24.02, page 7, item 7
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-7
              excerpt: "must be given sufficient time (at least ten days following the written request's mail date)"
    versions:
      - effective_from: '2022-12-01'
        formula: |-
          days_provided_to_supply_verification >= minimum_verification_response_days
  - name: case_denial_prohibited_due_to_alternative_source
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: TN DHS SNAP Policy 24.02, page 7, item 8
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-7
              excerpt: "Under no circumstances is a case to be denied or closed for failure to provide verification from a particular source when another source could serve the same purpose."
    versions:
      - effective_from: '2022-12-01'
        formula: |-
          alternative_verification_source_available
  - name: applicant_statement_accepted_as_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: TN DHS SNAP Policy 24.02, page 7, items 9-10
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-7
              excerpt: "a statement signed and dated by the applicant may be accepted as verification"
    versions:
      - effective_from: '2022-12-01'
        formula: |-
          (only_one_verification_source_exists and verification_source_no_longer_available)
          or (third_party_verification_unobtainable_despite_best_efforts and applicant_provided_written_or_verbal_declaration)
