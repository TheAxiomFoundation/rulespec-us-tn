  summary: |-
    If the county is at fault for not completing the application process by the end of the second thirty (30) day period (60 days) but the case is not complete enough to reach an eligibility determination, the Eligibility Counselor should deny the case and notify the household to file a new application unless the original application can be processed immediately, and the household notified of the action that will be taken. Remainder of page is a list of supporting documents and cross-references.
