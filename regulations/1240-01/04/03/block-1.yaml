format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/regulation/1240-01/04/03/block-1
  summary: |-
    The HH/AG shall report all resources at the time of application. The HH/AG's resources at the time the application is filed and at each redetermination/recertification shall be used to determine if the HH/AG's resources meet the eligibility standard.
  status: deferred
  deferred_outputs:
    - output: us-tn:regulations/1240-01/04/03/block-1#household_resources_meet_eligibility_standard
      reason: |-
        The source text states an administrative reporting duty and the point-in-time
        rule (resources at application and at each redetermination/recertification) for
        determining whether the HH/AG meets the eligibility standard, but it does not
        itself state the resource eligibility standard, the categories of countable
        resources, or any numeric threshold. Encoding a computable resource-eligibility
        output requires the resource standard and resource definitions stated elsewhere
        in the Tennessee regulations, which are not present in this source slice.
