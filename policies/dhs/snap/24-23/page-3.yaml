format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-23/page-3
  summary: |-
    "Good cause for delay will be considered on a case-by-case basis when a request for continued benefits mailed by the individual is received by TDHS following the tenth (10th) day after the notice of adverse action is mailed. Continued or reinstated benefits should not be reduced or terminated before the final hearing decision unless" one of five listed exceptions applies.
rules:
  - name: continued_benefits_request_day_limit
    kind: parameter
    dtype: Count
    period: Day
    source: SNAP Appeals and Fair Hearings Policy 24.23, page 3, continued benefits delay
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-23/page-3
              excerpt: "following the tenth (10th) day after the notice of adverse action is mailed"
    versions:
      - effective_from: '2021-07-15'
        formula: |-
          10

  - name: good_cause_for_continued_benefits_delay_considered
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: SNAP Appeals and Fair Hearings Policy 24.23, page 3, continued benefits delay
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-23/page-3
              excerpt: "when a request for continued benefits mailed by the individual is received by TDHS following the tenth (10th) day"
    versions:
      - effective_from: '2021-07-15'
        formula: |-
          request_for_continued_benefits_mailed_by_individual
          and days_after_notice_mailed_when_request_received > continued_benefits_request_day_limit

  - name: continued_or_reinstated_benefits_protected_before_final_hearing_decision
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: SNAP Appeals and Fair Hearings Policy 24.23, page 3, continued or reinstated benefits before final hearing decision
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-23/page-3
              excerpt: "Continued or reinstated benefits should not be reduced or terminated before the final hearing decision unless"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-23/page-3
    versions:
      - effective_from: '2021-07-15'
        formula: |-
          continued_or_reinstated_benefits_are_active
          and final_hearing_decision_pending
          and not additional_cause_for_adverse_action_and_no_subsequent_hearing_requested
          and not certification_period_expires
          and not hearing_officer_preliminary_written_policy_interpretation_decision
          and not mass_change_affecting_ag_eligibility_or_basis_for_issuance_occurs
          and not review_indicates_new_certification_period_and_new_benefit_amount
