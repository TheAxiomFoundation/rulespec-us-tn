  summary: |-
    SNAP Application Processing, Policy 24.02, page 4. Covers interview procedures: telephone interviews are the default with face-to-face available on request; the interview's purposes for applicant and agency; face-to-face interview required prior to initial certification/approval and recertification except when not required; single interview may cover SNAP and Families First; interview is official and confidential; right to privacy protected; person interviewed must be head of household, spouse, other responsible adult member, or authorized representative; if a household fails to appear for a scheduled interview, written notice of missed appointment and responsibility to reschedule.
