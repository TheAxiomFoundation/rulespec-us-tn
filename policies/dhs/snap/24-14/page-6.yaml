format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-14/page-6
  summary: |-
    Excludes the allowable cost of producing self-employment income; income received too infrequently or irregularly to be reasonably anticipated if it does not exceed $30 in a three-month period; loans meeting stated repayment-document conditions; income of non-household members who have not been disqualified, with stated exceptions for SSA, SSI, VA, and child support received on behalf of eligible household members; and money received and used for care and maintenance of a third-party non-household member, including identifiable or prorated portions.
rules:
  - name: infrequent_or_irregular_income_three_month_limit
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: SNAP Policy 24.14, Page 6, item 19
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-14/page-6
              excerpt: "The amount must not exceed $30 in a three-month period."
    versions:
      - effective_from: '2022-01-04'
        formula: |-
          30

  - name: infrequent_or_irregular_income_excluded
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.14, Page 6, item 19
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-14/page-6
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-14/page-6
              excerpt: "The amount must not exceed $30 in a three-month period."
    versions:
      - effective_from: '2022-01-04'
        formula: |-
          income_received_too_infrequently_or_irregularly_to_be_reasonably_anticipated
          and income_amount_in_three_month_period <= infrequent_or_irregular_income_three_month_limit

  - name: loan_income_excluded
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.14, Page 6, item 20
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-14/page-6
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-14/page-6
    versions:
      - effective_from: '2022-01-04'
        formula: |-
          payment_is_loan
          and not payment_is_educational_loan_on_which_repayment_is_deferred
          and loan_document_signed_by_both_parties_with_agreement_to_repay
          and obligation_to_repay_amount_is_unconditional
          and lending_party_is_individual_or_institution

  - name: non_disqualified_non_household_member_income_excluded
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.14, Page 6, item 21(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-14/page-6
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-14/page-6
    versions:
      - effective_from: '2022-01-04'
        formula: |-
          income_belongs_to_non_household_member_who_has_not_been_disqualified
          and not non_household_member_receives_ssa_ssi_or_va_benefits_on_behalf_of_eligible_household_member
          and not non_household_member_receives_child_support_for_identified_eligible_household_children

  - name: third_party_non_household_care_and_maintenance_payment_excluded
    kind: derived
    entity: Payment
    dtype: Money
    unit: USD
    period: Month
    source: SNAP Policy 24.14, Page 6, item 21(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-14/page-6
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-14/page-6
    versions:
      - effective_from: '2022-01-04'
        formula: |-
          if payment_received_and_used_for_care_and_maintenance_of_third_party_non_household_member: amount_received_and_used_for_third_party_non_household_member else: if payment_has_identifiable_portion_intended_and_used_for_non_household_member_care: identifiable_non_household_member_care_portion else: if payment_intended_for_household_and_non_household_beneficiaries_and_non_household_portion_not_readily_identifiable: payment_amount / intended_beneficiary_count else: 0
