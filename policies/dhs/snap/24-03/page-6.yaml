format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-03/page-6
  summary: |-
    SNAP Policy 24.03 Timeliness Standards (page 6 of 10): rules for assigning fault for application processing delays between the household and the county office, and county office requirements including offering application assistance, providing at least ten (10) calendar days from notification to register for work, allowing at least ten (10) days from initial verification request to provide missing verification, documenting outstanding verification within forty-eight (48) hours, denying the application after the tenth (10th) day for failure to provide verification (reason code 305), and basing the initial month's benefit on the application filing date when the delay is the fault of the county.
rules:
  - name: minimum_days_to_register_for_work
    kind: parameter
    dtype: Integer
    source: Policy 24.03, K.2 ("at least ten (10) calendar days from the date of notification to register a household member for work")
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-03/page-6
              excerpt: "at least ten (10) calendar days from the date of notification to register a household member for work"
    versions:
      - effective_from: '2022-02-01'
        formula: |-
          10
  - name: minimum_days_to_provide_verification
    kind: parameter
    dtype: Integer
    source: Policy 24.03, K.4 ("Sufficient time is at least ten (10) days from the date of the county office's initial request")
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-03/page-6
              excerpt: "Sufficient time is at least ten (10) days from the date of the county office's initial request for the particular verification that was missing"
    versions:
      - effective_from: '2022-02-01'
        formula: |-
          10
  - name: verification_documentation_deadline_hours
    kind: parameter
    dtype: Integer
    source: Policy 24.03, K.6.a ("documentation is placed in the running record to note any outstanding verification within forty-eight (48) hours")
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-03/page-6
              excerpt: "documentation is placed in the running record to note any outstanding verification within forty-eight (48) hours"
    versions:
      - effective_from: '2022-02-01'
        formula: |-
          48
  - name: county_application_processing_deadline_days
    kind: parameter
    dtype: Integer
    source: Policy 24.03, J.7 ("county office failed to complete the application process by the thirtieth (30th) day")
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-03/page-6
              excerpt: "the county office failed to complete the application process by the thirtieth (30th) day"
    versions:
      - effective_from: '2022-02-01'
        formula: |-
          30
  - name: delay_is_fault_of_county
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.03, J.3, J.6, J.7
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-03/page-6
              excerpt: "A delay shall be considered the fault of the county office if the Eligibility Counselor failed to take actions previously outlined in this policy"
    versions:
      - effective_from: '2022-02-01'
        formula: |-
          county_failed_to_assist_with_application
          or county_failed_to_assist_obtaining_income_verification
          or county_failed_to_give_sufficient_time
          or county_failed_to_timely_schedule_interviews
          or eligibility_counselor_failed_required_actions
          or (household_met_obligations_timely and county_failed_to_complete_by_thirtieth_day)
  - name: process_application_without_questionable_expense_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.03, J.4 ("do not delay processing the application. Certify the household without the expense")
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-03/page-6
              excerpt: "If the county office fails to assist the household as required in obtaining verification of questionable expenses, do not delay processing the application. Certify the household without the expense"
    versions:
      - effective_from: '2022-02-01'
        formula: |-
          county_failed_to_assist_obtaining_questionable_expense_verification
  - name: initial_month_benefit_prorated_from_filing_date
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.03, J.8 ("benefit level for the initial month of certification is based on the day of the month it filed its application")
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-03/page-6
              excerpt: "When the delay is the fault of the county, the household's benefit level for the initial month of certification is based on the day of the month it filed its application for benefits"
    versions:
      - effective_from: '2022-02-01'
        formula: |-
          delay_is_fault_of_county
  - name: deny_application_for_failure_to_provide_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.03, K.7 ("the Eligibility Counselor must deny the application after the tenth (10th) day")
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-03/page-6
              excerpt: "If the applicant has failed to provide the verification within ten (10) days of the Eligibility Counselor's request, the Eligibility Counselor must deny the application after the tenth (10th) day"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-03/page-6
    versions:
      - effective_from: '2022-02-01'
        formula: |-
          applicant_failed_to_provide_verification_within_required_days
          and days_since_initial_verification_request > minimum_days_to_provide_verification
