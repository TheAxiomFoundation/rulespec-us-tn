format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-13
  summary: 'Definitions/Acronyms: Change Reporting Households are households certified
    less than four (4) months or households whose only income is from self-employment.
    Good Cause is a situation where the applicant has a valid reason for not providing
    an application for their SNAP renewal. Simplified Reporting Households are households
    certified between four (4) to six (6) months whose sole income source is not from
    self-employment OR households that are eligible and certified for a twenty-four
    (24) months certification. Substantial lottery or gambling winnings are a cash
    prize, before taxes or withholdings, that matches the SNAP resource limit for
    elderly or disabled households listed in the Substantial Lottery and Gambling
    Winnings Guidelines document.'
  deferred_outputs:
  - output: us-tn:policies/dhs/snap/24-25/page-13#change_reporting_household
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
  - output: us-tn:policies/dhs/snap/24-25/page-13#simplified_reporting_household
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
