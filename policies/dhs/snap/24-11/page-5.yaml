format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-11/page-5
  summary: |-
    "These students will remain exempt during normal periods of class attendance, recesses, and vacations, provided that they intend to return to school when the recess or vacation is over." Conditions that may qualify as an exemption from E&T include temporary illness or injury, temporary disability, temporary emergency, on call/back to job, no access to transportation, and other exemptions approved by State office.
rules:
  - name: student_work_requirement_exemption_continues
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Work Requirements, Policy 24.11, p. 5, student exemption continuation and termination
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-11/page-5
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-11/page-5
              excerpt: "Effective Date: 03/01/2023"
    versions:
      - effective_from: '2023-03-01'
        formula: |-
          student_is_in_normal_class_attendance_recess_or_vacation
          and student_intends_to_return_to_school_after_recess_or_vacation
          and not student_has_graduated
          and not student_is_suspended
          and not student_is_expelled
          and not student_dropped_out
          and not student_does_not_intend_to_register_for_next_normal_school_term_excluding_summer
  - name: employment_and_training_exemption_condition_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Work Requirements, Policy 24.11, p. 5, Identified Exemptions to Employment & Training Work Components
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-11/page-5
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-11/page-5
              excerpt: "Effective Date: 03/01/2023"
    versions:
      - effective_from: '2023-03-01'
        formula: |-
          temporary_illness_or_injury_is_obvious_or_verified
          or temporary_disability_is_obvious_or_verified
          or temporary_emergency_exists
          or individual_is_on_call_back_to_job
          or individual_has_no_access_to_transportation
          or state_office_approved_other_exemption_applies
