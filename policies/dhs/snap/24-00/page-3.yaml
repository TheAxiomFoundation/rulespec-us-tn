  summary: |-
    SNAP Rights and Responsibilities of Applicants/Participants, Policy 24.00, page 3 of 9. Describes USDA TARGET Center contact for persons with disabilities, FNS discrimination complaint content requirements (name/address/phone, location of accused office, nature of incident, reason for alleged discrimination, witness names/titles/addresses, dates), reference to Policy 1.01 for state requirements, and Filing a Program Complaint procedures (federal level FNS Southeast Regional Office address in Atlanta GA; state level TDHS fair hearing rights, informal complaints, and Field Management Director contact). This source is administrative/procedural guidance describing complaint-filing rights and contact information; it does not state any computable benefit amounts, rates, thresholds, eligibility tests, or numeric policy conditions.
