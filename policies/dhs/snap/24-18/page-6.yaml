format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-6
  summary: |-
    "If a HH wishes to claim utility expenses for an unoccupied home, the HH must provide verification of the actual utility expenses for the unoccupied home. The SUA cannot be used for unoccupied homes." "The HH may switch between the SUA and actual costs during recertification only." "The SUA may be used" when billed regularly for heating or cooling separate from rent or mortgage, when there is no rent or mortgage payment if otherwise eligible, or when shared households contribute to a common heating or cooling expense. "When the Standard Allowance for Utilities is not to be used:" no utility expense, unoccupied-home expenses, or only non-heating/cooling utilities.
rules:
  - name: unoccupied_home_actual_utility_expenses_verification_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.18, p. 6, c.
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-6
              excerpt: "If a HH wishes to claim utility expenses for an unoccupied home, the HH must provide verification"
    versions:
      - effective_from: '2018-09-17'
        formula: |-
          household_wishes_to_claim_utility_expenses_for_unoccupied_home

  - name: unoccupied_home_standard_utility_allowance_disallowed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.18, p. 6, c.; 10(d)(ii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-6
              excerpt: "The SUA cannot be used for unoccupied homes"
    versions:
      - effective_from: '2018-09-17'
        formula: |-
          household_wishes_to_claim_utility_expenses_for_unoccupied_home

  - name: actual_utility_costs_deductible_instead_of_sua
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.18, p. 6, 9(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-6
              excerpt: "it may deduct its actual utility costs rather than the SUA throughout the certification period, if the household can verify these costs"
    versions:
      - effective_from: '2018-09-17'
        formula: |-
          household_can_verify_actual_utility_costs

  - name: switch_between_sua_and_actual_costs_allowed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.18, p. 6, 9(b)-(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-6
              excerpt: "The HH may switch between the SUA and actual costs during recertification only"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-6
              excerpt: "does not apply when the HH must switch from the SUA to actual expenses because it is no longer eligible for the SUA"
    versions:
      - effective_from: '2018-09-17'
        formula: |-
          household_is_at_recertification
          and household_actually_has_choice_between_sua_and_actual_costs
          and not household_must_switch_from_sua_to_actual_expenses_because_no_longer_eligible_for_sua

  - name: switch_between_sua_and_actual_costs_counts_toward_limit
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.18, p. 6, 9(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-6
              excerpt: "The limit on the number of times a HH may switch between actual costs and the SUA applies only to those times it actually has a choice"
    versions:
      - effective_from: '2018-09-17'
        formula: |-
          household_switches_between_sua_and_actual_costs
          and household_actually_has_choice_between_sua_and_actual_costs

  - name: standard_utility_allowance_may_be_used
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.18, p. 6, 10(a)-(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-6
              excerpt: "When the HH is billed on a regular basis for heating or cooling expenses separate and apart from its rent or mortgage"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-6
              excerpt: "When there is no rent or mortgage payment"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-6
              excerpt: "When two or more HHs share a common residence and contribute to the common heating or cooling expense"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-6
              excerpt: "the HH has no utility expense"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-6
              excerpt: "the HH wishes to claim expenses for an unoccupied home"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-6
              excerpt: "HHs are charged only for water, garbage and trash collection, sewage, telephone, cooking fuel"
    versions:
      - effective_from: '2018-09-17'
        formula: |-
          (
            household_billed_on_regular_basis_for_heating_or_cooling_separate_from_rent_or_mortgage
            or (
              household_has_no_rent_or_mortgage_payment
              and household_otherwise_eligible_to_use_sua
            )
            or (
              household_shares_common_residence_with_another_household
              and household_contributes_to_common_heating_or_cooling_expense_for_residence
            )
          )
          and not household_has_no_utility_expense_because_all_utilities_furnished_as_in_kind_benefit
          and not household_wishes_to_claim_utility_expenses_for_unoccupied_home
          and not household_charged_only_for_non_heating_or_cooling_utilities
