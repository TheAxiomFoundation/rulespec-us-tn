  summary: |-
    SNAP Rights and Responsibilities of Applicants/Participants, Policy 24.00, Effective November 1, 2019. Introduces TDHS's obligation to meet federal/state guidelines on rights and responsibilities for applying for and receiving SNAP. Customer Right to Apply: any person wishing to apply for SNAP shall have the opportunity to apply; information about TDHS programs shall be provided on request; applications must be filed in person at a TDHS Office or online by the applicant, an authorized representative, designated agent, or someone acting responsibly; an applicant may be assisted by any individual of her/his choosing in the application/redetermination process, but it is unlawful for any person/agency to charge or receive anything of value for providing such assistance; eligibility is not required prior to filing an application.
