format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-2
  summary: |-
    EBT cards or PIN information will not be sent or delivered to “General Delivery” or “in care of” an address other than the household’s residence unless specifically requested by the household; they will not be issued “in care of” a particular merchant or business establishment. TDHS shall establish a claim against any household that has received more SNAP benefits than it is entitled to receive, except in Section D circumstances. A claim is handled as inadvertent household error if the over issuance was caused by a misunderstanding or unintended household error, including the listed unintentional reporting/information failures or continued benefits pending a fair hearing decision.
rules:
  - name: ebt_card_or_pin_delivery_address_allowed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.22(Before B), items c and e
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-2
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          (not delivery_to_general_delivery_or_in_care_of_nonresidence_address or household_specifically_requested_delivery_to_that_address)
          and not delivery_in_care_of_particular_merchant_or_business_establishment
  - name: nonphysical_address_mailing_documentation_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.22(Before B), item d
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-2
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          not ebt_card_or_pin_not_mailed_to_household_physical_address
          or case_documented_reasons_for_not_mailing_to_physical_address
  - name: tdhs_establishes_household_claim
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.22(C)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-2
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          household_received_more_snap_benefits_than_entitled
          and not section_d_circumstances_when_claims_should_not_be_established
  - name: inadvertent_household_error_claim
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.22(C)(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-2
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          overissuance_caused_by_household_misunderstanding_or_unintended_error
          or household_unintentionally_failed_to_provide_correct_or_complete_information
          or household_unintentionally_failed_to_report_changes_and_responsibility_or_eligibility_requirements_not_shown_explained
          or household_received_excess_benefits_pending_fair_hearing_due_to_continuation_request_based_on_belief_of_entitlement
