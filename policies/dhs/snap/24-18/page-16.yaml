format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-16
  summary: |-
    When a medical-expense change is discovered from a source other than the household, act on it if verified and no further information is needed; do not act during the certification period if household contact would be required. If an eligible member dies, prorated one-time medical expenses continue through the certification period, while recurring medical deductions are terminated under normal benefit-reduction change criteria. Medical expenses of a non-household member may be allowed only if the person was an eligible household member eligible for a medical deduction immediately before hospitalization, nursing-home entry, or death, and only for hospitalization, outpatient care, or nursing-home care. In the last certification month, a reported and verified allowable one-time medical expense is limited at recertification to the currently existing non-reimbursable balance owed.
rules:
  - name: third_party_medical_expense_change_acted_on
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.18, page 16, change in medical expenses discovered from a source other than the HH
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-16
    versions:
      - effective_from: '2018-09-17'
        formula: |-
          medical_expense_change_discovered_from_source_other_than_household
          and change_is_considered_verified
          and no_further_information_needed
          and not change_requires_household_contact
  - name: prorated_one_time_medical_expense_continues_after_member_death
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.18, page 16, Death of the Eligible HH Member, One-Time Medical Expenses
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-16
    versions:
      - effective_from: '2018-09-17'
        formula: |-
          eligible_household_member_for_medical_deduction_died
          and one_time_medical_expense_was_prorated_over_certification_period
  - name: recurring_medical_deduction_terminated_after_member_death
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.18, page 16, Death of the Eligible HH Member, Recurring Medical Expenses
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-16
    versions:
      - effective_from: '2018-09-17'
        formula: |-
          eligible_household_member_for_medical_deduction_died
          and household_receiving_recurring_medical_expense_deduction
  - name: non_household_member_medical_expense_allowed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.18, page 16, Expenses of a Non-Household Member
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-16
    versions:
      - effective_from: '2018-09-17'
        formula: |-
          household_responsible_for_non_household_member_medical_expense
          and individual_was_eligible_household_member_immediately_before_hospital_or_nursing_home_or_death
          and individual_was_eligible_for_medical_deduction_immediately_before_hospital_or_nursing_home_or_death
          and (
            expense_is_hospitalization
            or expense_is_outpatient_care
            or expense_is_nursing_home_care
          )
  - name: last_month_one_time_medical_expense_balance_allowed
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Policy 24.18, page 16, Changes Reported in the Last Month of the Certification Period
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-16
    versions:
      - effective_from: '2018-09-17'
        formula: |-
          if household_reports_and_verifies_allowable_one_time_medical_expense_during_last_month_of_certification_period and household_remains_eligible_at_recertification: max(0, currently_existing_non_reimbursable_balance_owed_at_recertification) else: 0
