format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/regulation/1240-01/14/11/block-1
  summary: |-
    Every applicant found eligible to participate in the Food Stamp Program shall be provided with a written notice of eligibility as soon as a determination is made but no later than 30 days after the date of the initial application.
rules:
  - name: eligibility_notice_deadline_days
    kind: parameter
    dtype: Integer
    source: Tenn. Comp. R. & Regs. 1240-01-14-.11
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/regulation/1240-01/14/11/block-1
              excerpt: "no later than 30 days after the date of the initial application"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30
  - name: eligibility_notice_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: Tenn. Comp. R. & Regs. 1240-01-14-.11
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/regulation/1240-01/14/11/block-1
              excerpt: "shall be provided with a written notice of eligibility as soon as a determination is made but no later than 30 days after the date of the initial application"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          applicant_found_eligible
          and written_eligibility_notice_provided
          and days_from_initial_application_to_notice <= eligibility_notice_deadline_days
