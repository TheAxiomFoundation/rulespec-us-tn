format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/regulation/1240-01/14/09/block-1
  summary: |-
    Households which do not contain a member who is elderly or disabled are subject to a gross income limit of 130 percent of the Office of Management and Budget nonfarm poverty guideline. If the monthly income exceeds the amount shown on Table I, section 1240-1-4-.27, the household is ineligible. All households including households containing an elderly or disabled member are subject to the net monthly income standards in Table II, section 1240-1-4-.27.
rules:
  - name: gross_income_limit_rate
    kind: parameter
    dtype: Rate
    source: 1240-01-14-.09 (gross income limit of 130 percent)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/regulation/1240-01/14/09/block-1
              excerpt: "gross income limit of 130 percent of the Office of Management and Budget nonfarm poverty guideline"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1.30
  - name: gross_income_test_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 1240-01-14-.09 (households without elderly or disabled member subject to gross income limit)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/regulation/1240-01/14/09/block-1
              excerpt: "Households which do not contain a member who is elderly or disabled ... are subject to a gross income limit"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not household_contains_elderly_or_disabled_member
  - name: household_passes_gross_income_test
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 1240-01-14-.09 (if monthly income exceeds Table I, household is ineligible)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/regulation/1240-01/14/09/block-1
              excerpt: "If the monthly income exceeds the amount shown on Table I, section 1240-1-4-.27, the household is ineligible. If the monthly income is less than or equal to the gross income limit, normal procedures allowing deductions shall be followed."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_contains_elderly_or_disabled_member
          or household_nonexempt_gross_monthly_income <= household_gross_income_limit_table_i
  - name: household_passes_net_income_test
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 1240-01-14-.09 (all households subject to net monthly income standards in Table II)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/regulation/1240-01/14/09/block-1
              excerpt: "All households including households containing an elderly or disabled member ... are subject to the net monthly income standards in Table II, section 1240-1-4-.27."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_net_monthly_income <= household_net_income_limit_table_ii
  - name: household_financially_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 1240-01-14-.09 (financial eligibility determination)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/regulation/1240-01/14/09/block-1
              excerpt: "food stamp income compared to the monthly income eligibility standards for the appropriate household size to determine if the household is eligible based on financial criteria"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_passes_gross_income_test
          and household_passes_net_income_test
