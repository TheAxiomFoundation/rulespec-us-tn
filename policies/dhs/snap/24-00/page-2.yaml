  summary: |-
    SNAP Rights and Responsibilities of Applicants/Participants (Policy 24.00, page 2 of 9): right to file an application shall not be denied; SNAP applicants/recipients abbreviated as HH (household); TDHS nondiscrimination policy covering age, race, color, sex, handicap, religious creed, national origin, political beliefs, or reprisal; required civil rights and interpreter services training at least once every state fiscal year; nondiscrimination statement posting requirement; reference to USDA Nondiscrimination Statement, FNS Instruction 113-1, Policy 1.04 Limited English Proficiency, and Policy 1.05 Reasonable Modifications; procedure for filing applicant/participant discrimination complaints with USDA Office of the Assistant Secretary for Civil Rights.
