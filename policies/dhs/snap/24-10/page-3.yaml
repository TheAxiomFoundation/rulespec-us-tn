format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-10/page-3
  summary: |-
    "Any documents or collateral contacts which reasonably establish the applicant's residency must be accepted"; "No durational residency requirement will be established"; home visits may verify residency only if documentary evidence cannot be obtained and the visit is scheduled in advance; contradictory information must be resolved before eligibility determination, and unresolved discrepancies lead to denial/termination.
rules:
  - name: reasonably_establishing_residency_evidence_must_be_accepted
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.10, Page 3, item 5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-10/page-3
    versions:
      - effective_from: '2019-07-01'
        formula: |-
          documents_or_collateral_contacts_reasonably_establish_residency

  - name: specific_residency_verification_type_requirement_prohibited
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.10, Page 3, item 5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-10/page-3
    versions:
      - effective_from: '2019-07-01'
        formula: |-
          true

  - name: durational_residency_requirement_prohibited
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.10, Page 3, item 6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-10/page-3
              excerpt: "No durational residency requirement will be established."
    versions:
      - effective_from: '2019-07-01'
        formula: |-
          true

  - name: documents_with_household_address_are_primary_residency_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.10, Page 3, item 7
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-10/page-3
    versions:
      - effective_from: '2019-07-01'
        formula: |-
          evidence_is_necessary_to_establish_residence

  - name: home_visit_may_verify_residency
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.10, Page 3, item 11
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-10/page-3
    versions:
      - effective_from: '2019-07-01'
        formula: |-
          documentary_evidence_cannot_be_obtained
          and home_visit_scheduled_in_advance_with_snap_household

  - name: duplicate_address_may_require_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.10, Page 3, item 10
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-10/page-3
    versions:
      - effective_from: '2019-07-01'
        formula: |-
          duplicate_address_exists

  - name: reasonable_opportunity_to_resolve_discrepancy_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.10, Page 3, item 13
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-10/page-3
    versions:
      - effective_from: '2019-07-01'
        formula: |-
          another_source_contradicts_household_statements

  - name: benefits_denied_or_terminated_for_unresolved_discrepancy
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.10, Page 3, item 13
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-10/page-3
    versions:
      - effective_from: '2019-07-01'
        formula: |-
          another_source_contradicts_household_statements
          and discrepancies_cannot_be_resolved_in_reasonable_period_of_time
