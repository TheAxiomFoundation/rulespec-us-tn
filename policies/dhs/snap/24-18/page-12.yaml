format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-12
  summary: |-
    "Monthly installment payments on a one time medical expense in the month they are due will be considered." Loan payments for a one-time medical expense are considered as a medical deduction, but additional charges such as interest or finance charges are not included. For charge accounts, only the one-time medical expense as billed on the first charge account statement is considered, and treating charge-account payments as a repayment plan is not considered.
rules:
  - name: monthly_installment_medical_deduction
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Policy 24.18, page 12, item 4
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-12
              excerpt: "Effective Date: 09/17/2018"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-12
    versions:
      - effective_from: '2018-09-17'
        formula: |-
          if monthly_installment_is_due_for_one_time_medical_expense and (repayment_plan_established_before_certification or medical_expense_has_not_previously_been_considered): monthly_installment_payment_amount else: 0
  - name: loan_medical_deduction
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Policy 24.18, page 12, item 5
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-12
              excerpt: "Effective Date: 09/17/2018"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-12
    versions:
      - effective_from: '2018-09-17'
        formula: |-
          if loan_received_to_pay_one_time_medical_expense: max(0, monthly_loan_payment_amount - additional_loan_or_charge_account_charges_amount) else: 0
  - name: charge_account_first_statement_medical_deduction
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Policy 24.18, page 12, item 6
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-12
              excerpt: "Effective Date: 09/17/2018"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-12
    versions:
      - effective_from: '2018-09-17'
        formula: |-
          if one_time_medical_expense_billed_on_first_charge_account_statement and not household_is_treating_charge_account_payment_as_repayment_plan: charge_account_first_statement_one_time_medical_expense_amount else: 0
