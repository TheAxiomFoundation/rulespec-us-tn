format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-11
  summary: |-
    When a HH moves to another state, TDHS shall initiate or continue collection action for any over issuance that occurred while under TDHS jurisdiction. The county office shall restore lost benefits caused by administrative error, reversed IPV disqualification, or federal regulation entitlement, limited to not more than twelve months before the earlier request or discovery date. Judicially found wrongful withholding and county-discovered errors have parallel restoration duties and twelve-month limits.
rules:
  - name: general_restoration_lookback_month_limit
    kind: parameter
    dtype: Count
    source: Policy 24.22 L.1.d-f
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-11
              excerpt: "not more than twelve (12) months"
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          12

  - name: judicial_first_action_restoration_lookback_month_limit
    kind: parameter
    dtype: Count
    source: Policy 24.22 L.2.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-11
              excerpt: "not more than twelve months from the date the court action was initiated"
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          12

  - name: judicial_review_restoration_lookback_month_limit
    kind: parameter
    dtype: Count
    source: Policy 24.22 L.2.c-f
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-11
              excerpt: "not more than twelve (12) months"
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          12

  - name: county_discovery_restoration_lookback_month_limit
    kind: parameter
    dtype: Count
    source: Policy 24.22 L.3.b-d
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-11
              excerpt: "lost more than twelve (12) months prior"
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          12

  - name: tdhs_collection_action_required_after_out_of_state_move
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.22, page 11
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-11
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          household_moved_to_another_state
          and overissuance_occurred_while_under_tdhs_jurisdiction

  - name: general_lost_benefits_restoration_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.22 L.1.a-f
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-11
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-11
              excerpt: "not more than twelve (12) months"
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          (lost_benefits_caused_by_administrative_error
          or administrative_disqualification_decision_for_ipv_subsequently_reversed
          or federal_regulations_specifically_state_household_entitled_to_restoration)
          and months_of_lost_benefits_before_earlier_request_or_discovery <= general_restoration_lookback_month_limit

  - name: judicial_first_action_lost_benefits_restoration_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.22 L.2.a-b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-11
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-11
              excerpt: "not more than twelve months from the date the court action was initiated"
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          judicial_action_found_benefits_wrongfully_withheld
          and judicial_action_is_first_action_to_obtain_restoration
          and months_from_court_action_initiation <= judicial_first_action_restoration_lookback_month_limit

  - name: judicial_review_lost_benefits_restoration_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.22 L.2.a,c-f
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-11
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-11
              excerpt: "Never more than one year from when TDHS is notified of, or discovers the loss"
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          judicial_action_found_benefits_wrongfully_withheld
          and judicial_action_reviews_county_office_action
          and months_before_first_request_or_fair_hearing_action <= judicial_review_restoration_lookback_month_limit
          and not restoration_more_than_one_year_from_tdhs_notice_or_discovery

  - name: county_discovered_lost_benefits_restoration_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.22 L.3.a-d
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-11
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-11
              excerpt: "lost more than twelve (12) months prior"
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          county_office_determines_loss_of_benefits_occurred
          and household_entitled_to_restoration_of_those_benefits
          and months_lost_before_county_discovery_or_notification <= county_discovery_restoration_lookback_month_limit
