    us-tn:policies/dhs/snap/24-18/page-4#input.monthly_income_after_other_applicable_deductions: 1000
  output:
    us-tn:policies/dhs/snap/24-18/page-4#excess_shelter_income_share_threshold: 0.5
    us-tn:policies/dhs/snap/24-18/page-4#excess_shelter_costs_before_maximum: 0
- name: excess shelter cost above half income
  period: 2024-01
  input:
    us-tn:policies/dhs/snap/24-18/page-4#input.monthly_shelter_costs: 800
    us-tn:policies/dhs/snap/24-18/page-4#input.monthly_income_after_other_applicable_deductions: 1000
  output:
    us-tn:policies/dhs/snap/24-18/page-4#excess_shelter_costs_before_maximum: 300
