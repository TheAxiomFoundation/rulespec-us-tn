              table:
                header: "Table I Gross Income Standard"
                row_key: household_size
                column_key: gross_income_standard
              excerpt: "$1174 $1579 $1984 $2389 $2794 $3200 $3605 $4010 $4416 $4822 For each additional member add $406"
    versions:
