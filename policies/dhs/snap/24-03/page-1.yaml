format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-03/page-1
  summary: |-
    SNAP Timeliness Standards (Policy 24.03, effective 02/01/2022). Standard of promptness is 7 calendar days for expedited applications and 30 calendar days for regular applications. Expedited benefits must be received on or before the 7th calendar day following the application date. If the household lacks an EBT card, the application must be processed on or before the 4th calendar day so the card and benefits can be issued by the 7th day.
rules:
  - name: expedited_processing_standard_days
    kind: parameter
    dtype: Integer
    source: SNAP Policy 24.03, A.2-A.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-03/page-1
              excerpt: "seven (7) calendar days for expedited applications"
    versions:
      - effective_from: '2022-02-01'
        formula: |-
          7
  - name: regular_processing_standard_days
    kind: parameter
    dtype: Integer
    source: SNAP Policy 24.03, A.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-03/page-1
              excerpt: "thirty (30) calendar days for regular applications"
    versions:
      - effective_from: '2022-02-01'
        formula: |-
          30
  - name: expedited_no_ebt_processing_standard_days
    kind: parameter
    dtype: Integer
    source: SNAP Policy 24.03, A.5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-03/page-1
              excerpt: "the application should be processed on or before the fourth (4th) calendar day"
    versions:
      - effective_from: '2022-02-01'
        formula: |-
          4
  - name: application_processing_deadline_days
    kind: derived
    entity: Household
    dtype: Integer
    period: Month
    source: SNAP Policy 24.03, A.3-A.5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-03/page-1
              excerpt: "the application should be processed on or before the fourth (4th) calendar day to ensure that the card and beneﬁts would be received by the seventh (7th) calendar day"
    versions:
      - effective_from: '2022-02-01'
        formula: |-
          if application_is_expedited:
            if household_has_ebt_card: expedited_processing_standard_days
            else: expedited_no_ebt_processing_standard_days
          else: regular_processing_standard_days
