format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-2
  summary: |-
    "Change reporting (or Non-Simplified Reporting) households must report certain changes within ten (10) days of the date they become known." "Simplified Reporting households must report certain changes within the first ten (10) days of the month following the month the change occurred." "All households must report if any member of the household receives substantial lottery or gambling winnings within ten (10) days of receipt." "Simplified Reporting households are households certified between four (4) to six (6) months whose sole income source is not from self-employment OR households that are eligible and certified for a twenty-four (24) months certification."
rules:
  - name: change_reporting_days_after_change_known
    kind: parameter
    dtype: Count
    source: SNAP Continued Responsibilities Policy 24.25, Staff Responsibilities 1(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-2
              excerpt: "within ten (10) days of the date they become known"
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          10
  - name: simplified_reporting_days_after_following_month_begins
    kind: parameter
    dtype: Count
    source: SNAP Continued Responsibilities Policy 24.25, Staff Responsibilities 1(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-2
              excerpt: "within the first ten (10) days of the month following the month the change occurred"
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          10
  - name: substantial_winnings_reporting_days_after_receipt
    kind: parameter
    dtype: Count
    source: SNAP Continued Responsibilities Policy 24.25, Staff Responsibilities 1(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-2
              excerpt: "within ten (10) days of receipt"
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          10
  - name: simplified_reporting_short_certification_min_months
    kind: parameter
    dtype: Count
    source: SNAP Continued Responsibilities Policy 24.25, Household's Responsibilities 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-2
              excerpt: "certified between four (4) to six (6) months"
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          4
  - name: simplified_reporting_short_certification_max_months
    kind: parameter
    dtype: Count
    source: SNAP Continued Responsibilities Policy 24.25, Household's Responsibilities 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-2
              excerpt: "certified between four (4) to six (6) months"
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          6
  - name: twenty_four_month_certification_length
    kind: parameter
    dtype: Count
    source: SNAP Continued Responsibilities Policy 24.25, Household's Responsibilities 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-2
              excerpt: "twenty-four (24) months certification"
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          24
  - name: simplified_reporting_household
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Continued Responsibilities Policy 24.25, Household's Responsibilities 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-2
          - path: versions[0].formula
            kind: import
            import:
              target: us-tn:policies/dhs/snap/24-25/page-2#simplified_reporting_short_certification_min_months
              output: simplified_reporting_short_certification_min_months
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-tn:policies/dhs/snap/24-25/page-2#simplified_reporting_short_certification_max_months
              output: simplified_reporting_short_certification_max_months
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-tn:policies/dhs/snap/24-25/page-2#twenty_four_month_certification_length
              output: twenty_four_month_certification_length
              hash: sha256:local
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          (household_certification_months >= simplified_reporting_short_certification_min_months and household_certification_months <= simplified_reporting_short_certification_max_months and not household_sole_income_source_is_self_employment)
          or (household_eligible_for_twenty_four_month_certification and household_certification_months == twenty_four_month_certification_length)
