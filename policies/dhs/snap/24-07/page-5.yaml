format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-07/page-5
  summary: |-
    Length of Penalty: fraudulent identity or residence representation to receive multiple benefits simultaneously is ten years; fleeing felon or probation/parole violator disqualification lasts while fleeing or in violation; first controlled-substance benefit trading violation is twenty-four months; specified second controlled-substance, firearms/ammunition/explosives, post-cutoff drug felony, firearms transaction, and trafficking $500 or more violations are permanent.
rules:
  - name: fraudulent_multiple_benefits_disqualification_years
    kind: parameter
    dtype: Count
    period: Year
    source: SNAP Policy 24.07, Length of Penalty item 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-07/page-5
              excerpt: "disqualified for ten (10) years"
    versions:
      - effective_from: '2022-09-01'
        formula: |-
          10

  - name: first_controlled_substance_trading_disqualification_months
    kind: parameter
    dtype: Count
    period: Month
    source: SNAP Policy 24.07, Length of Penalty item 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-07/page-5
              excerpt: "twenty-four (24) months"
    versions:
      - effective_from: '2022-09-01'
        formula: |-
          24

  - name: trafficking_benefits_permanent_disqualification_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: SNAP Policy 24.07, Length of Penalty item 6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-07/page-5
              excerpt: "aggregate amount of five hundred dollars ($500) or more"
    versions:
      - effective_from: '2022-09-01'
        formula: |-
          500

  - name: fraudulent_multiple_benefits_disqualification_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.07, Length of Penalty item 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-07/page-5
    versions:
      - effective_from: '2022-09-01'
        formula: |-
          individual_found_to_have_made_fraudulent_identity_or_residence_representation_to_receive_multiple_benefits_simultaneously

  - name: fleeing_or_violation_disqualification_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.07, Length of Penalty item 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-07/page-5
    versions:
      - effective_from: '2022-09-01'
        formula: |-
          individual_determined_to_be_fleeing_felon
          or individual_determined_to_be_probation_or_parole_violator

  - name: first_controlled_substance_trading_disqualification_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.07, Length of Penalty item 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-07/page-5
    versions:
      - effective_from: '2022-09-01'
        formula: |-
          individual_has_first_violation_with_court_finding_for_trading_benefits_for_controlled_substance

  - name: permanent_snap_disqualification_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.07, Length of Penalty items 4-6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-07/page-5
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-07/page-5
              excerpt: "aggregate amount of five hundred dollars ($500) or more"
          - path: versions[0].formula
            kind: import
            import:
              target: us-tn:policies/dhs/snap/24-07/page-5#trafficking_benefits_permanent_disqualification_threshold
              output: trafficking_benefits_permanent_disqualification_threshold
              hash: sha256:local
    versions:
      - effective_from: '2022-09-01'
        formula: |-
          individual_has_second_violation_with_court_finding_for_trading_benefits_for_controlled_substance
          or individual_has_first_violation_with_court_finding_for_trading_firearms_ammunition_or_explosives_for_benefits
          or (individual_convicted_of_felony_offense_involving_possession_use_or_distribution_of_controlled_substance and felony_offense_occurred_after_applicable_cutoff_date and not section_g_excluded_household_member_exception_applies)
          or individual_found_by_court_to_have_used_or_received_benefits_in_transaction_involving_sale_of_firearms_ammunition_or_explosives
          or individual_convicted_by_court_of_trafficking_benefits_for_aggregate_amount >= trafficking_benefits_permanent_disqualification_threshold
