format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-11
  summary: '"Only the following should be considered: hospitalization; out-patient
    care; and nursing home care." "Medical expenses are allowed only after reimbursements
    have been determined." "Medical expenses are not allowed if the amount of the
    reimbursement cannot be established." "The HH''s statement that no reimbursement
    will be received, unless questionable is acceptable." "For a one-time expense,
    the currently existing balance still owed at the time the amount of reimbursement
    is verified is allowed."'
rules:
- name: non_household_member_medical_expense_considered
  kind: derived
  entity: Person
  dtype: Judgment
  period: Month
  source: "Policy 24.18, Responsibility for Medical Expenses of a Non-Household Member,\
    \ \xB64(b)-(c)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-11
          excerpt: The individual must have been an eligible HH member, and eligible
            for a medical deduction, immediately prior
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-11
          excerpt: 'Only the following should be considered: hospitalization; out-patient
            care; and nursing home care.'
  versions:
  - effective_from: '2018-09-17'
    formula: "household_is_responsible_for_non_household_member_medical_expense\n\
      and non_household_member_was_eligible_household_member_immediately_prior_to_hospital_nursing_home_or_death\n\
      and non_household_member_was_eligible_for_medical_deduction_immediately_prior_to_hospital_nursing_home_or_death\n\
      and (\n  expense_is_hospitalization\n  or expense_is_outpatient_care\n  or expense_is_nursing_home_care\n\
      )"
- name: possible_medical_reimbursement_exists
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: "Policy 24.18, \xA7R.1(b)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-11
          excerpt: Possible reimbursements for a medical expense exist anytime the
            individual has Medicare, or health or hospitalization insurance.
  versions:
  - effective_from: '2018-09-17'
    formula: 'individual_has_medicare

      or individual_has_health_or_hospitalization_insurance'
- name: medical_expense_reimbursement_amount_established
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: "Policy 24.18, \xA7R.2(a)-(b), \xA7R.3(a)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-11
          excerpt: Medical expenses are allowed only when the client is able to verify
            the amount of reimbursement
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-11
          excerpt: The HH's statement that no reimbursement will be received, unless
            questionable is acceptable.
  versions:
  - effective_from: '2018-09-17'
    formula: "client_can_verify_medical_reimbursement_amount\nor (\n  household_states_no_medical_reimbursement_will_be_received\n\
      \  and\n  not household_statement_about_no_reimbursement_is_questionable\n)"
- name: medical_expense_allowed_after_reimbursement
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: "Policy 24.18, \xA7R.1(a), \xA7R.2(a)-(b)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-11
          excerpt: Medical expenses are allowed only after reimbursements have been
            determined.
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-11
          excerpt: Medical expenses are not allowed if the amount of the reimbursement
            cannot be established.
  versions:
  - effective_from: '2018-09-17'
    formula: 'expense_is_medical_expense

      and medical_expense_reimbursement_amount_established'
- name: one_time_medical_expense_allowed_amount
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: USD
  source: "Policy 24.18, \xA7R.2(c)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-11
          excerpt: For a one-time expense, the currently existing balance still owed
            at the time the amount of reimbursement is verified is allowed.
  versions:
  - effective_from: '2018-09-17'
    formula: 'if medical_expense_is_one_time_expense and medical_expense_reimbursement_amount_established:
      medical_expense_balance_still_owed_when_reimbursement_verified else: 0'
