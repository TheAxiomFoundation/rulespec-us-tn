format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-06/page-6
  summary: |-
    Group living arrangements may purchase and prepare food for eligible residents when residents normally obtain meals at a central location or meals are prepared centrally for delivery. If residents buy or prepare food for home consumption, the arrangement should ensure each resident's SNAP benefits are used for meals intended for that resident. The arrangement must be authorized by TDMHSAS or TDOH; wholesaler authorization may be requested but is not required for SNAP approval. The eligibility counselor must verify nonprofit status. Blind or disabled residents may voluntarily apply for SNAP, and residents may apply and be certified through a designated AR, on their own behalf, or through an AR of their own choice.
rules:
  - name: group_living_arrangement_may_purchase_and_prepare_food_for_resident
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: "Tennessee DHS SNAP Policy 24.06(E)(1)"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-06/page-6
    versions:
      - effective_from: '2019-07-01'
        formula: |-
          resident_is_eligible_group_living_arrangement_resident
          and (resident_normally_obtains_meals_at_central_location_as_part_of_group_living_arrangement_services or meals_prepared_at_central_location_for_delivery_to_resident)

  - name: group_living_arrangement_home_consumption_benefit_use_assurance_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: "Tennessee DHS SNAP Policy 24.06(E)(2)"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-06/page-6
    versions:
      - effective_from: '2019-07-01'
        formula: |-
          resident_is_in_group_living_arrangement
          and resident_purchases_or_prepares_food_for_home_consumption

  - name: group_living_arrangement_authorized_by_state_agency
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: "Tennessee DHS SNAP Policy 24.06(E)(3)"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-06/page-6
    versions:
      - effective_from: '2019-07-01'
        formula: |-
          group_living_arrangement_authorized_by_tdmhsas
          or group_living_arrangement_authorized_by_tdoh

  - name: group_living_arrangement_need_not_be_certified_as_wholesaler_for_snap_approval
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: "Tennessee DHS SNAP Policy 24.06(E)(5)"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-06/page-6
    versions:
