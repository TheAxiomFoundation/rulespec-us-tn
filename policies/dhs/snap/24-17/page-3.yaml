format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-17/page-3
  summary: |-
    "The identity of the applicant shall be verified." "Residency is a requirement for SNAP, and it must be verified at each application that the household is a resident of the State of Tennessee except in unusual circumstances." "Alien status shall be verified if members of the household are identified as aliens." "Once an SSN has been verified, it does not need to be re-verified." "The number of household members shall be verified at each certification as well as anytime the household size changes." "Liquid and non-liquid countable resources shall be verified." "All non-exempt gross income (earned and unearned) shall be verified prior to approval."
rules:
  - name: applicant_identity_verification_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.17, Page 3, item 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-17/page-3
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-17/page-3
              excerpt: "Effective Date: 02/01/2022"
    versions:
