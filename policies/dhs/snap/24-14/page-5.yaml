  period: Month
  source: SNAP Policy 24.14, page 5, item 17
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-14/page-5
          excerpt: earned income of a household member under age eighteen (18) if
  versions:
