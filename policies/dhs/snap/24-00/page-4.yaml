  summary: |-
    SNAP Rights and Responsibilities of Applicants/Participants, Policy 24.00, Page 4 of 9. Lists contact addresses (One DHS Contact Center, Family Assistance Director of Operations, Commissioner at TDHS James K. Polk Building, Nashville). Section F: Civil Rights Compliance Review and Resolution of Non-Compliance — Quality Control reviews ensure county offices comply with Civil Rights; staff refer to the Language Access/Disability Access and Civil Right Review Questionnaire. When noncompliance is determined, voluntary compliance steps are taken immediately; effective date of noncompliance finding is the date of written notice. Required actions: (a) immediate written notice to local agency/subrecipient indicating noncompliance areas and required corrective action; (b) negotiation to achieve compliance; (c) Findings of Noncompliance letters submitted to Regional Civil Rights Officer where corrective action not completed within sixty (60) days of finding, with attached documentation including: brief statement of allegations factually supported, statement of actions taken to achieve voluntary compliance, list of available witnesses with addresses, official titles, and brief statement of testimony matter, and relevant contracts, assurances, and agreements between State agency, local agency, and other subrecipient.
