format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-23/page-2
  summary: |-
    "An individual shall be allowed to request a fair hearing ... within ninety (90) days"; appeals are accepted within that limit unless good cause is shown. "When a SNAP household requests a hearing within ten (10) calendar days" from advance notice to reduce or terminate assistance before certification ends, benefits may continue unless waived; good cause can allow continuation after ten days.
rules:
  - name: fair_hearing_request_time_limit_days
    kind: parameter
    dtype: Count
    source: SNAP Appeals and Fair Hearings Policy 24.23, Time Limits for Appeals item 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-23/page-2
              excerpt: "within ninety (90) days"
    versions:
      - effective_from: '2021-07-15'
        formula: |-
          90

  - name: benefit_continuation_request_time_limit_days
    kind: parameter
    dtype: Count
    source: SNAP Appeals and Fair Hearings Policy 24.23, Continuation of Benefits item 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-23/page-2
              excerpt: "within ten (10) calendar days"
    versions:
      - effective_from: '2021-07-15'
        formula: |-
          10

  - name: fair_hearing_request_timely
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: SNAP Appeals and Fair Hearings Policy 24.23, Time Limits for Appeals items 1-2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-23/page-2
              excerpt: "excluding the first (1st) day and including the last day, unless the last day is a weekend or legal holiday"
    versions:
      - effective_from: '2021-07-15'
        formula: |-
          computed_calendar_days_after_action_notice <= fair_hearing_request_time_limit_days
          or filing_day_is_next_working_day_after_weekend_or_legal_holiday_deadline

  - name: appeal_for_fair_hearing_accepted
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: SNAP Appeals and Fair Hearings Policy 24.23, Time Limits for Appeals item 2; Good Cause for Filing a Late Appeal item 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-23/page-2
              excerpt: "accepted only if they are filed within these time limits unless good cause can be shown"
    versions:
      - effective_from: '2021-07-15'
        formula: |-
          fair_hearing_request_timely
          or good_cause_for_late_fair_hearing_request_approved

  - name: snap_benefits_may_be_continued_pending_hearing
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Appeals and Fair Hearings Policy 24.23, Good Cause for Filing a Late Appeal item 1; Continuation of Benefits item 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-23/page-2
              excerpt: "SNAP benefits may be continued pending the hearing decision, unless the recipient waives continuation"
    versions:
      - effective_from: '2021-07-15'
        formula: |-
          household_requests_hearing
          and intended_action_would_reduce_or_terminate_assistance_before_certification_ends
          and not recipient_waives_continuation_of_benefits
          and (computed_calendar_days_after_advance_written_notice <= benefit_continuation_request_time_limit_days
          or good_cause_for_late_benefit_continuation_request_approved)
