format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-27/page-7
  summary: |-
    Term Definition: "Responsible person Someone who is mentally and physically capable of providing adequate child care for the household as defined herein." "Student A student is a person who meets all of the following criteria: is at least age eighteen (18), but under age fifty (50); is physically and mentally fit; and is enrolled at least half time in an institution of higher education."
