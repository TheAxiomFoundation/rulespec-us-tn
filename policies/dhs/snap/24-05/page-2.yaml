  summary: |-
    SNAP Authorized Representatives, Policy 24.05, page 2 of 4: covers recording the AR in the case record; making application for the HH (head/spouse should complete or review when possible; AR may complete work registration/E&T referral; HH liable for over issuance from AR's incorrect information unless in drug/alcohol treatment center; non-HH AR may apply when responsible members cannot; HH may designate AR to obtain SNAP benefits); using SNAP benefits via EBT card and PIN with HH consent; emergency AR when neither responsible HH member nor regular AR can obtain benefits; disqualification of AR for up to one year when AR has knowingly misrepresented HH circumstances, provided false information, or improperly used benefits, with written notice of disqualification.
