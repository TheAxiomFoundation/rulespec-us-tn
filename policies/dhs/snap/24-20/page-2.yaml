format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-20/page-2
  summary: |-
    "Any Federal, State, or Local Government Employee, who participates in a strike against such governments and is dismissed from their job because of participation in the strike, shall be considered to have voluntarily quit their job without good cause." "Striker" is defined as employees' refusal to perform assigned work to force employer demands.
rules:
  - name: striker
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.20, Definitions/Acronyms, "Striker"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-20/page-2
    versions:
      - effective_from: '2021-07-01'
        formula: |-
          employee_refuses_to_perform_assigned_work_to_force_employer_demands
  - name: government_employee_strike_dismissal_treated_as_voluntary_quit_without_good_cause
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.20, Procedures for a Household that Contains a Striker, item 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-20/page-2
    versions:
      - effective_from: '2021-07-01'
        formula: |-
          employee_is_federal_state_or_local_government_employee
          and employee_participates_in_strike_against_that_government
          and employee_is_dismissed_from_job_because_of_participation_in_strike
