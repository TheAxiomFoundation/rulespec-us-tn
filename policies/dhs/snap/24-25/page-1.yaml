format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-1
  summary: |-
    Effective: February 15, 2023. The period of eligibility for a SNAP household is its certification period. A partial month of benefits is considered one of the months in the certification period even if that month prorates to zero, if otherwise eligible. At expiration of each certification period, entitlement to SNAP benefits will end and benefits shall not be continued without a new application and a determination of eligibility, even if the household requested a fair hearing.
rules:
  - name: partial_benefit_month_counts_in_certification_period
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Continued Responsibilities Policy 24.25, Establishing Certification Periods, 1.c
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-1
              excerpt: "A partial month of benefits is considered one of the months in the certification period even if that month prorates to zero (0), if otherwise eligible."
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          month_is_partial_benefit_month
          and household_otherwise_eligible_for_snap

  - name: benefits_may_continue_after_certification_period_expiration
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Continued Responsibilities Policy 24.25, Establishing Certification Periods, 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-1
              excerpt: "benefits shall not be continued without a new application and a determination of eligibility"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-1
              excerpt: "even if the household has requested a fair hearing"
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          certification_period_has_expired
          and household_submitted_new_application
          and new_application_eligibility_determined
