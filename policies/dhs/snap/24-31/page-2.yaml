format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-31/page-2
  summary: |-
    Qualifying families will receive a one-time payment of $120.00 for each eligible school-aged child. The child must be included in an open and active SNAP and/or Families First case as of May 31, 2025; reside in one of the listed counties in EBMS as of May 31, 2025; and be at least five but not older than eighteen as of May 1, 2025. No application is required; benefits are issued to the household's existing EBT account in June 2025. Appeals must be filed within thirty days of benefit issuance.
rules:
  - name: tsni_child_benefit_amount
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: Policy 24.31, page 2, Eligibility
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-31/page-2
              excerpt: "one-time payment of $120.00 for each eligible school-aged child"
    versions:
      - effective_from: '2025-06-01'
        formula: |-
          120

  - name: tsni_child_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Policy 24.31, page 2, Eligibility items 1-3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-31/page-2
              excerpt: "included in an open and active SNAP and/or Families First case as of May 31, 2025"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-31/page-2
              excerpt: "residing in Benton, Carroll, Carter, Cocke, Fayette, Grainger, Houston, Humphreys, Johnson, Lauderdale, Marshall, Moore, Rhea, Sequatchie, or Sumner Counties as of May 31, 2025"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-31/page-2
              excerpt: "at least five (5) years old but not older than eighteen (18) years old as of May 1, 2025"
    versions:
      - effective_from: '2025-06-01'
        formula: |-
          child_in_open_active_snap_or_families_first_case_as_of_eligibility_snapshot
          and child_case_certification_period_does_not_end_before_eligibility_snapshot
          and child_case_designated_in_ebms_as_residing_in_tsni_county_as_of_eligibility_snapshot
          and child_is_at_least_five_and_not_older_than_eighteen_as_of_age_snapshot

  - name: tsni_benefit_for_child
    kind: derived
    entity: Person
    dtype: Money
    unit: USD
    period: Month
    source: Policy 24.31, page 2, Eligibility and Issuance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-31/page-2
              excerpt: "Children must meet all eligibility criteria to receive a TSNI benefit."
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-31/page-2
              excerpt: "one-time payment of $120.00 for each eligible school-aged child"
          - path: versions[0].formula
            kind: import
            import:
              target: us-tn:policies/dhs/snap/24-31/page-2#tsni_child_benefit_amount
              output: tsni_child_benefit_amount
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-tn:policies/dhs/snap/24-31/page-2#tsni_child_eligible
              output: tsni_child_eligible
              hash: sha256:local
    versions:
      - effective_from: '2025-06-01'
        formula: |-
          if tsni_child_eligible: tsni_child_benefit_amount else: 0

  - name: appeal_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.31, page 2, Appeals
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-31/page-2
              excerpt: "must be filed within thirty (30) days of benefit issuance"
    versions:
      - effective_from: '2025-06-01'
        formula: |-
          tsni_appeal_filed_within_thirty_days_of_benefit_issuance
