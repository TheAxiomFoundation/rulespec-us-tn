format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-31/page-1
  summary: |-
    "Each eligible child will receive a one-time benefit of $120.00." TDHS will issue the 2025 TSNI benefit to qualifying children in SNAP and Families First households across fifteen counties with limited SFSP/SSO access, with no application required.
rules:
  - name: eligible_child_one_time_benefit_amount
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: Tennessee Summer Nutrition Initiative Policy 24.31, Policy Benefit Amount
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-31/page-1
              excerpt: "Each eligible child will receive a one-time benefit of $120.00."
    versions:
      - effective_from: '2025-06-01'
        formula: |-
          120.00

  - name: tsni_benefit_amount
    kind: derived
    entity: Person
    dtype: Money
    unit: USD
    period: Month
    source: Tennessee Summer Nutrition Initiative Policy 24.31, Introduction and Policy Benefit Amount
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-31/page-1
              excerpt: "Each eligible child will receive a one-time benefit of $120.00."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-31/page-1
    versions:
      - effective_from: '2025-06-01'
        formula: |-
          if child_is_eligible_for_tsni: eligible_child_one_time_benefit_amount else: 0
