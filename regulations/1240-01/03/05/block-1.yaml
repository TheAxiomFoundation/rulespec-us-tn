  status: deferred
  summary: |-
    An applicant/recipient may have both a physical address and a mailing address. If the two are different, both addresses will be required. A mailing address only, such as post office box, general delivery or a rural route, will not be sufficient as it does not indicate that the HH/AG resides in the county. If the address is a rural route, information must be given to identify the exact location of the home.
