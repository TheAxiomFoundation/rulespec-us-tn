format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-07/page-4
  summary: |-
    "An individual is not a fleeing felon or a probation or parole violator if the law enforcement agency does not intend to enforce the felony warrant or to arrest the individual for a probation or parole violation within thirty (30) days of the status information request." The page also lists ineligible ABAWDs and persons convicted of post-August 22, 1996 felony drug offenses involving controlled substances, unless stated compliance and treatment-verification exceptions apply; Class A drug-related felony convictions are not exempted.
rules:
  - name: law_enforcement_status_information_request_window_days
    kind: parameter
    dtype: Count
    source: SNAP Policy 24.07, page 4, fleeing felon and probation/parole violator exception
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-07/page-4
              excerpt: "within thirty (30) days of the status information request"
    versions:
      - effective_from: '2022-09-01'
        formula: |-
          30

  - name: individual_not_fleeing_felon_due_to_no_enforcement_intent
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.07, page 4, fleeing felon exception
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-07/page-4
    versions:
      - effective_from: '2022-09-01'
        formula: |-
          individual_has_felony_warrant
          and not law_enforcement_agency_intends_to_enforce_felony_warrant_within_status_information_request_window

  - name: individual_not_probation_or_parole_violator_due_to_no_arrest_intent
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.07, page 4, probation/parole violator exception
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-07/page-4
    versions:
      - effective_from: '2022-09-01'
        formula: |-
          individual_has_probation_or_parole_violation
          and not law_enforcement_agency_intends_to_arrest_for_probation_or_parole_violation_within_status_information_request_window

  - name: ineligible_abawd_excluded_household_member
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.07, page 4, item 11
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-07/page-4
    versions:
      - effective_from: '2022-09-01'
        formula: |-
          individual_is_ineligible_able_bodied_adult_without_dependents

  - name: felony_drug_conviction_treatment_exception
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.07, page 4, item 12(a)-(e) and (g)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-07/page-4
    versions:
      - effective_from: '2022-09-01'
        formula: |-
          individual_is_complying_with_or_has_complied_with_all_criminal_court_obligations
          and (
            individual_currently_participates_in_tdhs_approved_substance_abuse_treatment_program
            or individual_enrolled_in_tdhs_approved_substance_abuse_treatment_program_waiting_list_and_will_enter_at_first_opportunity
            or individual_satisfactorily_completed_tdhs_approved_substance_abuse_program
            or individual_determined_by_tdmhsas_not_to_need_substance_abuse_treatment
            or individual_received_substance_abuse_treatment_in_another_state_program_licensed_or_approved_by_that_state
            or individual_has_judicial_diversion_for_class_e_felony_drug_charges_and_cooperates_or_completed_probation
          )

  - name: felony_drug_exemption_unavailable_for_class_a
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.07, page 4, item 12(f)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-07/page-4
    versions:
      - effective_from: '2022-09-01'
        formula: |-
          individual_convicted_of_class_a_drug_related_felony_or_equivalent

  - name: felony_drug_offense_excluded_household_member
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.07, page 4, item 12
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-07/page-4
              excerpt: "felony drug offense which occurred after August 22, 1996"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-07/page-4
    versions:
      - effective_from: '2022-09-01'
        formula: |-
          individual_convicted_under_federal_or_state_law_of_felony_drug_offense
          and felony_drug_offense_occurred_after_cutoff_date
          and felony_drug_offense_involved_possession_use_or_distribution_of_controlled_substance
          and (
            felony_drug_exemption_unavailable_for_class_a
            or not felony_drug_conviction_treatment_exception
          )
