format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-7
  summary: |-
    "LIHEAP payments made directly to the HH or provider do not affect the HH's eligibility for the SUA. HHs are entitled to the SUA even if the expense is totally covered by a LIHEAP payment." "HHs receiving HUD and FmHA reimbursements are entitled to the SUA if they incur heating or cooling costs payment." "The BUA must include expenses for at least two utilities." "If the HH lives in a public housing unit or other rental housing unit the HH is charged only for excess utility costs... The HH is eligible for the BUA."
rules:
  - name: bua_minimum_utility_count
    kind: parameter
    dtype: Count
    source: Tennessee DHS SNAP Policy 24.18, Page 7, Basic Utility Allowance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-7
              excerpt: "The BUA must include expenses for at least two utilities."
    versions:
      - effective_from: '2018-09-17'
        formula: |-
          2

  - name: liheap_payment_preserves_sua_entitlement
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Tennessee DHS SNAP Policy 24.18, Page 7, Eligibility for the SUA for HHs Receiving Energy Assistance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-7
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-7
              excerpt: "Effective Date: 09/17/2018"
    versions:
      - effective_from: '2018-09-17'
        formula: |-
          household_otherwise_entitled_to_sua
          and liheap_payment_made_directly_to_household_or_provider

  - name: liheap_total_coverage_does_not_block_sua
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Tennessee DHS SNAP Policy 24.18, Page 7, Eligibility for the SUA for HHs Receiving Energy Assistance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-7
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-7
              excerpt: "Effective Date: 09/17/2018"
    versions:
      - effective_from: '2018-09-17'
        formula: |-
          household_otherwise_entitled_to_sua
          and expense_totally_covered_by_liheap_payment

  - name: hud_fmha_reimbursement_sua_entitlement
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Tennessee DHS SNAP Policy 24.18, Page 7, HUD and FmHA Utility Reimbursements
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-7
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-7
              excerpt: "Effective Date: 09/17/2018"
    versions:
      - effective_from: '2018-09-17'
        formula: |-
          household_receives_hud_or_fmha_utility_reimbursement
          and household_incurs_heating_or_cooling_costs_payment

  - name: direct_state_local_energy_assistance_preserves_sua
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Tennessee DHS SNAP Policy 24.18, Page 7, State and Local Energy Assistance and Other Vendor Payments
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-7
          - path: versions[0].effective_from
            kind: effective_period
            source:
