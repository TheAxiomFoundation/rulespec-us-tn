format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-21/page-1
  summary: |-
    Migrant or seasonal farmworker households are considered destitute when their resources do not exceed $100 and their only application-month income is from a terminated source before application, from a new source with not more than $25 received by the tenth calendar day after application, or from both such terminated and new sources. Other households shall not be classified as destitute.
rules:
  - name: destitute_resource_limit
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: SNAP Destitute Households Migrant or Seasonal Farmworkers Policy 24.21, Destitute Migrant or Seasonal Farmworker Households
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-21/page-1
              excerpt: "resources do not exceed one hundred dollars ($100)"
    versions:
      - effective_from: '2021-07-01'
        formula: |-
          100

  - name: new_source_tenth_day_income_limit
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: SNAP Destitute Households Migrant or Seasonal Farmworkers Policy 24.21, Destitute Migrant or Seasonal Farmworker Households
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-21/page-1
              excerpt: "not more than twenty-five dollars ($25)"
    versions:
      - effective_from: '2021-07-01'
        formula: |-
          25

  - name: destitute_new_source_receipt_deadline_days
    kind: parameter
    dtype: Count
    period: Day
    source: SNAP Destitute Households Migrant or Seasonal Farmworker Policy 24.21, Destitute Migrant or Seasonal Farmworker Households
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-21/page-1
              excerpt: "by the tenth (10th) calendar day after the application date"
    versions:
      - effective_from: '2021-07-01'
        formula: |-
          10

  - name: destitute_due_to_terminated_source_only
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Destitute Households Migrant or Seasonal Farmworker Policy 24.21, item 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-21/page-1
    versions:
      - effective_from: '2021-07-01'
        formula: |-
          household_is_migrant_or_seasonal_farmworker_household
          and household_resources <= destitute_resource_limit
          and household_only_application_month_income_received_from_terminated_source_prior_to_application_date

  - name: destitute_due_to_new_source_only
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Destitute Households Migrant or Seasonal Farmworker Policy 24.21, item 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-21/page-1
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-21/page-1
              excerpt: "not more than twenty-five dollars ($25)"
    versions:
      - effective_from: '2021-07-01'
        formula: |-
          household_is_migrant_or_seasonal_farmworker_household
          and household_resources <= destitute_resource_limit
          and household_only_application_month_income_from_new_source
          and new_source_income_received_by_tenth_calendar_day_after_application_date <= new_source_tenth_day_income_limit

  - name: destitute_due_to_terminated_and_new_sources
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Destitute Households Migrant or Seasonal Farmworker Policy 24.21, item 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-21/page-1
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-21/page-1
              excerpt: "not more than twenty-five dollars ($25)"
    versions:
      - effective_from: '2021-07-01'
        formula: |-
          household_is_migrant_or_seasonal_farmworker_household
          and household_resources <= destitute_resource_limit
          and household_only_application_month_income_received_from_terminated_and_new_sources
          and terminated_source_income_was_received_prior_to_application_date
          and new_source_income_received_by_tenth_calendar_day_after_application_date <= new_source_tenth_day_income_limit

  - name: destitute_migrant_or_seasonal_farmworker_household
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Destitute Households Migrant or Seasonal Farmworker Policy 24.21, Destitute Migrant or Seasonal Farmworker Households
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-21/page-1
          - path: versions[0].formula
            kind: import
            import:
              target: us-tn:policies/dhs/snap/24-21/page-1#destitute_due_to_terminated_source_only
              output: destitute_due_to_terminated_source_only
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-tn:policies/dhs/snap/24-21/page-1#destitute_due_to_new_source_only
              output: destitute_due_to_new_source_only
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-tn:policies/dhs/snap/24-21/page-1#destitute_due_to_terminated_and_new_sources
              output: destitute_due_to_terminated_and_new_sources
              hash: sha256:local
    versions:
      - effective_from: '2021-07-01'
        formula: |-
          destitute_due_to_terminated_source_only
          or destitute_due_to_new_source_only
          or destitute_due_to_terminated_and_new_sources
