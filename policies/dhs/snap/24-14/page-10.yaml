format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-14/page-10
  summary: |-
    If the amount of income or when it will be received is uncertain, the uncertain portion shall not be counted. Income received during the past thirty (30) days shall be used as an indicator of income available during the certification period, unless fluctuations require a longer period or a comparable recent season. Annual income is totaled and prorated over 12 months; annual-like income received in a shorter period is counted in the months it is intended to cover; estimated seasonal employment income is considered during months it is received.
rules:
  - name: standard_recent_income_indicator_days
    kind: parameter
    dtype: Count
    source: SNAP Policy 24.14, page 10, income received during past thirty days
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-14/page-10
              excerpt: "past thirty (30) days"
    versions:
      - effective_from: '2022-01-04'
        formula: |-
          30

  - name: annual_income_proration_months
    kind: parameter
    dtype: Count
    source: SNAP Policy 24.14, page 10, annual income prorated over 12 months
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-14/page-10
              excerpt: "prorated over 12 months"
    versions:
      - effective_from: '2022-01-04'
        formula: |-
          12

  - name: uncertain_income_portion_countable_amount
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Policy 24.14, page 10, uncertain income not counted
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-14/page-10
    versions:
      - effective_from: '2022-01-04'
        formula: |-
          if household_income_portion_amount_or_receipt_date_is_uncertain: 0 else: household_income_portion_amount

  - name: annual_income_monthly_prorated_amount
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Policy 24.14, page 10, annual income totaled and prorated
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-14/page-10
          - path: versions[0].formula
            kind: import
            import:
              target: us-tn:policies/dhs/snap/24-14/page-10#annual_income_proration_months
              output: annual_income_proration_months
              hash: sha256:local
    versions:
      - effective_from: '2022-01-04'
        formula: |-
          if income_received_annually_or_integral_part_of_annual_income: annual_income_amount / annual_income_proration_months else: 0

  - name: annual_like_short_period_income_countable_amount
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Policy 24.14, page 10, annual-like income received in shorter period
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-14/page-10
    versions:
      - effective_from: '2022-01-04'
        formula: |-
          if annual_like_income_received_in_shorter_period and current_month_is_intended_coverage_month: annual_like_short_period_income_amount else: 0

  - name: seasonal_employment_income_countable_amount
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Policy 24.14, page 10, seasonal employment income considered during months received
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-14/page-10
    versions:
      - effective_from: '2022-01-04'
        formula: |-
          if current_month_is_month_seasonal_income_received: estimated_average_income_from_migrant_labor_seasonal_farm_work_or_other_seasonal_employment else: 0
