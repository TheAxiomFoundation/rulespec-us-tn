format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-6
  summary: |-
    Notice of adverse action includes reduction in SNAP allotment, termination within certification period, reduction in certification period length, or removal of a household member. It is timely if mailed at least ten (10) days before the effective date, adequate if understandable and includes the action, reason, fair hearing right, and contact number. No notice is required for mass changes, household moves out of state, all members died, completed restoration after prior written notice, or monthly allotments varying based on anticipated changes.
rules:
  - name: adverse_action_notice_minimum_days_before_effective_date
    kind: parameter
    dtype: Count
    source: SNAP Continued Responsibilities, Policy 24.25 page 6, item 1.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-6
              excerpt: "mailed at least ten (10) days prior"
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          10

  - name: adverse_action_notice_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Continued Responsibilities, Policy 24.25 page 6, item 1.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-6
              excerpt: "mailed at least ten (10) days prior to the adverse action's effective date"
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          adverse_action_notice_days_before_effective_date >= adverse_action_notice_minimum_days_before_effective_date

  - name: adverse_action_notice_adequate
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Continued Responsibilities, Policy 24.25 page 6, item 1.c
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-6
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          notice_is_easy_to_understand
          and notice_describes_actions
          and notice_describes_reason_for_action
          and notice_describes_right_to_fair_hearing
          and notice_includes_contact_number

  - name: adverse_action_notice_not_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Continued Responsibilities, Policy 24.25 page 6, item 6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-6
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          implementing_mass_change
          or household_moves_from_state
          or all_household_members_have_died
          or restoration_of_lost_benefits_completed_after_prior_written_notice
          or monthly_allotment_varies_based_on_anticipated_changes_during_certification_period

  - name: household_may_request_continued_benefits_after_adverse_action_notice
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Continued Responsibilities, Policy 24.25 page 6, item 5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-6
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          household_received_notice_of_adverse_action
          and household_wishes_to_continue_participating
          and household_files_appeal
          and household_requests_continued_benefits

  - name: household_may_file_new_application_after_adverse_action_notice
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Continued Responsibilities, Policy 24.25 page 6, item 5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-6
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          household_received_notice_of_adverse_action
          and household_wishes_to_continue_participating
          and household_files_new_application

  - name: certification_expiration_is_not_termination_for_adverse_action
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Continued Responsibilities, Policy 24.25 page 6, item 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-6
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          certification_period_expires
