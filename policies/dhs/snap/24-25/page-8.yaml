format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-8
  summary: |-
    A household will lose its right to uninterrupted benefits when it fails to provide a timely application without good cause, fails to complete the first scheduled interview on or after the date of application, or fails to provide necessary verification within ten (10) days of request or by the fifteenth (15th) of the last month of certification, whichever is later. Benefits will not continue beyond the certification period unless the household reapplies and is recertified. When a household moves, staff must not delay changing the mailing address pending verification unless a complete mailing address is not provided.
rules:
  - name: verification_response_days_allowed
    kind: parameter
    dtype: Count
    source: SNAP Continued Responsibilities Policy 24.25, recertification item 5.c
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-8
              excerpt: "within ten (10) days of the date requested"
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          10

  - name: last_month_verification_due_day
    kind: parameter
    dtype: Count
    source: SNAP Continued Responsibilities Policy 24.25, recertification item 5.c
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-8
              excerpt: "by the fifteenth (15th) of the last month of certification"
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          15

  - name: uninterrupted_benefits_lost
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Continued Responsibilities Policy 24.25, recertification item 5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-8
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          (failed_to_provide_timely_recertification_application and not good_cause_for_late_recertification_application)
          or failed_to_complete_first_scheduled_interview_on_or_after_application_date
          or failed_to_provide_necessary_verification_by_later_deadline

  - name: benefits_continue_beyond_certification_period
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Continued Responsibilities Policy 24.25, recertification item 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-8
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          household_reapplied
          and household_recetified

  - name: timely_recertification_application_may_not_be_denied_for_pending_verifications
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Continued Responsibilities Policy 24.25, recertification item 2.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-8
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          timely_recertification_application_pending_verifications
          and applicant_has_not_had_full_verification_response_period

  - name: mailing_address_change_must_not_be_delayed_for_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Continued Responsibilities Policy 24.25, When a SNAP Household Moves item 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-8
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          customer_submitted_change_in_address
          and complete_mailing_address_provided

  - name: shelter_and_utility_verification_notice_required_after_address_change
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Continued Responsibilities Policy 24.25, When a SNAP Household Moves items 3.a-3.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-8
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          customer_submitted_change_in_address
          and complete_mailing_address_provided
