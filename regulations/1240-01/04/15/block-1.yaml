  source_verification:
    corpus_citation_path: us-tn/regulation/1240-01/04/15/block-1
  summary: |-
    Certain payments and benefits which might ordinarily be considered income are excluded under federal law/regulations from consideration as income for eligibility purposes. Earnings from JTPA on-the-job training programs are excluded only for individuals under age nineteen (19) who are under parental control of another adult household member. All income from other JTPA Programs, earned or unearned is excluded. Reimbursement for expenses cannot be for basic living expenses. Educational fund exclusions: tuition; mandatory fees; origination fees and insurance fees charged by financial institutions for educational loans; books and supplies; materials; equipment; transportation; and miscellaneous personal expenses (not including room, board, and/or dependent care expenses). Reimbursement for normal living expenses of the HH or legally responsible relative, such as rent or mortgage, personal clothing or food eaten at home, are a gain or benefit and therefore are not excluded.
  status: deferred
  deferred_outputs:
    - output: us-tn:regulations/1240-01/04/15/block-1#income_exclusion_amount
      reason: |-
        Source enumerates qualitative categories of excluded income (JTPA on-the-job training for under-19 dependents, other JTPA program income, reimbursements for non-basic-living expenses, JTPA assistance for needs not covered by AFDC grant, incentive/training allowances, educational fund expenses for tuition/mandatory fees/origination fees/insurance fees/books/supplies/materials/equipment/transportation/miscellaneous personal expenses) without stating numeric amounts, rates, thresholds, caps, or limits. Encoding requires upstream definitions of JTPA program income, AFDC grant amount and ratably reduced standards, needs study, non-federal educational fund categories, and reimbursement classification facts, none of which are available as RuleSpec context.
