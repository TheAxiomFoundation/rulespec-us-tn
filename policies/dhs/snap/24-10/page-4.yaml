format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-10/page-4
  summary: |-
    Definitions/Acronyms: "Homeless An individual who lacks a fixed and regular nighttime residence or an individual who has a primary nighttime residence that is one (1) of the following..." including shelters, temporary institutions, temporary accommodation for not more than ninety (90) days in another individual's residence, or a place not designed or ordinarily used as regular sleeping accommodation.
rules:
  - name: temporary_accommodation_max_days
    kind: parameter
    dtype: Count
    source: Policy 24.10, Definitions/Acronyms, Homeless
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-10/page-4
              excerpt: "not more than ninety (90) days"
    versions:
      - effective_from: '2019-07-01'
        formula: |-
          90

  - name: homeless
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: Policy 24.10, Definitions/Acronyms, Homeless
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-10/page-4
    versions:
      - effective_from: '2019-07-01'
        formula: |-
          lacks_fixed_and_regular_nighttime_residence
          or primary_nighttime_residence_is_supervised_temporary_shelter
          or primary_nighttime_residence_is_institution_temporary_residence_for_intended_institutionalization
          or (primary_nighttime_residence_is_temporary_accommodation_in_another_individuals_residence and temporary_accommodation_days <= temporary_accommodation_max_days)
          or primary_nighttime_residence_is_place_not_designed_or_ordinarily_used_as_regular_sleeping_accommodation
