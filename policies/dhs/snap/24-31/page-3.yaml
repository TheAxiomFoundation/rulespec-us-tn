format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-31/page-3
  summary: |-
    "Households with an open and active SNAP and/or Families First case as of May 31, 2025, that are designated in EBMS as residing in one of the eligible counties; and ... at least one child age 5-18, as of May 1, 2025, included in the open and active SNAP and/or Families First case. Appeals will be completed through desk review of written material only."
rules:
  - name: household_satisfies_tsni_case_and_county_condition
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.31, Page 3, TSNI household case and county bullet
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-31/page-3
              excerpt: "open and active SNAP and/or Families First case as of May 31, 2025"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-31/page-3
              excerpt: "designated in EBMS as residing in one of the eligible counties"
    versions:
      - effective_from: '2025-06-01'
        formula: |-
          household_has_open_active_snap_or_families_first_case_on_case_reference_date
          and household_is_designated_in_ebms_as_residing_in_eligible_county

  - name: household_satisfies_tsni_child_condition
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.31, Page 3, TSNI child bullet
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-31/page-3
              excerpt: "at least one child age 5-18, as of May 1, 2025, included in the open and active SNAP and/or Families First case"
    versions:
      - effective_from: '2025-06-01'
        formula: |-
          household_has_at_least_one_child_in_tsni_age_range_on_child_reference_date_in_open_active_case

  - name: household_meets_page_3_tsni_conditions
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.31, Page 3, TSNI household bullets
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-31/page-3
    versions:
      - effective_from: '2025-06-01'
        formula: |-
          household_satisfies_tsni_case_and_county_condition
          and household_satisfies_tsni_child_condition

  - name: appeal_completed_by_written_material_desk_review
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.31, Page 3, Appeals
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-31/page-3
              excerpt: "Appeals will be completed through desk review of written material only."
    versions:
      - effective_from: '2025-06-01'
        formula: |-
          household_has_tsni_appeal

  - name: desk_review_order_is_final_administrative_determination
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.31, Page 3, Appeals
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-31/page-3
              excerpt: "Desk Review Orders are the final administrative determination"
    versions:
      - effective_from: '2025-06-01'
        formula: |-
          household_has_desk_review_order
