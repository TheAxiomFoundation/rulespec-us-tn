format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-08/page-2
  summary: |-
    "have made every effort to supply the Social Security Administration with the information necessary to obtain an SSN and have not been issued an SSN or SS5 may be granted good cause for failure to comply." "Excluded members are defined as individuals who do not meet the citizenship or eligible alien status; individuals who are disqualified for failure to provide or apply for an SSN; and individuals disqualified for intentional program violations."
rules:
  - name: good_cause_for_failure_to_comply_with_enumeration_requirement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Policy 24.08, SNAP Enumeration Requirement, page 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-08/page-2
    versions:
      - effective_from: '2021-04-15'
        formula: |-
          person_made_every_effort_to_supply_ssa_information_necessary_to_obtain_ssn
          and person_has_not_been_issued_ssn_or_ss5
  - name: excluded_household_member
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Policy 24.08, Definitions/Acronyms, Excluded Household Members
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-08/page-2
    versions:
      - effective_from: '2021-04-15'
        formula: |-
          person_does_not_meet_citizenship_or_eligible_alien_status
          or person_disqualified_for_failure_to_provide_or_apply_for_ssn
          or person_disqualified_for_intentional_program_violation
