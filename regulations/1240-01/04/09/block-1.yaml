format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/regulation/1240-01/04/09/block-1
  summary: |-
    Resources owned jointly with any other person(s) outside of the HH/AG shall be considered totally inaccessible to the HH/AG if the resource cannot practically be subdivided and the HH/AG's access to the value of the resource is dependent on the agreement of a joint owner who refuses to comply. For Food Stamp purposes ineligible aliens or disqualified individuals residing with the household shall be considered household members.
rules:
  - name: jointly_owned_resource_totally_inaccessible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Tenn. Comp. R. & Regs. 1240-01-04-.09
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/regulation/1240-01/04/09/block-1
              excerpt: |-
                Resources owned jointly with any other person(s) outside of the HH/AG shall be considered totally inaccessible to the HH/AG if the resource cannot practically be subdivided and the HH/AG's access to the value of the resource is dependent on the agreement of a joint owner who refuses to comply.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
