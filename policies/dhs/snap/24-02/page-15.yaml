format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-15
  summary: |-
    SNAP Application Processing, Policy 24.02, page 15 of 20. Expedited postponed-verification certification: certify only for the month of application unless filed after the 15th of the month, in which case certify for at least two (2) months (month of application and the following month); or assign a normal certification period. Households assigned a certification period longer than one month have thirty (30) days from the application date to provide the postponed verification. One-time medical expense options: 6-month certification (first month or average over six (6) months); 24-month certification (first month, average over first 12 (twelve) months, or average over entire 24 (twenty-four) months).
rules:
  - name: expedited_short_certification_min_months_after_fifteenth
    kind: parameter
    dtype: Count
    source: Policy 24.02 page 15, item 15.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-15
              excerpt: "certify the household for at least two (2) months (month of application and the following month)"
    versions:
      - effective_from: '2022-12-01'
        formula: |-
          2
  - name: postponed_verification_deadline_days
    kind: parameter
    dtype: Count
    source: Policy 24.02 page 15, item 16.c
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-15
              excerpt: "the household has thirty (30) days from the application date to provide the postponed verification"
    versions:
      - effective_from: '2022-12-01'
        formula: |-
          30
  - name: application_filed_after_fifteenth_cutoff_day
    kind: parameter
    dtype: Count
    source: Policy 24.02 page 15, item 15.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-15
              excerpt: "the application was filed after the fifteenth (15th) of the month"
    versions:
      - effective_from: '2022-12-01'
        formula: |-
          15
  - name: six_month_certification_length
    kind: parameter
    dtype: Count
    source: Policy 24.02 page 15, item 17.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-15
              excerpt: "households certified for six (6) months"
    versions:
      - effective_from: '2022-12-01'
        formula: |-
          6
  - name: twenty_four_month_certification_length
    kind: parameter
    dtype: Count
    source: Policy 24.02 page 15, item 17.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-15
              excerpt: "certified for twenty-four (24) months"
    versions:
      - effective_from: '2022-12-01'
        formula: |-
          24
  - name: twenty_four_month_partial_averaging_months
    kind: parameter
    dtype: Count
    source: Policy 24.02 page 15, item 17.b.ii
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-15
              excerpt: "Average the expense over the first 12 (twelve) months of the certification period"
    versions:
      - effective_from: '2022-12-01'
        formula: |-
          12
  - name: expedited_postponed_verification_certification_months
    kind: derived
    entity: Household
    dtype: Count
    period: Month
    source: Policy 24.02 page 15, item 15.a-b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-15
              excerpt: "Certify the household only for the month of application, unless the application was filed after the fifteenth (15th) of the month; When the household applies after the fifteenth (15th) of the month, certify the household for at least two (2) months"
    versions:
      - effective_from: '2022-12-01'
        formula: |-
          if assign_normal_certification_period: normal_certification_period_months
          else: if application_filed_after_fifteenth_of_month: expedited_short_certification_min_months_after_fifteenth
          else: 1
  - name: postponed_verification_deadline_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.02 page 15, item 16.c
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-15
              excerpt: "in cases where the household has been assigned a certification period longer than one month, the household has thirty (30) days from the application date to provide the postponed verification"
    versions:
      - effective_from: '2022-12-01'
        formula: |-
          expedited_postponed_verification_certification_months > 1
  - name: one_time_medical_expense_deduction_amount
    kind: derived
    entity: Household
    dtype: Money
    unit: USD
    period: Month
    source: Policy 24.02 page 15, item 17
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-15
              excerpt: "For households certified for six (6) months shall have the option to; i. Deduct the expense in the first month of the certification period, or ii. Average the expense over six (6) months of the certification period. b. For households that qualify and are certified for twenty-four (24) months have the option to: i. Deduct the expense in the first month of the certification period, ii. Average the expense over the first 12 (twelve) months of the certification period, or iii. Average the expense over the entire twenty-four (24) month certification period."
    versions:
      - effective_from: '2022-12-01'
        formula: |-
          if not household_has_one_time_medical_expense: 0
          else: if certified_for_twenty_four_months and elect_average_over_twenty_four_months: one_time_medical_expense_total / twenty_four_month_certification_length
          else: if certified_for_twenty_four_months and elect_average_over_first_twelve_months: one_time_medical_expense_total / twenty_four_month_partial_averaging_months
          else: if certified_for_six_months and elect_average_over_six_months: one_time_medical_expense_total / six_month_certification_length
          else: if month_is_first_month_of_certification_period: one_time_medical_expense_total
          else: 0
