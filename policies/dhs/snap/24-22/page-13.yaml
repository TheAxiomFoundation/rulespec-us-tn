format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-13
  summary: |-
    At certification and receipt of an initial allotment, the initial allotment shall not be reduced to offset claims, even if paid retroactively. A household has ninety (90) days to request a fair hearing in disputed lost-benefit restoration situations; pending hearing it receives county-determined lost benefits, and favorable decisions control restoration. Benefits lost more than twelve (12) months before county notice are not restored. IPV-disqualified individuals receive restoration only if the disqualification is reversed; months covered must not exceed twelve (12) months before county notification, and the restored monthly amount is the positive difference between the allotment received and the allotment as if the member participated.
rules:
  - name: household_disagrees_fair_hearing_request_deadline_days
    kind: parameter
    dtype: Count
    source: Tennessee DHS SNAP Policy 24.22, page 13, section 10.a.i
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-13
              excerpt: "may request a fair hearing within ninety (90) days"
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          90

  - name: tdhs_disagrees_fair_hearing_request_deadline_days
    kind: parameter
    dtype: Count
    source: Tennessee DHS SNAP Policy 24.22, page 13, section 10.b.i
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-13
              excerpt: "has ninety (90) days from the date of the county office's determination"
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          90

  - name: tdhs_disagrees_restoration_lookback_months
    kind: parameter
    dtype: Count
    source: Tennessee DHS SNAP Policy 24.22, page 13, section 10.b.iii
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-13
              excerpt: "Benefits lost more than twelve (12) months prior"
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          12

  - name: ipv_restoration_lookback_months
    kind: parameter
    dtype: Count
    source: Tennessee DHS SNAP Policy 24.22, page 13, section 11.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-13
              excerpt: "must not exceed twelve (12) months prior"
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          12

  - name: initial_allotment_reduction_to_offset_claims_prohibited
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Tennessee DHS SNAP Policy 24.22, page 13, section 9.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-13
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          household_is_certified
          and household_received_initial_allotment
          and allotment_is_initial_allotment
          and proposed_reduction_would_offset_claims

  - name: household_disagrees_fair_hearing_request_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Tennessee DHS SNAP Policy 24.22, page 13, section 10.a.i
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-13
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          county_office_determined_household_entitled_to_restoration
          and household_disagrees_with_county_restoration_amount_or_action
          and days_between_entitlement_notification_and_fair_hearing_request <= household_disagrees_fair_hearing_request_deadline_days

  - name: lost_benefits_payable_pending_fair_hearing
    kind: derived
    entity: Household
    dtype: Money
    unit: USD
    period: Month
    source: Tennessee DHS SNAP Policy 24.22, page 13, section 10.a.ii
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-13
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          if fair_hearing_requested_before_or_during_lost_benefit_restoration: max(0, county_office_determined_lost_benefits_amount) else: 0

  - name: lost_benefits_restored_under_favorable_household_dispute_decision
    kind: derived
    entity: Household
    dtype: Money
    unit: USD
    period: Month
    source: Tennessee DHS SNAP Policy 24.22, page 13, section 10.a.iii
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-13
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          if fair_hearing_decision_favorable_to_household_in_household_dispute: max(0, fair_hearing_decision_restoration_amount) else: 0

  - name: tdhs_disagrees_fair_hearing_request_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Tennessee DHS SNAP Policy 24.22, page 13, section 10.b.i
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-13
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          household_believes_entitled_to_restoration_of_lost_benefits
          and county_office_after_review_does_not_agree
          and days_between_county_determination_and_fair_hearing_request <= tdhs_disagrees_fair_hearing_request_deadline_days

  - name: lost_benefits_restored_when_tdhs_disagrees
    kind: derived
    entity: Household
    dtype: Money
    unit: USD
    period: Month
    source: Tennessee DHS SNAP Policy 24.22, page 13, section 10.b.ii-iii
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-13
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          if tdhs_disagrees_fair_hearing_request_timely and fair_hearing_decision_favorable_to_household_in_tdhs_dispute and months_between_lost_benefits_and_county_initial_notice <= tdhs_disagrees_restoration_lookback_months: max(0, fair_hearing_decision_restoration_amount) else: 0

  - name: adh_participation_is_notification_requesting_restored_benefits
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Tennessee DHS SNAP Policy 24.22, page 13, section 11.e
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-13
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          household_participated_in_administrative_disqualification_hearing
          and household_contested_tdhs_assertion_of_intentional_program_violation_at_hearing

  - name: intentional_program_violation_restoration_entitlement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Tennessee DHS SNAP Policy 24.22, page 13, section 11.a-b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-13
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          individual_disqualified_for_intentional_program_violation
          and disqualification_decision_subsequently_reversed
          and months_between_disqualified_month_and_county_notification <= ipv_restoration_lookback_months

  - name: intentional_program_violation_restored_benefit_amount
    kind: derived
    entity: Person
    dtype: Money
    unit: USD
    period: Month
    source: Tennessee DHS SNAP Policy 24.22, page 13, section 11.c-d
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-13
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          if intentional_program_violation_restoration_entitlement: max(0, allotment_household_would_have_received_if_disqualified_member_allowed_to_participate - household_allotment_received_during_disqualification_month) else: 0
