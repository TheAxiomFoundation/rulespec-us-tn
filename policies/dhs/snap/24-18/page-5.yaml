format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-5
  summary: |-
    SNAP Deductions from Income, Policy 24.18, page 5: rental insurance and reimbursed home repair charges are excluded shelter costs; homeless HHs that incur or expect shelter costs may receive a homeless shelter standard, with free housing/utilities excluded and verified higher costs claimable; SUA applies for separate regular heating/cooling costs subject to homeless-standard and central-meter limits; telephone and actual utility expense rules are stated.
rules:
  - name: shelter_cost_excluded_from_deduction
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: Tennessee DHS SNAP Policy 24.18, page 5, items h-i
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-5
    versions:
      - effective_from: '2018-09-17'
        formula: |-
          payment_is_rental_insurance
          or home_repair_charge_has_been_or_will_be_reimbursed_by_private_or_public_relief_agency_insurance_or_other_source

  - name: homeless_household_shelter_standard_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Tennessee DHS SNAP Policy 24.18, page 5, 5(a)-(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-5
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-5
    versions:
      - effective_from: '2018-09-17'
        formula: |-
          household_is_homeless
          and (
            household_incurs_shelter_costs_during_month
            or household_expects_to_incur_shelter_costs_during_month
          )
          and not household_receives_free_housing_and_utilities_throughout_month

  - name: homeless_household_can_claim_shelter_costs_above_standard
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Tennessee DHS SNAP Policy 24.18, page 5, 5(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-5
    versions:
      - effective_from: '2018-09-17'
        formula: |-
          homeless_household_shelter_standard_applies
          and household_shelter_costs_higher_than_homeless_household_standard
          and household_shelter_costs_can_be_reasonably_verified

  - name: standard_utility_allowance_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Tennessee DHS SNAP Policy 24.18, page 5, 5(c), 6(a)-(b), 8(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-5
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-5
    versions:
      - effective_from: '2018-09-17'
        formula: |-
          (
            household_directly_incurs_heating_or_cooling_expenses_regularly_separate_from_rent_or_mortgage
            or rental_housing_billed_monthly_by_landlord_for_actual_usage_through_individual_metering
            or rental_housing_charged_flat_rate_by_landlord_separately_from_rent
            or household_eligible_for_sua_based_on_liheap_policy
          )
          and not household_uses_homeless_household_shelter_standard
          and (
            household_eligible_for_sua_based_on_liheap_policy
            or not household_lives_in_public_or_other_rental_housing_with_central_utility_meters_and_charged_only_excess_heating_or_cooling_costs
          )

  - name: standard_telephone_allowance_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Tennessee DHS SNAP Policy 24.18, page 5, 7
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-5
    versions:
      - effective_from: '2018-09-17'
        formula: |-
          household_incurs_separate_telephone_expense
          and not standard_utility_allowance_applies
          and not household_entitled_to_other_non_sua_utility_allowance

  - name: actual_utility_expenses_deductible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Tennessee DHS SNAP Policy 24.18, page 5, 8(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-5
    versions:
      - effective_from: '2018-09-17'
        formula: |-
          household_can_verify_actual_utility_costs
          and actual_utility_costs_reasonably_anticipated_to_continue_for_certification_period

  - name: central_meter_excess_utility_costs_election_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Tennessee DHS SNAP Policy 24.18, page 5, 8(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-5
    versions:
      - effective_from: '2018-09-17'
        formula: |-
          household_lives_in_public_or_other_rental_housing_with_central_utility_meters_and_charged_only_excess_heating_or_cooling_costs
          and (
            household_elects_excess_utility_costs_allowed_in_billing_month
            or household_elects_excess_utility_costs_averaged_forward_between_scheduled_billings
          )
