format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-17/page-2
  summary: |-
    "When documentary evidence is not readily available or when it is not sufficient, a collateral contact or, in rare instances, a home visit can be used as an alternate source of verification." A home visit may be substituted when necessary information can be obtained by a home visit and documentary evidence and an appropriate collateral contact are unavailable. Customer declaration is acceptable as a last resort when the household tried without success to obtain verification and the counselor exhausted all means. Households must be given at least ten calendar days after the written request mail date, with extension to the next working day if the tenth day is a non-business day.
rules:
  - name: verification_response_calendar_days
    kind: parameter
    dtype: Integer
    source: Policy 24.17, SNAP Mandatory Verifications, Page 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-17/page-2
              excerpt: "at least ten (10) calendar days following the mail date"
    versions:
      - effective_from: '2022-02-01'
        formula: |-
          10

  - name: home_visit_may_be_substituted
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: Policy 24.17, SNAP Mandatory Verifications, Page 2, Home Visits
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-17/page-2
    versions:
      - effective_from: '2022-02-01'
        formula: |-
          necessary_information_can_be_obtained_by_home_visit
          and no_available_or_acceptable_documentary_evidence
          and no_appropriate_collateral_contact_available
          and home_visit_scheduled_in_advance_with_household
          and not home_visit_puts_undue_burden_on_customer_or_counselor

  - name: customer_declaration_acceptable_as_last_resort
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: Policy 24.17, SNAP Mandatory Verifications, Page 2, Home Visits
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-17/page-2
    versions:
      - effective_from: '2022-02-01'
        formula: |-
          household_tried_without_success_to_obtain_required_verification
          and counselor_exhausted_all_means_of_verifying_customer_statements_without_success

  - name: household_given_required_verification_response_time
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: Policy 24.17, SNAP Mandatory Verifications, Page 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-17/page-2
              excerpt: "If the tenth (10th) day is a non-business day, give the household until the next working day"
    versions:
      - effective_from: '2022-02-01'
        formula: |-
          days_following_written_request_mail_date > verification_response_calendar_days
          or (days_following_written_request_mail_date == verification_response_calendar_days and not tenth_day_following_mail_date_is_non_business_day)
          or household_has_reached_next_working_day_after_non_business_tenth_day

  - name: denial_for_failure_to_provide_verifications_may_be_taken
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: Policy 24.17, SNAP Mandatory Verifications, Page 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-17/page-2
              excerpt: "cannot be taken until after the applicant has had ten (10) calendar days"
    versions:
      - effective_from: '2022-02-01'
        formula: |-
          household_given_required_verification_response_time

  - name: reported_change_factor_must_be_verified
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: Policy 24.17, SNAP Mandatory Verifications, Page 2, Mandatory Verifications
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-17/page-2
    versions:
      - effective_from: '2022-02-01'
        formula: |-
          household_reports_change
          and (reported_eligibility_factor_is_mandatory or reported_eligibility_factor_is_questionable)
