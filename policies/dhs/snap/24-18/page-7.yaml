  - name: bua_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Tennessee DHS SNAP Policy 24.18, Page 7, Basic Utility Allowance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-7
          - path: versions[0].formula
            kind: import
            import:
              target: us-tn:policies/dhs/snap/24-18/page-7#bua_minimum_utility_count
              output: bua_minimum_utility_count
              hash: sha256:local
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-7
              excerpt: "Effective Date: 09/17/2018"
    versions:
      - effective_from: '2018-09-17'
        formula: |-
          (household_incurs_bua_utility_expenses and utility_expense_count_for_bua >= bua_minimum_utility_count)
          or household_lives_in_public_or_other_rental_housing_unit_and_charged_only_for_excess_utility_costs
