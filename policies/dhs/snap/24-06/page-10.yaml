            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-06/page-10
    versions:
      - effective_from: '2019-07-01'
        formula: |-
          household_resides_in_shelter_for_battered_persons_and_children
          and household_participates_as_individual_household
          and expedited_service_criteria_met

  - name: normal_processing_for_shelter_resident_application
    kind: derived
