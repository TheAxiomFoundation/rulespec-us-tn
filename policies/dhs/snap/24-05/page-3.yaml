format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-05/page-3
  summary: |-
    Restrictions on Who May Be an Authorized Representative: department employees involved in certification or issuance, retailers authorized to accept SNAP benefits (absent specific written approval), individuals disqualified for an intentional program violation during the disqualification period (absent department determination of no one else available), and homeless meal providers may not act as ARs for homeless SNAP recipients.
rules:
  - name: person_prohibited_from_serving_as_authorized_representative
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: TN SNAP Policy 24.05 F (Restrictions on Who May Be an Authorized Representative)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-05/page-3
              excerpt: "Do not allow the HH to designate any of the following individuals as an AR"
    versions:
      - effective_from: '2019-03-01'
        formula: |-
          person_is_department_employee_involved_in_certification_or_issuance
          or (person_is_retailer_authorized_to_accept_snap_benefits and not retailer_has_specific_written_approval_and_no_one_else_available)
          or (person_is_disqualified_for_intentional_program_violation_during_disqualification_period and not department_determined_no_one_else_available)
          or person_is_homeless_meal_provider_serving_homeless_snap_recipient
