  summary: |-
    SNAP General Administrative Procedures Policy 24.01 (effective December 31, 2019): TDHS will maintain applicant/participant case files according to State and Federal guidelines. Case record information must be accurate, up-to-date, and pertinent to eligibility; sources of information and verification should be clearly indicated; individuals who give information are to be identified; factual information must be clearly distinguished from expressions of opinion. Eligibility is not required of a person prior to filing an application. TDHS has adopted the policy of maintaining the confidential nature of Family Assistance information.
