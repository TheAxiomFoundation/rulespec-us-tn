format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-11/page-11
  summary: |-
    Good cause includes enrollment at least half-time that requires leaving employment or reducing work hours; relocation because another household member accepted employment or enrolled at least half-time in another county; resignation by a person under age sixty (60) recognized as retirement; a bona fide offer of more than thirty (30) hours a week or equivalent weekly earnings that does not materialize or results in less than thirty (30) hours or earnings; and normal patterns of employment where workers frequently move between employers. To become exempt from disqualification, the individual must meet one of the listed federal work requirement exemptions.
rules:
  - name: bona_fide_offer_weekly_hours_threshold
    kind: parameter
    dtype: Decimal
    source: SNAP Work Requirements Policy 24.11, page 11, good cause item 8
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-11/page-11
              excerpt: "more than thirty (30) hours a week"
    versions:
      - effective_from: '2023-03-01'
        formula: |-
          30

  - name: bona_fide_offer_weekly_earnings_hours_multiplier
    kind: parameter
    dtype: Decimal
    source: SNAP Work Requirements Policy 24.11, page 11, good cause item 8
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-11/page-11
              excerpt: "Federal minimum wage multiplied by thirty (30) hours"
    versions:
      - effective_from: '2023-03-01'
        formula: |-
          30

  - name: materialized_job_weekly_hours_minimum
    kind: parameter
    dtype: Decimal
    source: SNAP Work Requirements Policy 24.11, page 11, good cause item 8
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-11/page-11
              excerpt: "less than thirty (30) hours per week"
    versions:
      - effective_from: '2023-03-01'
        formula: |-
          30

  - name: materialized_job_weekly_earnings_hours_multiplier
    kind: parameter
    dtype: Decimal
    source: SNAP Work Requirements Policy 24.11, page 11, good cause item 8
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-11/page-11
              excerpt: "weekly earnings of less than thirty (30) times the Federal minimum wage"
    versions:
      - effective_from: '2023-03-01'
        formula: |-
          30

  - name: voluntary_quit_or_reduction_good_cause
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Work Requirements Policy 24.11, page 11, good cause items 5-9
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-11/page-11
    versions:
      - effective_from: '2023-03-01'
        formula: |-
          (
            enrollment_at_least_half_time_in_recognized_school_training_or_higher_education
            and enrollment_requires_leaving_employment_or_reducing_work_hours
          )
          or (
            (
              another_household_member_accepted_employment_in_another_county
              or another_household_member_enrolled_at_least_half_time_in_recognized_school_training_or_higher_education_in_another_county
            )
            and household_relocation_required
          )
          or (
            person_is_under_age_sixty
            and resignation_recognized_by_employer_as_retirement
          )
          or (
            accepted_bona_fide_offer_of_employment
            and (
              offered_weekly_hours > bona_fide_offer_weekly_hours_threshold
              or offered_weekly_earnings >= federal_minimum_wage * bona_fide_offer_weekly_earnings_hours_multiplier
            )
            and circumstances_beyond_individual_control_prevented_expected_employment
            and (
              new_job_did_not_materialize
              or materialized_job_weekly_hours < materialized_job_weekly_hours_minimum
              or materialized_job_weekly_earnings < federal_minimum_wage * materialized_job_weekly_earnings_hours_multiplier
            )
          )
          or (
            left_job_in_connection_with_frequent_employer_movement_employment_pattern
            and movement_between_employers_is_normal_pattern_for_that_type_of_employment
          )

  - name: exempt_from_voluntary_quit_disqualification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Work Requirements Policy 24.11, page 11, Ending the Voluntary Quit Disqualification item 1(a)-(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-11/page-11
    versions:
      - effective_from: '2023-03-01'
        formula: |-
          subject_to_and_complying_with_families_first_work_registration_requirement
          or subject_to_and_complying_with_unemployment_compensation_work_registration_requirement
          or parent_or_household_member_responsible_for_dependent_child_under_age_six
          or parent_or_household_member_responsible_for_incapacitated_person
          or student_enrolled_at_least_half_time_in_recognized_school_training_or_higher_education
          or regular_participant_in_drug_addiction_or_alcoholic_treatment_and_rehabilitation_program
