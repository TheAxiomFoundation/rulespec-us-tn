format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/regulation/1240-01/04/18/block-1
  summary: |-
    Unearned income is money which is received for reasons other than the current work efforts of an individual. No earned income exclusions or work expense deductions may be applied to unearned income as defined. In the Food Stamp Program the standard deductions and dependent care, shelter, and medical deductions are to be applied to unearned income as appropriate. Unearned income is considered available to meet food/maintenance needs.
  status: deferred
  deferred_outputs:
    - output: us-tn:regulations/1240-01/04/18/block-1#unearned_income
      reason: |-
        Source provides only a definitional/descriptive statement that unearned
        income is money received for reasons other than current work efforts of
        an individual, and that certain deductions do or do not apply. The
        source does not state a computable amount, rate, threshold, or
        eligibility test on its own. The applicable deductions referenced
        (standard deductions and dependent care, shelter, and medical
        deductions per § 1240-01-04-.17(8)) are encoded in their own source
        slices and not redefined here.
