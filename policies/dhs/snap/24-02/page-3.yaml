format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-3
  summary: |-
    The interview must be scheduled as promptly as possible to ensure eligible households receive an opportunity to participate within thirty (30) days after the application is filed or within seven (7) days if screened and eligible for expedited services. The application is considered filed, and the processing standards begin the date the application has been received in a county office.
rules:
  - name: snap_standard_processing_days
    kind: parameter
    dtype: Integer
    source: SNAP Application Processing, Policy 24.02, page 3 - "within thirty (30) days after the application is filed"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-3
              excerpt: "within thirty (30) days after the application is filed"
    versions:
      - effective_from: '2022-12-01'
        formula: |-
          30
  - name: snap_expedited_processing_days
    kind: parameter
    dtype: Integer
    source: SNAP Application Processing, Policy 24.02, page 3 - "within seven (7) days if screened and eligible for expedited services"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-3
              excerpt: "within seven (7) days if screened and eligible for expedited services"
    versions:
      - effective_from: '2022-12-01'
        formula: |-
          7
  - name: snap_application_processing_standard_days
    kind: derived
    entity: Household
    dtype: Integer
    period: Day
    source: SNAP Application Processing, Policy 24.02, page 3 - interview must be scheduled to ensure participation within thirty days, or within seven days if screened and eligible for expedited services
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-3
              excerpt: "within thirty (30) days after the application is filed or within seven (7) days if screened and eligible for expedited services"
    versions:
      - effective_from: '2022-12-01'
        formula: |-
          if household_screened_eligible_for_expedited_service: snap_expedited_processing_days else: snap_standard_processing_days
