  summary: |-
    The amount of income available to meet food/maintenance needs is to be determined in establishing eligibility for benefits in accordance with definitions given previously and in accordance with the instructions given in sections 1240-01-04-.17(1) through 1240-01-04-.27. Currently available income as defined (except that specifically excluded, disregarded, or deducted) is considered in the determination of eligibility and level of benefits in both programs. When any change in the HH/AU circumstances is expected, including a change in income, the client will be required to report the change within 10 days of the change. Deeming applies to: a stepparent living in the home with stepchildren for whom assistance is requested; and a parent or legal guardian living in the home with a minor parent who has requested AFDC in his/her own right. The amount of income to be deemed available to the stepchildren or minor parent shall be determined as follows.
