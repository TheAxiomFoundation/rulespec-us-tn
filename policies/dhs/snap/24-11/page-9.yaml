format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-11/page-9
  summary: |-
    "When a mandatory participant who does not have good cause fails to cooperate with the SNAP work requirements, he/she will be disqualified." "A voluntary participant who does not have good cause will not be disqualified." "To cure the disqualification, the individual must comply with the work requirement. The minimum period of the disqualification must be served..." "If the individual is a voluntary participant or meets another exemption to the SNAP Work Requirement, the SNAP allotment will be reduced by a ten percent (10%) penalty."
rules:
  - name: families_first_snap_allotment_penalty_rate
    kind: parameter
    dtype: Rate
    source: Tennessee DHS SNAP Policy 24.11, p. 9, Non-Compliance with Work Requirements in Families First
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-11/page-9
              excerpt: "ten percent (10%) penalty"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-11/page-9
              excerpt: "Effective Date: 03/01/2023"
    versions:
      - effective_from: '2023-03-01'
        formula: |-
          0.10

  - name: snap_work_requirement_disqualification_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Tennessee DHS SNAP Policy 24.11, p. 9, Disqualification
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-11/page-9
              excerpt: "When a mandatory participant who does not have good cause fails to cooperate with the SNAP work requirements, he/she will be disqualified."
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-11/page-9
              excerpt: "Effective Date: 03/01/2023"
    versions:
      - effective_from: '2023-03-01'
        formula: |-
          individual_is_mandatory_snap_work_requirement_participant
          and individual_failed_to_cooperate_with_snap_work_requirements
          and not good_cause_exists_for_failure_to_comply_with_snap_work_requirements

  - name: snap_work_requirement_disqualification_ends
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Tennessee DHS SNAP Policy 24.11, p. 9, Ending the Disqualification for a Mandatory Participant
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-11/page-9
              excerpt: "The minimum period of the disqualification must be served, even if the individual complies before the time period expires."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-11/page-9
              excerpt: "The disqualification will end, regardless of whether the minimum disqualification period has been served, when the individual meets one of the exemptions"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-11/page-9
              excerpt: "Effective Date: 03/01/2023"
    versions:
      - effective_from: '2023-03-01'
        formula: |-
          individual_is_currently_disqualified_for_snap_work_requirements
          and (
            individual_meets_work_registration_or_et_exemption
            or (
              minimum_snap_work_requirement_disqualification_period_has_been_served
              and individual_complies_with_snap_work_requirement
            )
          )

  - name: families_first_snap_allotment_penalty_rate_applies
    kind: derived
    entity: Person
    dtype: Rate
    period: Month
    source: Tennessee DHS SNAP Policy 24.11, p. 9, Non-Compliance with Work Requirements in Families First
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-11/page-9
              excerpt: "If the individual is a voluntary participant or meets another exemption to the SNAP Work Requirement, the SNAP allotment will be reduced by a ten percent (10%) penalty."
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-11/page-9
              excerpt: "Effective Date: 03/01/2023"
    versions:
      - effective_from: '2023-03-01'
        formula: |-
          if individual_failed_to_comply_with_families_first_work_requirements and (individual_is_voluntary_snap_work_requirement_participant or individual_meets_another_exemption_to_snap_work_requirement): families_first_snap_allotment_penalty_rate else: 0

  - name: families_first_work_requirement_sanction_barred_by_ten_percent_penalty
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Tennessee DHS SNAP Policy 24.11, p. 9, Non-Compliance with Work Requirements in Families First
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-11/page-9
              excerpt: "Since a ten percent (10%) penalty was applied, a sanction would not be applied."
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-11/page-9
              excerpt: "Effective Date: 03/01/2023"
    versions:
      - effective_from: '2023-03-01'
        formula: |-
          individual_failed_to_comply_with_families_first_work_requirements
          and (
            individual_is_voluntary_snap_work_requirement_participant
            or individual_meets_another_exemption_to_snap_work_requirement
          )
