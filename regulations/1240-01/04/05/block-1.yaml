  source_verification:
    corpus_citation_path: us-tn/regulation/1240-01/04/05/block-1
  summary: |-
    In determining the resources of an HH/AG, only the following shall be exempt. Federal assistance provided by a program funded in whole or in part under Title IV of the Higher Education Act is excluded. Such payments include, but are not limited to, Pell grants, Supplemental Education Opportunity (SEOG) grants, the PLUS Program grants, the National Direct Student Loans (NDSL), the Byrd Honor Scholarships, and college work study funds.
  status: deferred
  deferred_outputs:
    - output: us-tn:regulations/1240-01/04/05/block-1#title_iv_higher_education_assistance_exempt_from_resources
      reason: |-
        The source text states that federal assistance provided by a program funded in whole or in part under Title IV of the Higher Education Act is excluded from countable resources, and lists illustrative examples (Pell grants, SEOG grants, PLUS Program grants, NDSL, Byrd Honor Scholarships, college work study). The provision is a resource-exemption rule that operates on amounts attributable to specific federally-funded education programs. The supplied source text does not state the amount of the exemption (it is a full exclusion of whatever amounts are received from such programs), and the surrounding fragments ("Repayment of the grant ...", "This contract is irrevocable ...", contracts established before 7/02/81 declared irrevocable by court) reference other resource-exemption mechanics whose operative parent conditions and amounts are not contained in this block. Encoding only the Title IV exclusion as a derived amount or as a boolean exemption flag would require either (a) inventing a host resource-determination roll-up at the HH/AG level that this block does not define, or (b) creating an opaque boolean such as `resource_is_exempt_title_iv` divorced from the source-stated amount mechanics. Neither faithfully represents the resource-exemption framework, which depends on the parent "resources of an HH/AG" computation defined elsewhere in 1240-01-04.
