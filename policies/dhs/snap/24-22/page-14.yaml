format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-14
  summary: |-
    Claims Against a Deceased Individual: Collection stops when there are no other adult individuals to pursue unless the State decides to pursue collection of the debt against the estate of the deceased individual through Chancery Court.
rules:
  - name: collection_stops_for_deceased_individual_claim
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Policy 24.22, page 14, Claims Against a Deceased Individual
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-14
              excerpt: "Effective Date: 08/15/2019"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-14
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          individual_is_deceased
          and no_other_adult_individuals_to_pursue
          and not state_decides_to_pursue_debt_against_estate_through_chancery_court
