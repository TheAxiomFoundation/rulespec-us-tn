format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-13
  summary: |-
    "Only the existing balance still owed in the month of application will be considered. Any portion paid prior to the month of application will not be considered." "Only the existing balance still owed on a one-time expense at a time it is reported will be considered." Households reporting a one-time only medical expense may elect a one-time deduction; without a repayment plan they may elect proration over the certification period or remainder, and with a repayment plan they may have the repayment plan considered over the length of the agreement.
rules:
  - name: one_time_medical_expense_considered_at_initial_application
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Policy 24.18, T.1.a.i
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-13
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-13
    versions:
      - effective_from: '2018-09-17'
        formula: |-
          if one_time_medical_expense_is_for_initial_application: max(0, existing_balance_still_owed_in_application_month) else: 0

  - name: one_time_medical_expense_considered_when_reported_after_certification
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Policy 24.18, T.1.b.i
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-13
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-13
    versions:
      - effective_from: '2018-09-17'
        formula: |-
          if one_time_medical_expense_reported_after_initial_certification: max(0, existing_balance_still_owed_at_time_reported) else: 0

  - name: one_time_medical_expense_one_time_deduction_option_available
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.18, T.2.a-b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-13
    versions:
      - effective_from: '2018-09-17'
        formula: |-
          household_reports_one_time_only_medical_expense

  - name: one_time_medical_expense_proration_option_available
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.18, T.2.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-13
    versions:
      - effective_from: '2018-09-17'
        formula: |-
          household_reports_one_time_only_medical_expense
          and not repayment_plan_established_for_one_time_medical_expense
          and (one_time_medical_expense_reported_at_application or one_time_medical_expense_reported_as_change_during_certification_period)

  - name: one_time_medical_expense_repayment_plan_option_available
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.18, T.2.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-13
    versions:
      - effective_from: '2018-09-17'
        formula: |-
          household_reports_one_time_only_medical_expense
          and repayment_plan_established_for_one_time_medical_expense

  - name: one_time_medical_expense_proration_barred_by_existing_repayment_plan
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.18, T.2.b Note
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-13
    versions:
      - effective_from: '2018-09-17'
        formula: |-
          household_reports_one_time_only_medical_expense
          and repayment_plan_established_for_one_time_medical_expense

  - name: one_time_medical_expense_may_be_considered_again
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.18, T.2.c.ii-iii
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-13
    versions:
      - effective_from: '2018-09-17'
        formula: |-
          household_reports_one_time_only_medical_expense
          and not one_time_medical_expense_already_counted
