format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-1
  summary: |-
    Policy A. Limitations on Deductions: deductible expenses include only those costs described in this chapter; expenses may be deducted only if the service is provided by someone outside the household and the household makes a money payment for the service. Policy C. Billed Expenses Deducted in Month Due: except under Sections D and E, a deduction is allowed in the month the expense is billed or otherwise becomes due, regardless of when the household intends to pay; amounts carried forward from past billing periods are not deductible.
rules:
  - name: expense_satisfies_deduction_limitations
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Deductions from Income Policy 24.18, Policy A.1-A.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-1
    versions:
      - effective_from: '2018-09-17'
        formula: |-
          expense_cost_is_described_in_this_chapter
          and service_is_provided_by_someone_outside_household
          and household_makes_money_payment_for_service
  - name: billed_expense_deductible_in_month_due
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Deductions from Income Policy 24.18, Policy C.1-C.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-1
    versions:
      - effective_from: '2018-09-17'
        formula: |-
          expense_satisfies_deduction_limitations
          and expense_is_billed_or_otherwise_due_in_month
          and not section_d_fluctuating_expenses_applies
          and not section_e_anticipating_expenses_applies
          and not amount_is_carried_forward_from_past_billing_periods
  - name: billed_expense_deductible_amount_in_month_due
    kind: derived
    entity: Payment
    dtype: Money
    period: Month
    unit: USD
    source: SNAP Deductions from Income Policy 24.18, Policy C.1-C.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-1
    versions:
      - effective_from: '2018-09-17'
        formula: |-
          if billed_expense_deductible_in_month_due: max(0, current_billed_or_due_expense_amount) else: 0
