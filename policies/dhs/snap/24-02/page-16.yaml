format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-16
  summary: 'Households certified for 24 months reporting a one-time medical expense
    in

    the first 12 months may elect to deduct in one month, average over the

    remainder of the first 12 months, or average over the remaining months of

    the certification period. One-time medical expenses reported after the

    twelfth month can be deducted in one month or averaged over the remaining

    months of the certification period. When an eligibility interview is not

    completed, the application shall be denied on the 30th day (next business

    day if the 30th day falls on a weekend or holiday).'
rules:
- name: first_half_certification_months
  kind: parameter
  dtype: Integer
  source: Policy 24.02 page 16, paragraph c.i
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-16
          excerpt: reported in the first twelve (12) months of certification
  versions:
  - effective_from: '2022-12-01'
    formula: '12'
- name: missed_interview_denial_day
  kind: parameter
  dtype: Integer
  source: Policy 24.02 page 16, paragraph 4
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-16
          excerpt: the application shall be denied on the thirtieth (30th) day
  versions:
  - effective_from: '2022-12-01'
    formula: '30'
- name: one_time_medical_expense_reported_in_first_half
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: Policy 24.02 page 16, paragraph c.i
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-16
          excerpt: One-time medical expenses reported in the first twelve (12) months
            of certification
  versions:
  - effective_from: '2022-12-01'
    formula: 'household_is_certified_for_extended_period

      and household_reported_one_time_medical_expense

      and one_time_medical_expense_month_of_certification <= first_half_certification_months'
- name: one_time_medical_expense_reported_after_first_half
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: Policy 24.02 page 16, paragraph c.ii
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-16
          excerpt: One-time medical expenses reported after the twelfth (12th) month
            of the certification period
  versions:
  - effective_from: '2022-12-01'
    formula: 'household_is_certified_for_extended_period

      and household_reported_one_time_medical_expense

      and one_time_medical_expense_month_of_certification > first_half_certification_months'
- name: application_denied_for_missed_interview
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: Policy 24.02 page 16, paragraph 4
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-16
          excerpt: If the customer has not rescheduled, the application shall be denied
            on the thirtieth (30th) day
  versions:
  - effective_from: '2022-12-01'
    formula: 'application_for_initial_benefits_filed

      and eligibility_interview_not_completed

      and household_notified_in_writing_of_missed_interview

      and not customer_rescheduled_interview

      and days_since_application_filed >= missed_interview_denial_day'
imports:
