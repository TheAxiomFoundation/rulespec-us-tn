  summary: |-
    SNAP Timeliness Standards (Policy 24.03, page 5 of 10): describes administrative procedures for missed interviews (NOMI sent, application held pending 30 days, denial on the 30th day), notice of denial timing (denial by 30th day, denial for failure to interview cannot occur before the 30th day, denial for failure to provide verification cannot occur until 10 days after written request), and process for determining fault when timeliness standard is not met. The content is administrative/procedural and does not state computable benefit amounts, rates, thresholds, or eligibility predicates.
