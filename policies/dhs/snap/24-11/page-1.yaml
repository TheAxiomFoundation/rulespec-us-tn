format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-11/page-1
  summary: |-
    Effective: March 1, 2023
    Work Registration
    1. Each household member who is not otherwise exempt from work registration requirements must register for employment prior to certification for Supplemental Nutrition Assistance Program (SNAP) and once a year thereafter.
    2. Persons losing their exemption due to a change that is required to be reported by the household must register for work as a condition of continued eligibility for SNAP.
    3. Registration is accomplished when a SNAP application is signed. The adult who signs the application registers all individuals in the SNAP unit for work who are required to register for work.
rules:
  - name: person_work_registration_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Work Requirements Policy 24.11, Work Registration ¶1
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-11/page-1
              excerpt: "Effective: March 1, 2023"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-11/page-1
    versions:
      - effective_from: '2023-03-01'
        formula: |-
          person_is_snap_household_member
          and not person_exempt_from_work_registration_requirements

