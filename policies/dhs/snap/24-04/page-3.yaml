format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-04/page-3
  summary: |-
    Persons not eligible for separate HH status: a spouse of a member of the HH;
    children under twenty-two (22) who are living with their parents; children
    under eighteen (18) who are living with someone acting as a parent
    (parental control).
rules:
  - name: child_living_with_parents_age_threshold
    kind: parameter
    dtype: Integer
    source: SNAP Policy 24.04, persons not eligible for separate HH status, children under twenty-two (22) living with their parents
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-04/page-3
              excerpt: "Children under twenty-two (22) who are living with their parents"
    versions:
      - effective_from: '2019-03-01'
        formula: |-
          22
  - name: child_under_parental_control_age_threshold
    kind: parameter
    dtype: Integer
    source: SNAP Policy 24.04, persons not eligible for separate HH status, children under eighteen (18) living with someone acting as a parent
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-04/page-3
              excerpt: "Children under eighteen (18) who are living with someone acting as a parent (parental control)"
    versions:
      - effective_from: '2019-03-01'
        formula: |-
          18
  - name: person_ineligible_for_separate_household_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.04, "Persons not eligible for separate HH status"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-04/page-3
              excerpt: "Persons not eligible for separate HH status: a. A spouse of a member of the HH; ... c. Children under twenty-two (22) who are living with their parents; ... e. Children under eighteen (18) who are living with someone acting as a parent (parental control)."
    versions:
      - effective_from: '2019-03-01'
        formula: |-
          person_is_spouse_of_household_member
          or (person_age < child_living_with_parents_age_threshold and person_lives_with_parent)
          or (person_age < child_under_parental_control_age_threshold and person_lives_with_someone_acting_as_parent)
  - name: household_must_designate_head_of_household
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.04 E.1, "Every HH must designate an individual as the head of HH for case control and issuance purposes."
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-04/page-3
              excerpt: "Every HH must designate an individual as the head of HH for case control and issuance purposes."
    versions:
      - effective_from: '2019-03-01'
        formula: |-
          true
