format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-10
  summary: For HHs subject to allotment reduction, Administrative Error and Inadvertent
    HH Error claims recover the greater of ten (10%) percent of the HH's monthly allotment
    or ten dollars ($10) per month. IPV claims recover the greater of twenty (20%)
    percent of the HH's monthly entitlement or twenty dollars ($20) per month. IPV
    claims are not compromised and cannot be negotiated. If a HH has overpaid a claim,
    TDHS shall pay the HH any amounts overpaid as soon as possible after the overpayment
    becomes known.
rules:
- name: administrative_or_inadvertent_error_allotment_reduction_rate
  kind: parameter
  dtype: Rate
  source: Policy 24.22, page 10, item 9(a) and item 12(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-10
          excerpt: ten (10%) percent of the HH's monthly allotment
  versions:
  - effective_from: '2019-08-15'
    formula: '0.10'
- name: administrative_or_inadvertent_error_minimum_monthly_recovery
  kind: parameter
  dtype: Money
  unit: USD
  period: Month
  source: Policy 24.22, page 10, item 9(a) and item 12(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-10
          excerpt: ten dollars ($10) per month
  versions:
  - effective_from: '2019-08-15'
    formula: '10'
- name: ipv_allotment_reduction_rate
  kind: parameter
  dtype: Rate
  source: Policy 24.22, page 10, item 9(b) and item 12(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-10
          excerpt: twenty (20%) percent of the HH's monthly entitlement
  versions:
  - effective_from: '2019-08-15'
    formula: '0.20'
- name: ipv_minimum_monthly_recovery
  kind: parameter
  dtype: Money
  unit: USD
  period: Month
  source: Policy 24.22, page 10, item 9(b) and item 12(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-10
          excerpt: twenty dollars ($20) per month
  versions:
  - effective_from: '2019-08-15'
    formula: '20'
- name: administrative_or_inadvertent_error_monthly_allotment_recovery
  kind: derived
  entity: Household
  dtype: Money
  unit: USD
  period: Month
  source: Policy 24.22, page 10, item 9(a) and item 12(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-10
          excerpt: greater of ten (10%) percent of the HH's monthly allotment or ten
            dollars ($10) per month
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-10
          excerpt: For HHs subject to allotment reduction
  versions:
  - effective_from: '2019-08-15'
    formula: 'if household_subject_to_allotment_reduction and household_has_administrative_error_or_inadvertent_household_error_claim:
      max(administrative_or_inadvertent_error_allotment_reduction_rate * monthly_allotment,
      administrative_or_inadvertent_error_minimum_monthly_recovery) else: 0'
- name: ipv_monthly_allotment_recovery
  kind: derived
  entity: Household
  dtype: Money
  unit: USD
  period: Month
  source: Policy 24.22, page 10, item 9(b) and item 12(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-10
          excerpt: greater of twenty (20%) percent of the HH's monthly entitlement
            or twenty dollars ($20) per month
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-10
          excerpt: For HHs subject to allotment reduction
  versions:
  - effective_from: '2019-08-15'
    formula: 'if household_subject_to_allotment_reduction and household_has_ipv_claim:
      max(ipv_allotment_reduction_rate * monthly_entitlement, ipv_minimum_monthly_recovery)
      else: 0'
- name: ipv_claim_compromise_prohibited
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: Policy 24.22, page 10, item 8(d) and item 11(d)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-10
          excerpt: IPV claims are not compromised at all and cannot be negotiated.
  versions:
  - effective_from: '2019-08-15'
    formula: household_has_ipv_claim
- name: overpaid_claim_repayment_due
  kind: derived
  entity: Household
  dtype: Money
  unit: USD
  period: Month
  source: Policy 24.22, page 10, item 10 and item 13
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-10
          excerpt: If a HH has overpaid a claim, TDHS shall pay the HH any amounts
            overpaid
  versions:
  - effective_from: '2019-08-15'
    formula: 'if household_has_overpaid_claim: claim_overpayment_amount else: 0'
