format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-23/page-1
  summary: |-
    TDHS shall provide a fair hearing to any person or household aggrieved by any administrative action affecting SNAP eligibility, benefit level, or participation. TDHS must provide a fair hearing to any individual who disagrees with any administrative decision, action, or proposed action affecting participation. A hearing request is any clear oral or written expression by an applicant/recipient or authorized representative that they disagree with imposed actions, decisions, or requirements.
rules:
  - name: fair_hearing_required_for_individual
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Appeals and Fair Hearings Policy 24.23, Policy 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-23/page-1
    versions:
      - effective_from: '2021-07-15'
        formula: |-
          individual_disagrees_with_administrative_decision_affecting_participation
          or individual_disagrees_with_administrative_action_affecting_participation
          or individual_disagrees_with_proposed_administrative_action_affecting_participation
  - name: hearing_request_made
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Appeals and Fair Hearings Policy 24.23, Policy 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-23/page-1
    versions:
      - effective_from: '2021-07-15'
        formula: |-
          hearing_request_is_clear_expression
          and hearing_request_is_oral_or_in_writing
          and (hearing_request_made_by_applicant_or_recipient or hearing_request_made_by_authorized_representative)
          and hearing_request_expresses_disagreement_with_actions_decisions_or_requirements_imposed
  - name: written_notice_of_fair_hearing_rights_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Appeals and Fair Hearings Policy 24.23, Policy 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-23/page-1
    versions:
      - effective_from: '2021-07-15'
        formula: |-
          person_is_applicant_or_recipient_of_services
          and (time_is_application or time_is_prior_to_adverse_action)
