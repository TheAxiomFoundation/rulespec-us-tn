format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-14
  summary: 'Prorating One-Time Medical Expense at Application: If the expense is reported
    and verified during the application processing period, the amount of the countable
    expense will be divided by the number of months in the certification period to
    obtain a monthly figure. Prorating One-Time Medical Expenses during the Certification
    Period: If the expense is reported during the certification period, the amount
    of the countable expense will be divided by the number of months remaining in
    the current certification period, based on when the expenses was verified and
    when the change can be effected to obtain a monthly figure. When an individual
    has recurring medical expenses, he/she has an option to bring in the medical bills
    each month for a month by month deduction or have the medical expenses averaged.'
rules:
- name: one_time_medical_expense_proration_preconditions_met
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: Policy 24.18, SNAP Deductions from Income, page 14, T.4.a
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-14
  versions:
  - effective_from: '2018-09-17'
    formula: 'household_elects_one_time_medical_expense_proration

      and household_repayment_plan_status_established

      and reimbursement_entitlement_and_amount_established'
- name: monthly_prorated_one_time_medical_expense_at_application
  kind: derived
  entity: Household
  dtype: Money
  unit: USD
  period: Month
  source: Policy 24.18, SNAP Deductions from Income, page 14, T.4.b.i
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-14
  versions:
  - effective_from: '2018-09-17'
    formula: 'if one_time_medical_expense_proration_preconditions_met and one_time_medical_expense_reported_and_verified_during_application_processing_period:
      countable_one_time_medical_expense / months_in_certification_period else: 0'
- name: monthly_prorated_one_time_medical_expense_during_certification
  kind: derived
  entity: Household
  dtype: Money
  unit: USD
  period: Month
  source: Policy 24.18, SNAP Deductions from Income, page 14, T.4.c.i
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-14
  versions:
  - effective_from: '2018-09-17'
    formula: 'if one_time_medical_expense_proration_preconditions_met and one_time_medical_expense_reported_during_certification_period:
      countable_one_time_medical_expense / months_remaining_in_current_certification_period_based_on_verification_and_effective_change
      else: 0'
- name: recurring_medical_expense_month_by_month_deduction_option_available
