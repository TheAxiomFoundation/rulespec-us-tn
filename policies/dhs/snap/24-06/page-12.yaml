format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-06/page-12
  summary: |-
    Households with unstable circumstances should generally receive certifications no less than three months. Households may receive one- or two-month certification periods when likely to become ineligible soon. Eligible household members age sixty or over, SSI recipients, and their spouses may use benefits for meals prepared especially for them at FNS-authorized communal dining facilities.
rules:
  - name: unstable_circumstances_general_minimum_certification_months
    kind: parameter
    dtype: Count
    source: SNAP Policy 24.06(I)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-06/page-12
              excerpt: "generally no less than three (3) months"
    versions:
      - effective_from: '2019-07-01'
        formula: |-
          3
  - name: near_ineligibility_short_certification_minimum_months
    kind: parameter
    dtype: Count
    source: SNAP Policy 24.06(I)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-06/page-12
              excerpt: "one (1) or two (2) month certification periods"
    versions:
      - effective_from: '2019-07-01'
        formula: |-
          1
  - name: near_ineligibility_short_certification_maximum_months
    kind: parameter
    dtype: Count
    source: SNAP Policy 24.06(I)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-06/page-12
              excerpt: "one (1) or two (2) month certification periods"
    versions:
      - effective_from: '2019-07-01'
        formula: |-
          2
  - name: communal_dining_elderly_age_threshold
    kind: parameter
    dtype: Count
    source: SNAP Policy 24.06(K)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-06/page-12
              excerpt: "sixty (60) years of age or over"
    versions:
      - effective_from: '2019-07-01'
        formula: |-
          60
  - name: general_minimum_certification_months_for_unstable_household
    kind: derived
    entity: Household
    dtype: Count
    period: Month
    source: SNAP Policy 24.06(I)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-06/page-12
          - path: versions[0].formula
            kind: import
            import:
              target: us-tn:policies/dhs/snap/24-06/page-12#unstable_circumstances_general_minimum_certification_months
              output: unstable_circumstances_general_minimum_certification_months
              hash: sha256:local
    versions:
      - effective_from: '2019-07-01'
        formula: |-
          if household_has_unstable_circumstances: unstable_circumstances_general_minimum_certification_months else: 0
  - name: short_certification_period_allowed_for_near_ineligibility
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.06(I)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-06/page-12
    versions:
      - effective_from: '2019-07-01'
        formula: |-
          household_likely_to_become_ineligible_for_snap_benefits_in_near_future
  - name: short_certification_minimum_months_for_near_ineligibility
    kind: derived
    entity: Household
    dtype: Count
    period: Month
    source: SNAP Policy 24.06(I)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-06/page-12
          - path: versions[0].formula
            kind: import
            import:
              target: us-tn:policies/dhs/snap/24-06/page-12#near_ineligibility_short_certification_minimum_months
              output: near_ineligibility_short_certification_minimum_months
              hash: sha256:local
    versions:
      - effective_from: '2019-07-01'
        formula: |-
          if household_likely_to_become_ineligible_for_snap_benefits_in_near_future: near_ineligibility_short_certification_minimum_months else: 0
  - name: short_certification_maximum_months_for_near_ineligibility
    kind: derived
    entity: Household
    dtype: Count
    period: Month
    source: SNAP Policy 24.06(I)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-06/page-12
          - path: versions[0].formula
            kind: import
            import:
              target: us-tn:policies/dhs/snap/24-06/page-12#near_ineligibility_short_certification_maximum_months
              output: near_ineligibility_short_certification_maximum_months
              hash: sha256:local
    versions:
      - effective_from: '2019-07-01'
        formula: |-
          if household_likely_to_become_ineligible_for_snap_benefits_in_near_future: near_ineligibility_short_certification_maximum_months else: 0
  - name: communal_dining_benefit_use_allowed
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.06(K)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-06/page-12
          - path: versions[0].formula
            kind: import
            import:
              target: us-tn:policies/dhs/snap/24-06/page-12#communal_dining_elderly_age_threshold
              output: communal_dining_elderly_age_threshold
              hash: sha256:local
    versions:
      - effective_from: '2019-07-01'
        formula: |-
          (person_age >= communal_dining_elderly_age_threshold or person_receives_ssi or person_is_spouse_of_eligible_elderly_or_ssi_household_member)
          and communal_dining_facility_authorized_by_fns
          and meal_prepared_especially_for_eligible_members
