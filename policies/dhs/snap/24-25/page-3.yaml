format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-3
  summary: 'Effective Date: 02/15/2023. Simplified reporting households report if
    income exceeds the gross income limit for the household size at last certification,
    if an ABAWD member''s hours fall below an average of twenty (20) hours per week
    or eighty (80) hours per month, or if a member receives substantial lottery or
    gambling winnings. Change reporting households are certified up to six (6) months
    where the only earned income is annualized self-employment income or certified
    for three (3) months or less; they must report listed changes within ten (10)
    days. Non-simplified reporting criteria changes move the household to simplified
    reporting and the case must be documented within two (2) business days.'
rules:
- name: abawd_minimum_average_weekly_work_hours
  kind: parameter
  dtype: Decimal
  source: SNAP Policy 24.25, page 3, simplified and change reporting ABAWD hour clauses
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-3
          excerpt: average of twenty (20) hours per week
      - path: versions[0].effective_from
        kind: effective_period
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-3
          excerpt: 'Effective Date: 02/15/2023'
  versions:
  - effective_from: '2023-02-15'
    formula: '20'
- name: abawd_minimum_average_monthly_work_hours
  kind: parameter
  dtype: Decimal
  source: SNAP Policy 24.25, page 3, simplified and change reporting ABAWD hour clauses
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-3
          excerpt: average of eighty (80) hours per month
      - path: versions[0].effective_from
        kind: effective_period
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-3
          excerpt: 'Effective Date: 02/15/2023'
  versions:
  - effective_from: '2023-02-15'
    formula: '80'
- name: change_reporting_max_certification_months_for_annualized_self_employment
  kind: parameter
  dtype: Count
  source: SNAP Policy 24.25, page 3, change reporting household definition
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-3
          excerpt: certified up to six (6) months
      - path: versions[0].effective_from
        kind: effective_period
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-3
          excerpt: 'Effective Date: 02/15/2023'
  versions:
  - effective_from: '2023-02-15'
    formula: '6'
- name: change_reporting_short_certification_months
  kind: parameter
  dtype: Count
  source: SNAP Policy 24.25, page 3, change reporting household definition
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-3
          excerpt: certified for three (3) months or less
      - path: versions[0].effective_from
        kind: effective_period
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-3
          excerpt: 'Effective Date: 02/15/2023'
  versions:
  - effective_from: '2023-02-15'
    formula: '3'
- name: change_report_due_days_after_known
  kind: parameter
  dtype: Count
  source: SNAP Policy 24.25, page 3, change reporting due date
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-3
          excerpt: within ten (10) days
      - path: versions[0].effective_from
        kind: effective_period
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-3
          excerpt: 'Effective Date: 02/15/2023'
  versions:
  - effective_from: '2023-02-15'
    formula: '10'
- name: unearned_income_change_reporting_threshold
  kind: parameter
  dtype: Money
  unit: USD
  source: SNAP Policy 24.25, page 3, change reporting unearned income threshold
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-3
          excerpt: gross monthly unearned income of more than $125
      - path: versions[0].effective_from
        kind: effective_period
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-3
          excerpt: 'Effective Date: 02/15/2023'
  versions:
  - effective_from: '2023-02-15'
    formula: '125'
- name: simplified_reporting_change_report_required
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: SNAP Policy 24.25, page 3, simplified reporting household reportable changes
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-3
      - path: versions[0].effective_from
        kind: effective_period
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-3
          excerpt: 'Effective Date: 02/15/2023'
  versions:
  - effective_from: '2023-02-15'
    formula: 'gross_income_exceeds_limit_for_household_size_at_last_certification

      or abawd_member_average_weekly_hours < abawd_minimum_average_weekly_work_hours

      or abawd_member_average_monthly_hours < abawd_minimum_average_monthly_work_hours

      or household_member_receives_substantial_lottery_or_gambling_winnings'
- name: simplified_reporting_mid_certification_form_required
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: SNAP Policy 24.25, page 3, simplified reporting twenty-four month certification
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-3
      - path: versions[0].effective_from
        kind: effective_period
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-3
          excerpt: 'Effective Date: 02/15/2023'
  versions:
  - effective_from: '2023-02-15'
    formula: 'household_is_simplified_reporting

      and certification_period_months == twenty_four_month_certification_length'
- name: simplified_reporting_requirement_remains_for_certification_period
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: SNAP Policy 24.25, page 3, simplified reporting requirement continuity
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-3
      - path: versions[0].effective_from
        kind: effective_period
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-3
          excerpt: 'Effective Date: 02/15/2023'
  versions:
  - effective_from: '2023-02-15'
    formula: 'household_was_simplified_reporting

      and change_causes_household_to_no_longer_be_simplified_reporting

      and certification_period_has_not_ended'
- name: change_reporting_household
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: SNAP Policy 24.25, page 3, change reporting household definition
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-3
      - path: versions[0].effective_from
        kind: effective_period
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-3
          excerpt: 'Effective Date: 02/15/2023'
  versions:
  - effective_from: '2023-02-15'
    formula: '(only_earned_income_is_annualized_self_employment_income

      and certification_period_months <= change_reporting_max_certification_months_for_annualized_self_employment)

      or certification_period_months <= change_reporting_short_certification_months'
- name: change_reporting_report_due_within_days
  kind: derived
  entity: Household
  dtype: Count
  period: Month
  source: SNAP Policy 24.25, page 3, change reporting due date
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-3
          excerpt: within ten (10) days
      - path: versions[0].effective_from
        kind: effective_period
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-3
          excerpt: 'Effective Date: 02/15/2023'
  versions:
  - effective_from: '2023-02-15'
    formula: 'if change_reporting_reportable_change_known_to_household: change_report_due_days_after_known
      else: 0'
- name: change_reporting_reportable_change_known_to_household
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: SNAP Policy 24.25, page 3, change reporting reportable changes
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-3
      - path: versions[0].effective_from
        kind: effective_period
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-3
          excerpt: 'Effective Date: 02/15/2023'
  versions:
  - effective_from: '2023-02-15'
    formula: 'change_reporting_household

      and (gross_monthly_unearned_income_change_amount > unearned_income_change_reporting_threshold

      or earned_income_source_changed

      or earned_income_hourly_rate_or_salary_changed

      or employment_status_changed

      or resources_exceed_allowable_limit

      or acquired_licensed_vehicle_not_fully_excludable

      or household_composition_changed

      or residence_changed

      or legally_obligated_child_support_paid_changed

      or abawd_member_average_weekly_hours < abawd_minimum_average_weekly_work_hours

      or abawd_member_average_monthly_hours < abawd_minimum_average_monthly_work_hours

      or household_member_receives_substantial_lottery_or_gambling_winnings)'
- name: household_changed_to_simplified_reporting
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: SNAP Policy 24.25, page 3, non-simplified reporting criteria change
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-3
      - path: versions[0].effective_from
        kind: effective_period
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-3
          excerpt: 'Effective Date: 02/15/2023'
  versions:
  - effective_from: '2023-02-15'
    formula: 'household_is_non_simplified_reporting

      and change_changes_non_simplified_reporting_criteria'
- name: simplified_reporting_case_documentation_due_business_days
  kind: derived
  entity: Household
  dtype: Count
  period: Month
  source: SNAP Policy 24.25, page 3, documentation after change to simplified reporting
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-3
          excerpt: within two (2) business days
      - path: versions[0].effective_from
        kind: effective_period
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-3
          excerpt: 'Effective Date: 02/15/2023'
  versions:
  - effective_from: '2023-02-15'
    formula: 'if household_changed_to_simplified_reporting: 2 else: 0'
imports:
- us-tn:policies/dhs/snap/24-25/page-2#twenty_four_month_certification_length
