format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/regulation/1240-01/03/15/block-1
  summary: |-
    Enumeration assigns/verifies SSNs for AFDC or Food Stamp applicants/recipients. Applies to grantee relative, caretaker, second parent and each child in the AFDC aid group and each Food Stamp household member. A person who does not furnish or apply for an SSN is not eligible. Food Stamps Only: if a household member is unable to provide the SSN prior to certification, he/she will be mandated to apply at the DHS county office, even if he/she applies directly to SSA prior to the Food Stamp application date.
rules:
  - name: person_meets_ssn_enumeration_requirement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Tenn. Comp. R. & Regs. 1240-01-03-.15
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/regulation/1240-01/03/15/block-1
              excerpt: "A person who does not furnish or apply for a Social Security Number is not eligible to receive AFDC or Food Stamps."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_furnished_ssn
          or person_applied_for_ssn
  - name: food_stamp_member_must_apply_at_dhs_county_office
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Tenn. Comp. R. & Regs. 1240-01-03-.15 (Food Stamps Only)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/regulation/1240-01/03/15/block-1
              excerpt: "if the household member is unable to provide the SSN prior to certification, he/she will be mandated to apply for one at the DHS county office, even if he/she applies for one directly to the SSA office prior to the Food Stamp application date."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_food_stamp_household_member
          and person_unable_to_provide_ssn_prior_to_certification
