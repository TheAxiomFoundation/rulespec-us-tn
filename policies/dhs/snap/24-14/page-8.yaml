format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-14/page-8
  summary: |-
    "Support payments received by a household but transferred to the Child Support Agency." "Vendor payments" paid to a third party from funds not owed to the household are excluded, but legally obligated funds otherwise payable to the household and diverted to a third party are counted as income. The page also lists PASS account deposits, AmeriCorps/VISTA categories, Vietnam veteran child allowances, and SSI lump sum installment payments.
rules:
  - name: support_payment_transferred_to_child_support_agency_excluded_from_snap_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: Tennessee DHS SNAP Policy 24.14, page 8, item 25
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-14/page-8
    versions:
      - effective_from: '2022-01-04'
        formula: |-
          payment_is_support_payment_received_by_household
          and payment_transferred_to_child_support_agency

  - name: vendor_payment_excluded_from_snap_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: Tennessee DHS SNAP Policy 24.14, page 8, item 26
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-14/page-8
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-14/page-8
    versions:
      - effective_from: '2022-01-04'
        formula: |-
          payment_is_money_payment_not_payable_directly_to_household_but_paid_to_third_party_for_household_expense
          and payment_for_household_expense_from_funds_not_owed_to_household
          and not payment_legally_obligated_and_otherwise_payable_to_household_diverted_to_third_party_for_household_expense

  - name: vendor_exception_payment_counted_as_snap_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: Tennessee DHS SNAP Policy 24.14, page 8, item 26 exception
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-14/page-8
    versions:
      - effective_from: '2022-01-04'
        formula: |-
          payment_is_money_payment_not_payable_directly_to_household_but_paid_to_third_party_for_household_expense
          and payment_legally_obligated_and_otherwise_payable_to_household_diverted_to_third_party_for_household_expense

  - name: pass_account_deposit_excluded_from_snap_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: Tennessee DHS SNAP Policy 24.14, page 8, item 27
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-14/page-8
    versions:
      - effective_from: '2022-01-04'
        formula: |-
          payment_deposited_into_pass_account_under_title_xvi

  - name: americorps_on_the_job_training_earnings_excluded_from_snap_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: Tennessee DHS SNAP Policy 24.14, page 8, item 28(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-14/page-8
              excerpt: "individuals under age 19 who are under the parental control"
    versions:
      - effective_from: '2022-01-04'
        formula: |-
          payment_is_americorps_on_the_job_training_earnings
          and recipient_is_under_age_19
          and recipient_under_parental_control_of_adult_household_member

  - name: vista_income_excluded_from_snap_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: Tennessee DHS SNAP Policy 24.14, page 8, item 28(b)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-14/page-8
    versions:
      - effective_from: '2022-01-04'
        formula: |-
          payment_is_vista_income_authorized_under_domestic_volunteer_services_act
          and recipient_was_receiving_ff_or_snap_when_joined_vista

  - name: vista_income_included_as_earned_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: Tennessee DHS SNAP Policy 24.14, page 8, item 28(b)(ii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-14/page-8
    versions:
      - effective_from: '2022-01-04'
        formula: |-
          payment_is_vista_income_authorized_under_domestic_volunteer_services_act
          and recipient_is_new_applicant
          and not recipient_was_receiving_ff_or_snap_when_joined_vista

  - name: other_americorps_program_income_excluded_from_snap_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: Tennessee DHS SNAP Policy 24.14, page 8, item 28(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-14/page-8
    versions:
      - effective_from: '2022-01-04'
        formula: |-
          payment_is_income_from_other_americorps_program

  - name: spina_bifida_vietnam_veteran_child_benefit_excluded_from_snap_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: Tennessee DHS SNAP Policy 24.14, page 8, item 29(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-14/page-8
    versions:
      - effective_from: '2022-01-04'
        formula: |-
          payment_is_benefit_based_on_birth_defect_of_spina_bifida
          and recipient_child_suffers_from_spina_bifida
          and recipient_mother_or_father_served_in_vietnam

  - name: female_vietnam_veteran_child_birth_defect_benefit_excluded_from_snap_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: Tennessee DHS SNAP Policy 24.14, page 8, item 29(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-14/page-8
              excerpt: "approved back to 12/1/2001"
    versions:
      - effective_from: '2022-01-04'
        formula: |-
          payment_is_birth_defect_benefit_under_vietnam_benefits_and_health_care_improvement_act_section_401
          and recipient_born_to_female_vietnam_veteran

  - name: ssi_lump_sum_max_installments
    kind: parameter
    dtype: Count
    source: Tennessee DHS SNAP Policy 24.14, page 8, item 30
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-14/page-8
              excerpt: "no more than three (3) installments"
    versions:
      - effective_from: '2022-01-04'
        formula: |-
          3

  - name: ssi_lump_sum_installment_interval_months
    kind: parameter
    dtype: Count
    source: Tennessee DHS SNAP Policy 24.14, page 8, item 30
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-14/page-8
              excerpt: "six (6) month intervals"
    versions:
      - effective_from: '2022-01-04'
        formula: |-
          6

  - name: ssi_lump_sum_installment_payment_excluded_from_snap_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: Tennessee DHS SNAP Policy 24.14, page 8, item 30
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-14/page-8
          - path: versions[0].formula
            kind: import
            import:
              target: us-tn:policies/dhs/snap/24-14/page-8#ssi_lump_sum_max_installments
              output: ssi_lump_sum_max_installments
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-tn:policies/dhs/snap/24-14/page-8#ssi_lump_sum_installment_interval_months
              output: ssi_lump_sum_installment_interval_months
              hash: sha256:local
    versions:
      - effective_from: '2022-01-04'
        formula: |-
          payment_is_large_retroactive_ssi_benefit_amount
          and payment_paid_as_installment_to_ssi_recipient
          and ssi_lump_sum_installment_count <= ssi_lump_sum_max_installments
          and ssi_lump_sum_payment_interval_months == ssi_lump_sum_installment_interval_months
