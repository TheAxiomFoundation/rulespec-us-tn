format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-11/page-14
  summary: |-
    "Volunteer Work Volunteering for at least twenty (20) hours a week or eighty (80) a month... Working Individual employed working eighty (80) hours per month... Pregnancy in any month temporarily exempts the person from this work requirement... An able-bodied adult with no dependents, who does not meet an ABAWD exemption, may be eligible to receive three (3) months of SNAP benefits in a thirty-six (36) month period."
rules:
  - name: volunteer_work_weekly_hours_threshold
    kind: parameter
    dtype: Decimal
    source: SNAP Work Requirements, Policy 24.11, p.14, item 14
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-11/page-14
              excerpt: "at least twenty (20) hours a week"
    versions:
      - effective_from: '2023-03-01'
        formula: |-
          20

  - name: volunteer_work_monthly_hours_threshold
    kind: parameter
    dtype: Decimal
    source: SNAP Work Requirements, Policy 24.11, p.14, item 14
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-11/page-14
              excerpt: "eighty (80) a month"
    versions:
      - effective_from: '2023-03-01'
        formula: |-
          80

  - name: paid_work_monthly_hours_threshold
    kind: parameter
    dtype: Decimal
    source: SNAP Work Requirements, Policy 24.11, p.14, item 15
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-11/page-14
              excerpt: "working eighty (80) hours per month"
    versions:
      - effective_from: '2023-03-01'
        formula: |-
          80

  - name: abawd_snap_benefit_month_limit
    kind: parameter
    dtype: Count
    source: SNAP Work Requirements, Policy 24.11, p.14, ABAWD Eligibility
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-11/page-14
              excerpt: "three (3) months of SNAP benefits"
    versions:
      - effective_from: '2023-03-01'
        formula: |-
          3

  - name: abawd_snap_benefit_period_months
    kind: parameter
    dtype: Count
    source: SNAP Work Requirements, Policy 24.11, p.14, ABAWD Eligibility
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-11/page-14
              excerpt: "thirty-six (36) month period"
    versions:
      - effective_from: '2023-03-01'
        formula: |-
          36

  - name: person_volunteer_work_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Work Requirements, Policy 24.11, p.14, item 14
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-11/page-14
          - path: versions[0].formula
            kind: import
            import:
              target: us-tn:policies/dhs/snap/24-11/page-14#volunteer_work_weekly_hours_threshold
              output: volunteer_work_weekly_hours_threshold
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-tn:policies/dhs/snap/24-11/page-14#volunteer_work_monthly_hours_threshold
              output: volunteer_work_monthly_hours_threshold
              hash: sha256:local
    versions:
      - effective_from: '2023-03-01'
        formula: |-
          volunteer_hours_per_week >= volunteer_work_weekly_hours_threshold
          or volunteer_hours_per_month >= volunteer_work_monthly_hours_threshold

  - name: person_paid_work_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Work Requirements, Policy 24.11, p.14, item 15
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-11/page-14
          - path: versions[0].formula
            kind: import
            import:
              target: us-tn:policies/dhs/snap/24-11/page-14#paid_work_monthly_hours_threshold
              output: paid_work_monthly_hours_threshold
              hash: sha256:local
    versions:
      - effective_from: '2023-03-01'
        formula: |-
          employed_for_pay
          and paid_work_hours_per_month >= paid_work_monthly_hours_threshold

  - name: person_pregnancy_work_requirement_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Work Requirements, Policy 24.11, p.14, item 16
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-11/page-14
    versions:
      - effective_from: '2023-03-01'
        formula: |-
          pregnancy_in_month

  - name: abawd_out_of_state_benefit_countable_month
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Work Requirements, Policy 24.11, p.14, ABAWD Eligibility countable months item 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-11/page-14
    versions:
      - effective_from: '2023-03-01'
        formula: |-
          received_out_of_state_snap_benefit_month

  - name: abawd_time_limited_snap_eligibility_available
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Work Requirements, Policy 24.11, p.14, ABAWD Eligibility
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-11/page-14
          - path: versions[0].formula
            kind: import
            import:
              target: us-tn:policies/dhs/snap/24-11/page-14#abawd_snap_benefit_month_limit
              output: abawd_snap_benefit_month_limit
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-tn:policies/dhs/snap/24-11/page-14#abawd_snap_benefit_period_months
              output: abawd_snap_benefit_period_months
              hash: sha256:local
    versions:
      - effective_from: '2023-03-01'
        formula: |-
          person_is_able_bodied_adult
          and person_has_no_dependents
          and not person_meets_abawd_exemption
          and countable_abawd_benefit_months_in_period < abawd_snap_benefit_month_limit
          and abawd_lookback_period_months == abawd_snap_benefit_period_months
