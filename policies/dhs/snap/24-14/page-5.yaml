format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-14/page-5
  summary: SNAP Income exclusions include WIOA income rules, certain pre-1975 housing
    payments, Nazi persecution victim payments, all educational income, federally
    identified energy assistance, Agent Orange settlement payments, earned income
    tax credits, Crime Act victim compensation, and earned income of certain household
    members under age eighteen.
  deferred_outputs:
  - output: us-tn:policies/dhs/snap/24-14/page-5#payment_excluded_from_snap_income
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
rules:
- name: wioa_on_the_job_training_income_excluded
  kind: derived
  entity: Payment
  dtype: Judgment
  period: Month
  source: SNAP Policy 24.14, page 5, item 9(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-14/page-5
          excerpt: Earnings for WIOA on-the-job training programs are excluded only
            for individuals under age 19 who are under the parental control of an
            adult household member.
  versions:
  - effective_from: '2022-01-04'
    formula: 'payment_is_wioa_on_the_job_training_earnings

      and payment_recipient_is_under_age_19

      and payment_recipient_under_parental_control_of_adult_household_member'
