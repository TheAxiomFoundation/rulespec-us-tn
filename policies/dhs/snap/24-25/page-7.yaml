- name: ssi_only_household_entitled_to_apply_at_ssa_office
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: Policy 24.25, Recertification 1(e)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-7
  versions:
  - effective_from: '2023-02-15'
