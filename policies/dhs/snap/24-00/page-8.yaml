  summary: |-
    Definitions: Noncompliance is a factual finding that any Civil Rights requirement is not being adhered to by a State agency, local agency, or subrecipient. NDS = Non-Discrimination Statement. SNAP = Supplemental Nutrition Assistance Program. State Agency in Tennessee is the Tennessee Department of Human Services. Subrecipient = a non-Federal entity that expends Federal awards received from a pass-through entity to carry out a federal program, but does not include an individual that is a beneficiary. TDHS = Tennessee Department of Human Services. USDA = United States Department of Agriculture. Supersedes Policy 24.00 Rights and Responsibilities of SNAP Applicants/Participants, Effective 07/16/2018. Authority: 7 U.S.C. § 2011 et seq.; Age Discrimination Act of 1975, 42 U.S.C. § 6101; Rehabilitation Act of 1973, 29 U.S.C. § 701; Title VI of the Civil Rights Act of 1964, 42 U.S.C. sec. 2000d et seq. Application: All TDHS Employees and Contractors.
  status: deferred
