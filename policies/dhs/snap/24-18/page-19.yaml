format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-19
  summary: |-
    Term Definition Energy Assistance Payment Any payment made to a household or utility company, which is earmarked specifically to pay a household's utility costs. Other qualified health professionals include registered nurses, physician assistants, nurse practitioners, certified registered nurse anesthetists, and physical, speech, occupational, and massage therapists. Application All TDHS Employees and Contractors
rules:
  - name: energy_assistance_payment
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.18, page 19, Term Definition, Energy Assistance Payment
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-19
    versions:
      - effective_from: '2018-09-17'
        formula: |-
          (payment_made_to_household or payment_made_to_utility_company)
          and payment_earmarked_specifically_to_pay_household_utility_costs

  - name: other_qualified_health_professional
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.18, page 19, Term Definition, Other Qualified Health Professional
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-19
    versions:
      - effective_from: '2018-09-17'
        formula: |-
          person_is_registered_nurse
          or person_is_physician_assistant
          or person_is_nurse_practitioner
          or person_is_certified_registered_nurse_anesthetist
          or person_is_physical_therapist
          or person_is_speech_therapist
          or person_is_occupational_therapist
          or person_is_massage_therapist
