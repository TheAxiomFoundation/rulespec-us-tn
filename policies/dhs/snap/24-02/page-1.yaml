format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-1
  summary: |-
    "The application process for SNAP begins with a request for an application and ends with notification of the household's eligibility or ineligibility." "The household may voluntarily withdraw its application any time prior to the determination of eligibility." "The household must be given an opportunity to participate no later than thirty (30) calendar days after an application is filed." "Expedited service shall be available to a household that meets the criteria." "Benefits must be provided retroactively to the day of the month the application was filed..."
rules:
  - name: opportunity_to_participate_deadline_days
    kind: parameter
    dtype: Integer
    source: SNAP Application Processing Policy 24.02, Application Process paragraph 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-1
              excerpt: "no later than thirty (30) calendar days after an application is filed"
    versions:
      - effective_from: '2022-12-01'
        formula: |-
          30

  - name: withdrawal_available_before_eligibility_determination
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Application Processing Policy 24.02, Application Process paragraph 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-1
    versions:
      - effective_from: '2022-12-01'
        formula: |-
          application_filed
          and eligibility_determination_not_completed

  - name: withdrawal_documentation_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Application Processing Policy 24.02, Application Process paragraph 2(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-1
    versions:
      - effective_from: '2022-12-01'
        formula: |-
          not household_voluntarily_withdraws_application
          or (eligibility_counselor_documented_withdrawal_reason_if_any and eligibility_counselor_documented_contact_confirming_withdrawal)

  - name: withdrawal_reapplication_advisement_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Application Processing Policy 24.02, Application Process paragraph 2(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-1
    versions:
      - effective_from: '2022-12-01'
        formula: |-
          not household_voluntarily_withdraws_application
          or household_advised_of_right_to_reapply_at_any_time

  - name: opportunity_to_participate_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Application Processing Policy 24.02, Application Process paragraph 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-1
          - path: versions[0].formula
            kind: import
            import:
              target: us-tn:policies/dhs/snap/24-02/page-1#opportunity_to_participate_deadline_days
              output: opportunity_to_participate_deadline_days
              hash: sha256:local
    versions:
      - effective_from: '2022-12-01'
        formula: |-
          days_after_application_filed_when_opportunity_to_participate_given <= opportunity_to_participate_deadline_days

  - name: expedited_service_available
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: SNAP Application Processing Policy 24.02, Application Process paragraph 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-1
    versions:
      - effective_from: '2022-12-01'
        formula: |-
          household_meets_expedited_service_criteria

  - name: retroactive_benefits_to_application_filing_day_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Application Processing Policy 24.02, Application Process paragraph 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-1
    versions:
      - effective_from: '2022-12-01'
        formula: |-
          household_completed_application_process
          and household_determined_eligible
          and household_eligible_for_benefits_in_month_of_application
