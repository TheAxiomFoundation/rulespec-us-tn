    SNAP Rights and Responsibilities of Applicants/Participants, Policy 24.00, page 6 of 9. Describes administrative duties: maintaining regulations/plans/federal procedures in offices, providing printed materials (brochures, pamphlets) describing eligibility criteria, and operating the One DHS Contact Center toll-free helpline (1-833-772-8347) providing program information, complaint and fair hearing procedures, county office contacts, and application forms. Lists supporting documents. Contains no computable eligibility conditions, amounts, rates, thresholds, or benefit formulas.
