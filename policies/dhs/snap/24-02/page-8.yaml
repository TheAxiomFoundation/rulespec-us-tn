format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-8
  summary: |-
    SNAP Policy 24.02 page 8: Refusal to provide verification is grounds for denial/termination. Households given at least 10 days to cooperate. Once denied for refusal, must cooperate to be eligible. QC cooperation required: state review reopens if reapply within 115 days; federal review reopens if reapply within 7 months. After those timeframes, eligibility may be determined without QC cooperation but verification of all factors required.
rules:
  - name: state_qc_review_reopen_days
    kind: parameter
    dtype: Integer
    source: SNAP Policy 24.02 page 8, 4.b.i
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-8
              excerpt: "within one hundred and fifteen (115) days from the end of the annual review period for a state review"
    versions:
      - effective_from: '2022-12-01'
        formula: |-
          115
  - name: federal_qc_review_reopen_months
    kind: parameter
    dtype: Integer
    source: SNAP Policy 24.02 page 8, 4.b.i
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-8
              excerpt: "seven months for a federal review"
    versions:
      - effective_from: '2022-12-01'
        formula: |-
          7
  - name: minimum_days_to_cooperate
    kind: parameter
    dtype: Integer
    source: SNAP Policy 24.02 page 8, 2.c
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-8
              excerpt: "the household will be given at least ten (10) days to cooperate"
    versions:
      - effective_from: '2022-12-01'
        formula: |-
          10
  - name: application_processing_extension_threshold_days
    kind: parameter
    dtype: Integer
    source: SNAP Policy 24.02 page 8, 4.b.iii
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-8
              excerpt: "If the application processing period extends beyond thirty (30) days because of the time necessary for the QC review"
    versions:
      - effective_from: '2022-12-01'
        formula: |-
          30
  - name: household_must_cooperate_with_qc_before_eligibility
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.02 page 8, 4.b.i-ii
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-8
              excerpt: "If the household reapplies within one hundred and fifteen (115) days from the end of the annual review period for a state review, or seven months for a federal review, it must cooperate with QC and complete the review before it may be determined eligible"
    versions:
      - effective_from: '2022-12-01'
        formula: |-
          (household_reapplied_after_qc_refusal
          and qc_review_was_state_review
          and days_since_end_of_annual_review_period <= state_qc_review_reopen_days)
          or
          (household_reapplied_after_qc_refusal
          and qc_review_was_federal_review
          and months_since_end_of_federal_review_period <= federal_qc_review_reopen_months)
  - name: household_denied_for_refusal_to_cooperate
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.02 page 8, 2.a and 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-8
              excerpt: "Refusal to provide verification or information needed to obtain required verification is sufficient ground for denial or termination."
    versions:
      - effective_from: '2022-12-01'
        formula: |-
          household_refused_to_provide_required_verification
          and not eligibility_counselor_unsure_refusal_or_failure
  - name: reasonable_opportunity_to_cooperate_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.02 page 8, 2.c
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-8
              excerpt: "If the Eligibility Counselor is unsure whether the household has refused or merely failed to cooperate, the request for assistance will not be denied or terminated. Instead, the household will be given a reasonable opportunity to cooperate."
    versions:
      - effective_from: '2022-12-01'
        formula: |-
          eligibility_counselor_unsure_refusal_or_failure
