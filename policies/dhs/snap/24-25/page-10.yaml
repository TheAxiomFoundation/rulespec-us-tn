format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-10
  summary: |-
    "The Eligibility Counselor will send a request for shelter cost changes and allow the household to provide the requested information within ten (10) days." "Although the household may be entitled to increased benefits, do not issue such increases until the change is verified." "A supplementary allotment will be authorized only if ... the change has been verified; and ... after computer cut-off."
rules:
  - name: shelter_cost_change_response_deadline_days
    kind: parameter
    dtype: Count
    source: SNAP Continued Responsibilities, shelter cost changes
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-10
              excerpt: "within ten (10) days"
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          10

  - name: increased_benefit_may_be_issued
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Continued Responsibilities, When a Change Results in Increased Benefits
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-10
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          change_entitles_household_to_increased_benefits
          and change_verified

  - name: expense_deduction_removed_when_verification_missing
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Continued Responsibilities, When a Change Results in Increased Benefits
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-10
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          verification_of_change_in_expense_or_deduction_requested
          and not requested_verification_provided

  - name: supplementary_allotment_may_be_authorized
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Continued Responsibilities, Change that May Require a Supplement
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-10
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          change_verified
          and too_late_after_computer_cutoff_to_adjust_following_month_benefits

  - name: supplement_issued_for_month_after_timely_reported_and_verified_change
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Continued Responsibilities, Change that May Require a Supplement
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-10
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          household_eligible_for_supplement
          and change_reported_and_verified_timely
          and month_is_after_change_reported_and_verified

  - name: reduction_or_ineligibility_notice_action_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: SNAP Continued Responsibilities, When a Change Results in Reduction of Benefits
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-10
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          household_benefit_level_decreases_due_to_change
          or household_becomes_ineligible_due_to_change
