        formula: |-
          group_living_arrangement_seeks_snap_approval

  - name: group_living_arrangement_nonprofit_status_verified
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: "Tennessee DHS SNAP Policy 24.06(E)(6)"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-06/page-6
    versions:
      - effective_from: '2019-07-01'
        formula: |-
          home_is_non_profit_residence
          or contract_agency_serving_home_has_non_profit_status

  - name: resident_may_voluntarily_apply_for_snap
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: "Tennessee DHS SNAP Policy 24.06(E)(7)"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-06/page-6
    versions:
      - effective_from: '2019-07-01'
        formula: |-
          resident_is_in_group_living_arrangement
          and (resident_is_blind or resident_is_disabled)

