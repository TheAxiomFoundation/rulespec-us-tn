format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-9
  summary: |-
    TDHS may suspend collection action on IPV claims when the household cannot be located, or for nonparticipating households after stated demand letters for claims under $100 or between $100 and $400 and further collection is likely to cost more than can be recovered. A claim may be determined uncollectible after being held in suspense for three years. TDHS may use a suspended or terminated claim to offset benefits.
rules:
  - name: ipv_low_claim_amount_upper_threshold
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: Policy 24.22, page 9, 5.b.ii
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-9
              excerpt: "claims under one hundred dollars ($100)"
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          100

  - name: ipv_mid_claim_amount_lower_threshold
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: Policy 24.22, page 9, 5.b.ii
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-9
              excerpt: "between one hundred dollars ($100) and four hundred dollars ($400)"
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          100

  - name: ipv_mid_claim_amount_upper_threshold
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: Policy 24.22, page 9, 5.b.ii
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-9
              excerpt: "between one hundred dollars ($100) and four hundred dollars ($400)"
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          400

  - name: ipv_low_claim_demand_letter_minimum
    kind: parameter
    dtype: Count
    period: Month
    source: Policy 24.22, page 9, 5.b.ii
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-9
              excerpt: "at least one (1) demand letter"
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          1

  - name: ipv_mid_claim_demand_letter_minimum
    kind: parameter
    dtype: Count
    period: Month
    source: Policy 24.22, page 9, 5.b.ii
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-9
              excerpt: "at least two (2) demand letters"
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          2

  - name: claim_suspense_years_before_uncollectible
    kind: parameter
    dtype: Count
    period: Month
    source: Policy 24.22, page 9, 6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-9
              excerpt: "held in suspense for three (3) years"
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          3

  - name: ipv_claim_collection_action_may_be_suspended
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.22, page 9, 5.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-9
          - path: versions[0].formula
            kind: import
            import:
              target: us-tn:policies/dhs/snap/24-22/page-9#ipv_low_claim_amount_upper_threshold
              output: ipv_low_claim_amount_upper_threshold
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-tn:policies/dhs/snap/24-22/page-9#ipv_mid_claim_amount_lower_threshold
              output: ipv_mid_claim_amount_lower_threshold
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-tn:policies/dhs/snap/24-22/page-9#ipv_mid_claim_amount_upper_threshold
              output: ipv_mid_claim_amount_upper_threshold
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-tn:policies/dhs/snap/24-22/page-9#ipv_low_claim_demand_letter_minimum
              output: ipv_low_claim_demand_letter_minimum
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-tn:policies/dhs/snap/24-22/page-9#ipv_mid_claim_demand_letter_minimum
              output: ipv_mid_claim_demand_letter_minimum
              hash: sha256:local
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          household_has_intentional_program_violation_claim
          and (
            tdhs_has_documentation_household_cannot_be_located
            or (
              household_is_not_participating_in_benefits
              and cost_of_further_collection_action_likely_exceeds_recoverable_amount
              and (
                (
                  claim_amount < ipv_low_claim_amount_upper_threshold
                  and demand_letters_sent_count >= ipv_low_claim_demand_letter_minimum
                )
                or (
                  claim_amount >= ipv_mid_claim_amount_lower_threshold
                  and claim_amount <= ipv_mid_claim_amount_upper_threshold
                  and demand_letters_sent_count >= ipv_mid_claim_demand_letter_minimum
                )
              )
            )
          )

  - name: claim_may_be_determined_uncollectible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.22, page 9, 6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-9
          - path: versions[0].formula
            kind: import
            import:
              target: us-tn:policies/dhs/snap/24-22/page-9#claim_suspense_years_before_uncollectible
              output: claim_suspense_years_before_uncollectible
              hash: sha256:local
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          claim_is_held_in_suspense
          and years_claim_held_in_suspense >= claim_suspense_years_before_uncollectible

  - name: claim_may_be_used_to_offset_benefits
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.22, page 9, 6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-9
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          claim_is_suspended
          or claim_is_terminated
