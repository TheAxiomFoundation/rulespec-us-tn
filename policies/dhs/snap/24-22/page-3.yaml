format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-3
  summary: |-
    "A claim shall be handled as an administrative error if the over issuance was caused by TDHS." IPV consists of intentional false or misleading statements, misrepresentation, concealment, withholding facts, or intentional SNAP-law violations for using, presenting, transferring, acquiring, receiving, possessing, or trafficking benefits or EBT devices. IPV claims are handled only after an ADH/court IPV determination, HS-32475 waiver disqualification, or HS-3245 consent agreement. Claims shall not be established for specified procedural errors; claims of "$200 or less" are not referred to investigations unless referred by Quality Control.
rules:
  - name: maximum_claim_amount_not_referred_to_investigations
    kind: parameter
    dtype: Money
    unit: USD
    source: Policy 24.22(D)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-3
              excerpt: "two hundred dollars ($200) or less"
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          200

  - name: claim_handled_as_administrative_error
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.22(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-3
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          over_issuance_caused_by_tdhs

  - name: administrative_error_instance_may_result_in_claim
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.22(b)(i)-(iv)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-3
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          tdhs_failed_prompt_action_on_household_reported_change
          or tdhs_incorrectly_computed_household_income_or_deductions_or_assigned_incorrect_allotment
          or tdhs_incorrectly_issued_duplicate_allotments
          or tdhs_continued_snap_allotment_after_certification_expired_without_recetification

  - name: intentional_program_violation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Policy 24.22(c)(i)-(ii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-3
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          intentionally_made_false_or_misleading_statement_or_misrepresented_concealed_or_withheld_facts
          or intentionally_committed_snap_law_violation_for_benefit_or_ebt_use_transfer_acquisition_receipt_possession_or_trafficking

  - name: claim_handled_as_ipv
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.22(c)(2)(a)-(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-3
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          adh_official_or_court_determined_household_member_committed_ipv
          or household_member_disqualified_by_hs_32475_waiver_of_adh
          or household_member_signed_hs_3245_disqualification_consent_agreement

  - name: claim_not_established_for_procedural_error
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.22(D)(1)(a)-(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-3
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          over_issuance_occurred_as_result_of_procedural_errors
          and county_office_failed_to_ensure_household_signed_application
          or over_issuance_occurred_as_result_of_procedural_errors
          and county_office_failed_to_ensure_household_completed_current_work_registration_form
          or over_issuance_occurred_as_result_of_procedural_errors
          and county_office_failed_to_ensure_household_was_certified_in_correct_project_area

  - name: claim_referred_to_investigations
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.22(D)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-3
              excerpt: "two hundred dollars ($200) or less will not be referred to investigations (unless referred by Quality Control)"
          - path: versions[0].formula
            kind: import
            import:
              target: us-tn:policies/dhs/snap/24-22/page-3#maximum_claim_amount_not_referred_to_investigations
              output: maximum_claim_amount_not_referred_to_investigations
              hash: sha256:local
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          claim_referred_by_quality_control
          or claim_amount > maximum_claim_amount_not_referred_to_investigations
