format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-30/page-2
  summary: |-
    Policy 24.30, Page 2: pending applications exceeding 32,000 for more than five business days triggers corrective measures; the Director of Operations schedules twice daily meetings until the count falls below that threshold. Interviews are scheduled on the fourth business day; non-expedited applications no later than the seventh business day; expedited appointments beyond the fourth business day for more than two consecutive business days trigger added appointment slots.
rules:
  - name: pending_application_corrective_action_threshold
    kind: parameter
    dtype: Count
    source: Policy 24.30, Page 2, paragraph 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-30/page-2
              excerpt: "applications pending disposition exceed thirty-two thousand (32,000)"
    versions:
      - effective_from: '2025-03-01'
        formula: |-
          32000
  - name: pending_application_corrective_action_business_days
    kind: parameter
    dtype: Count
    source: Policy 24.30, Page 2, paragraph 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-30/page-2
              excerpt: "for more than five (5) business days"
    versions:
      - effective_from: '2025-03-01'
        formula: |-
          5
  - name: operations_progress_meetings_per_day
    kind: parameter
    dtype: Count
    source: Policy 24.30, Page 2, paragraph 4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-30/page-2
              excerpt: "schedule twice daily meetings"
    versions:
      - effective_from: '2025-03-01'
        formula: |-
          2
  - name: scheduled_interview_batch_business_day
    kind: parameter
    dtype: Count
    source: Policy 24.30, Page 2, C.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-30/page-2
              excerpt: "schedule eligibility interviews on the fourth (4th) business day"
    versions:
      - effective_from: '2025-03-01'
        formula: |-
          4
  - name: expedited_application_scheduled_business_day
    kind: parameter
    dtype: Count
    source: Policy 24.30, Page 2, C.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-30/page-2
              excerpt: "expedited applications are scheduled on the fourth (4th) business day"
    versions:
      - effective_from: '2025-03-01'
        formula: |-
          4
  - name: non_expedited_application_latest_scheduled_business_day
    kind: parameter
    dtype: Count
    source: Policy 24.30, Page 2, C.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-30/page-2
              excerpt: "non-expedited applications are scheduled no later than the seventh (7th) business day"
    versions:
      - effective_from: '2025-03-01'
        formula: |-
          7
  - name: expedited_appointment_delay_consecutive_business_days
    kind: parameter
    dtype: Count
    source: Policy 24.30, Page 2, C.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-30/page-2
              excerpt: "for more than two (2) consecutive business days"
    versions:
      - effective_from: '2025-03-01'
        formula: |-
          2
