format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-5
  summary: |-
    Failure to Report Required Changes: If staff discover and verify the household failed to report a required change and as a result received benefits to which it was not entitled exceeding $200.00, the worker will file a claim. Individuals will not be disqualified from SNAP for failure to report a change unless disqualified in accordance with Policy 24.22. If a household should lose benefits because of failure to report changes timely or at all, the household is not entitled to restoration of lost benefits. Mass Changes: if a household requests a fair hearing timely, benefits shall be continued at the former level only if the issue appealed is improper computation and not reduction because of the mass change. Notice of Adverse Action: before reducing or terminating SNAP benefits within certification, timely and adequate advance notice is required.
rules:
  - name: failure_to_report_claim_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: Policy 24.25, Page 5, Failure to Report Required Changes item 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-5
              excerpt: "exceeding $200.00"
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          200.00

  - name: failure_to_report_claim_filing_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.25, Page 5, Failure to Report Required Changes item 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-5
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-5
              excerpt: "benefits to which it was not entitled exceeding $200.00"
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          staff_discovered_and_verified_household_failed_to_report_required_change
          and household_received_benefits_not_entitled_to_as_result_of_failure_to_report_amount > failure_to_report_claim_threshold

  - name: current_certification_change_notice_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.25, Page 5, Failure to Report Required Changes item 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-5
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          discovery_is_made_and_verified
          and discovery_affects_current_certification

  - name: failure_to_report_disqualification_prohibited
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Policy 24.25, Page 5, Failure to Report Required Changes item 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-5
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          individual_failed_to_report_change
          and not individual_disqualified_in_accordance_with_policy_24_22

  - name: lost_benefits_restoration_prohibited
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.25, Page 5, Failure to Report Required Changes item 4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-5
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          household_lost_benefits
          and household_loss_was_because_failure_to_report_changes_timely_or_at_all

  - name: mass_change_former_level_benefits_continuation_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.25, Page 5, Mass Changes item 4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-5
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-5
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          household_requested_fair_hearing_timely
          and appealed_issue_is_snap_eligibility_or_benefits_improperly_computed
          and not appealed_issue_is_benefits_reduced_because_of_mass_change

  - name: adverse_action_advance_notice_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.25, Page 5, Notice of Adverse Action item 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-5
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          household_snap_benefits_will_be_reduced_or_terminated
          and adverse_action_occurs_within_certification_period
