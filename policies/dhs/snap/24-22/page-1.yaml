format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-1
  summary: |-
    Effective: August 15, 2019. SNAP benefits are authorized by ACCENT and mailed to the address the client or authorized representative has provided. Benefits can be mailed to the recipient's home, the county office, or a separate mailing address designated by the household. EBT cards or PIN information will not be issued to TDHS staff members unless the staff member is certified to participate in SNAP in his or her own right.
rules:
  - name: ebt_card_or_pin_information_issuance_not_barred_by_tdhs_staff_rule
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Claims and Issuances Policy 24.22, Method of Delivery A.2.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-22/page-1
    versions:
      - effective_from: '2019-08-15'
        formula: |-
          not person_is_tdhs_staff_member
          or tdhs_staff_member_is_certified_to_participate_in_snap_in_own_right
