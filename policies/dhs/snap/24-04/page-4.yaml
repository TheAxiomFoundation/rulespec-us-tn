  summary: |-
    SNAP Household Composition (Policy 24.04, page 4 of 5): Definitions/Acronyms section. Defines Department, Head of Household, HH, Household ("a social unit comprised of varying numbers of individuals who live together in the same dwelling who customarily purchase and prepare food together for home consumption"), Living Constellation, Parent-Child Relationship, Parental Control, Pattern of Living, Sibling, SNAP, and Spouse ("Two people who are legally married. For couples in a same-sex marriage, spouses must be included in one SNAP household. Tennessee does not recognize common law marriage."). Lists supporting documents and supersedes the July 2017 SNAP Policy Manual, Chapter 2, Bulletin No. 31, FA-06-24.
  status: deferred
  deferred_outputs:
    - output: us-tn:policies/dhs/snap/24-04/page-4#definitions
      reason: |-
        Source text on this page is the Definitions/Acronyms glossary plus a list
        of supporting-document cross-references for SNAP Household Composition
        policy 24.04. The page states no computable amounts, rates, thresholds,
        eligibility tests, or condition formulas; it only supplies term
        definitions and pointers to other policy pages. Encoding definitional
        prose as executable RuleSpec outputs would invent ontology not stated by
        this page.
