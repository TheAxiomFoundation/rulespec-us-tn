format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-11
  summary: |-
    Replacement benefits shall be provided when a household reports SNAP-purchased food destroyed in a household misfortune; replacement benefits are provided only if the household is eligible and reports a loss timely unless an FNS waiver is approved. A report is timely if made within ten (10) days. Staff shall not take adverse action based on data matches unless the information is verified upon receipt.
rules:
  - name: replacement_benefit_loss_report_deadline_days
    kind: parameter
    dtype: Count
    source: Policy 24.25, page 11, Replacement Benefits(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-11
              excerpt: "within ten (10) days"
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          10

  - name: replacement_benefit_loss_report_timely
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: Policy 24.25, page 11, Replacement Benefits(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-11
          - path: versions[0].formula
            kind: import
            import:
              target: us-tn:policies/dhs/snap/24-25/page-11#replacement_benefit_loss_report_deadline_days
              output: replacement_benefit_loss_report_deadline_days
              hash: sha256:local
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          household_reports_food_loss
          and days_from_food_destroyed_to_report <= replacement_benefit_loss_report_deadline_days

  - name: replacement_benefits_provided
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: Policy 24.25, page 11, Replacement Benefits
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-11
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-11
          - path: versions[0].formula
            kind: import
            import:
              target: us-tn:policies/dhs/snap/24-25/page-11#replacement_benefit_loss_report_timely
              output: replacement_benefit_loss_report_timely
              hash: sha256:local
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          household_determined_eligible_for_replacement_benefits
          and food_purchased_with_snap_benefits_destroyed_in_household_misfortune
          and (replacement_benefit_loss_report_timely or fns_timely_reporting_waiver_approved)

  - name: adverse_action_based_on_data_match_allowed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: Policy 24.25, page 11, Computer Matches(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-11
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          adverse_action_is_based_on_data_match_information
          and data_match_information_verified_upon_receipt

  - name: unverified_data_match_household_verification_required_before_action
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: Policy 24.25, page 11, Computer Matches(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-11
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          data_match_information_received
          and not data_match_information_verified_upon_receipt
          and (application_approval_pending or active_case_action_on_data_match_pending)

  - name: household_members_must_be_advised_of_snap_work_registration_requirements
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: Policy 24.25, page 11, Families First termination paragraph 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-11
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          families_first_benefits_terminated
          and household_still_eligible_for_snap_benefits
          and snap_work_registration_requirements_applicable
          and families_first_work_requirement_no_longer_applies
