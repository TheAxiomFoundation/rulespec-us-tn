format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/regulation/1240-01/03/13/block-1
  summary: |-
    All aliens other than those listed in 1240-1-3-.12 are ineligible for Food Stamp and Cash Assistance benefits. After five years, those eligible aliens listed in 1240-1-3-.12(1)(b)1.(ii) shall become ineligible for the Food Stamp Program.
rules:
  - name: food_stamp_program_ineligibility_period_years
    kind: parameter
    dtype: Integer
    source: 1240-1-3-.13
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/regulation/1240-01/03/13/block-1
              excerpt: "After five years, those eligible aliens listed in 1240-1-3-.12(1)(b) 1.(ii) shall become ineligible for the Food Stamp Program."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5
  - name: alien_eligible_for_food_stamp_and_cash_assistance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1240-1-3-.13
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/regulation/1240-01/03/13/block-1
              excerpt: "All aliens other than those listed in 1240-1-3-.12 are ineligible for Food Stamp and Cash Assistance benefits."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_alien_listed_in_1240_1_3_12
  - name: alien_eligible_for_food_stamp_program
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1240-1-3-.13
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/regulation/1240-01/03/13/block-1
              excerpt: "After five years, those eligible aliens listed in 1240-1-3-.12(1)(b) 1.(ii) shall become ineligible for the Food Stamp Program."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_alien_listed_in_1240_1_3_12
          and not (
            person_is_alien_listed_in_1240_1_3_12_1_b_1_ii
            and years_since_alien_eligibility_began >= food_stamp_program_ineligibility_period_years
          )
  - name: alien_included_in_assistance_group
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 1240-1-3-.13
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/regulation/1240-01/03/13/block-1
              excerpt: "They shall not be included in an AG in either program."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_alien_listed_in_1240_1_3_12
