format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-04/page-1
  summary: |-
    SNAP Household Composition Policy 24.04 (effective March 1, 2019): A household is composed of (a) an individual living alone; (b) an individual living with others, but customarily purchasing food and preparing meals for home consumption separate and apart from others; or (c) a group of individuals who live together and customarily purchase food and prepare meals together for home consumption. Household size must be verified when questionable, by collateral contact or another accurate source.
rules:
  - name: person_is_snap_household_member
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: TDHS SNAP Policy 24.04(A)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-04/page-1
              excerpt: "An individual living alone; An individual living with others, but customarily purchasing food and preparing meals for home consumption separate and apart from others; or A group of individuals who live together and customarily purchase food and prepare meals together for home consumption."
    versions:
      - effective_from: '2019-03-01'
        formula: |-
          person_lives_alone
          or (person_lives_with_others and person_customarily_purchases_and_prepares_meals_separately)
          or (person_lives_with_others and person_customarily_purchases_and_prepares_meals_together_with_group)
  - name: household_size_verification_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: TDHS SNAP Policy 24.04(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-04/page-1
              excerpt: "Verify the HH size (number of persons in the HH), when questionable."
    versions:
      - effective_from: '2019-03-01'
        formula: |-
          household_size_is_questionable
