format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-03/page-7
  summary: |-
    SNAP Timeliness Standards (Policy 24.03, page 7 of 10). Covers reopening
    when verification is provided in the second 30-day period (benefits from
    date verification furnished), action without new application within 60
    days, household (applicant) delays (loss of entitlement at day 30 if
    household at fault; reopen without new application if action taken within
    60 days; proration from day action taken; new application required if
    household at fault past second 30-day period), and county office delays
    (no denial for county-caused delays; pending notice by day 30; retroactive
    benefits to application date if eligible after county-caused delay).
  status: deferred
  deferred_outputs:
    - output: us-tn:policies/dhs/snap/24-03/page-7#reopen_application_due_to_household_delay
      reason: |-
        Procedural timeliness standards governing eligibility-counselor
        workflow (reopening, denial, pending notices, proration timing).
        These are administrative process rules rather than computable
        benefit, amount, eligibility, or condition outputs. The source
        states no numeric amount, rate, threshold, or computable formula
        beyond restating the 30-day and 60-day processing windows that are
        already defined in the parent SNAP timeliness policy.
    - output: us-tn:policies/dhs/snap/24-03/page-7#benefits_prorated_for_household_delay
      reason: |-
        Proration timing is described qualitatively ("from the day of the
        month that the applicant/recipient took the action") without a
        computable formula tied to a specific household scope in this slice.
    - output: us-tn:policies/dhs/snap/24-03/page-7#retroactive_benefits_for_county_delay
      reason: |-
        Retroactive benefits "to the day it filed its application" describe
        an administrative effective-date treatment, not a numeric amount
        computable from facts stated in this source.
