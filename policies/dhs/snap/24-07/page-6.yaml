format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-07/page-6
  summary: |-
    Definitions/Acronyms: Boarders are individuals residing with others and paying reasonable compensation for lodging and meals; live-in attendants reside with a household to provide medical, housekeeping, child-care, or similar personal services; non-household members reside within a household but are not considered household members when determining SNAP eligibility and allotment amount; roomers receive lodging, but not meals, from a household for compensation. Effective Date: 09/01/2022.
