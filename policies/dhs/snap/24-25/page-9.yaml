format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-9
  summary: |-
    "If verification of shelter costs for the new address is provided timely, enter the amount in the budget and determine the next month's benefits with the deduction." "If verification of shelter costs is not provided, remove any existing shelter deduction." "When the department learns that a household has moved out of the state of Tennessee, take prompt action to close the case." "When the household reports that they are about to move to a different county unless they have a valid address in the new county, do not transfer the case."
rules:
  - name: next_month_budget_shelter_deduction
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Policy 24.25, SNAP Continued Responsibilities, page 9, change of address shelter verification
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-9
              excerpt: "Effective Date: 02/15/2023"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-9
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          if verification_of_shelter_costs_for_new_address_provided_timely: max(0, verified_shelter_costs_for_new_address) else: 0

  - name: out_of_state_move_case_closure_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.25, SNAP Continued Responsibilities, page 9, household moves out of state
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-9
              excerpt: "Effective Date: 02/15/2023"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-9
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          department_learns_household_moved_out_of_tennessee

  - name: new_county_case_transfer_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.25, SNAP Continued Responsibilities, page 9, county-to-county transfer
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-9
              excerpt: "Effective Date: 02/15/2023"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-9
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          household_reports_about_to_move_to_different_county
          and household_has_valid_address_in_new_county

  - name: new_county_case_transfer_barred_without_valid_address
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Policy 24.25, SNAP Continued Responsibilities, page 9, county-to-county transfer
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-9
              excerpt: "Effective Date: 02/15/2023"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-9
    versions:
      - effective_from: '2023-02-15'
        formula: |-
          household_reports_about_to_move_to_different_county
          and not household_has_valid_address_in_new_county
