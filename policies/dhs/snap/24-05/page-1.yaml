format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-05/page-1
  summary: |-
    An authorized representative (AR) is an individual designated by the household to act on behalf of the HH in regards to SNAP benefits. The non-HH member must (a) be an adult; (b) be designated in writing by the head of HH, the spouse, or another responsible HH member; and (c) be sufficiently aware of relevant HH circumstances to act in the HH's behalf. An AR may apply for the HH, obtain the HH's SNAP benefits, and/or use the HH's SNAP benefits to purchase food for the HH.
rules:
  - name: person_qualifies_as_authorized_representative
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: TDHS SNAP Policy 24.05, Section A.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-05/page-1
              excerpt: "The non-HH member must meet the following criteria: a. be an adult; b. have been designated in writing by the head of HH, the spouse, or another responsible HH member; and c. be sufficiently aware of relevant HH circumstances to act in the HH's behalf."
    versions:
      - effective_from: '2019-03-01'
        formula: |-
          person_is_non_household_member
          and person_is_adult
          and person_designated_in_writing_by_responsible_household_member
          and person_sufficiently_aware_of_household_circumstances
