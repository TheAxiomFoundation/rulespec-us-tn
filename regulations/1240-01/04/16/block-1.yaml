format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/regulation/1240-01/04/16/block-1
  summary: |-
    Except for the payments/benefits specifically excluded above, all other payments received by HH/AG members (and in AFDC only, payments received by legally responsible relatives and by step-parents) are treated as income in the determination of eligibility and level of benefits in the Food Stamp and AFDC Programs.
rules:
  - name: payment_treated_as_income
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: TN Reg. 1240-01-04-.16 block 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/regulation/1240-01/04/16/block-1
              excerpt: "all other payments received by HH/AG members ... are treated as income"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not payment_is_specifically_excluded
          and (
            payment_received_by_hh_ag_member
            or (
              program_is_afdc
              and (
                payment_received_by_legally_responsible_relative
                or payment_received_by_step_parent
              )
            )
          )
