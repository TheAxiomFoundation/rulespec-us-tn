format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-03/page-3
  summary: |-
    For applications filed after the fifteenth (15th) of the month, the case management system will assign at least a two (2)-month certification period. Action on the SNAP portion of a joint SNAP/Families First application shall not be delayed or denied because the FF determination has not been made; if FF payment amount and date can be anticipated for a subsequent month, vary the SNAP benefit accordingly; if not, handle as a change in circumstances. Retroactive portions of initial FF payments are disregarded as a lump sum.
rules:
  - name: minimum_certification_period_months_for_late_filed_application
    kind: parameter
    dtype: Integer
    source: 'Policy 24.03 D.4: "For applications filed after the fifteenth (15th) of the month, the case management system will assign at least a two (2)-month certification period."'
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-03/page-3
              excerpt: "at least a two (2)-month certification period"
    versions:
      - effective_from: '2022-02-01'
        formula: |-
          2
  - name: late_filing_day_of_month_threshold
    kind: parameter
    dtype: Integer
    source: 'Policy 24.03 D.4: "For applications filed after the fifteenth (15th) of the month".'
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-03/page-3
              excerpt: "filed after the fifteenth (15th) of the month"
    versions:
      - effective_from: '2022-02-01'
        formula: |-
          15
  - name: application_filed_after_fifteenth_of_month
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 'Policy 24.03 D.4.'
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-03/page-3
              excerpt: "applications filed after the fifteenth (15th) of the month"
    versions:
      - effective_from: '2022-02-01'
        formula: |-
          application_filing_day_of_month > late_filing_day_of_month_threshold
  - name: minimum_certification_period_months
    kind: derived
    entity: Household
    dtype: Integer
    period: Month
    source: 'Policy 24.03 D.4.'
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-03/page-3
              excerpt: "the case management system will assign at least a two (2)-month certification period"
    versions:
      - effective_from: '2022-02-01'
        formula: |-
          if application_filed_after_fifteenth_of_month: minimum_certification_period_months_for_late_filed_application else: 0
  - name: snap_action_delayed_pending_families_first_determination_prohibited
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 'Policy 24.03 E.2: "Action on the SNAP portion of the application shall not be delayed, or the application denied on grounds that the FF determination has not been made."'
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-03/page-3
              excerpt: "Action on the SNAP portion of the application shall not be delayed, or the application denied on grounds that the FF determination has not been made"
    versions:
      - effective_from: '2022-02-01'
        formula: |-
          joint_snap_and_families_first_application_filed
  - name: vary_snap_benefit_for_anticipated_families_first_payment
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 'Policy 24.03 E.3: "If the Eligibility Counselor can anticipate the amount and the date of receipt of FF payment but the payment will not be received until a subsequent month, the Eligibility Counselor shall vary the household''s SNAP benefit level according to the FF payment and notify the household."'
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-03/page-3
              excerpt: "can anticipate the amount and the date of receipt of FF payment but the payment will not be received until a subsequent month"
    versions:
      - effective_from: '2022-02-01'
        formula: |-
          families_first_payment_amount_can_be_anticipated
          and families_first_payment_date_can_be_anticipated
          and families_first_payment_received_in_subsequent_month
  - name: families_first_payment_treated_as_change_in_circumstances
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 'Policy 24.03 E.5: "If the amount or the month of receipt of the initial FF payment cannot be reasonably anticipated at the time of the SNAP eligibility determination, the payment shall be handled as a change in circumstances."'
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-03/page-3
              excerpt: "If the amount or the month of receipt of the initial FF payment cannot be reasonably anticipated ... the payment shall be handled as a change in circumstances"
    versions:
      - effective_from: '2022-02-01'
        formula: |-
          not families_first_payment_amount_can_be_anticipated
          or not families_first_payment_month_of_receipt_can_be_anticipated
  - name: retroactive_portion_of_initial_families_first_payment_disregarded_as_lump_sum
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 'Policy 24.03 E.4: "Portions of initial payments intended to retroactively cover a previous month shall be disregarded as a lump sum payment."'
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-03/page-3
              excerpt: "Portions of initial payments intended to retroactively cover a previous month shall be disregarded as a lump sum payment"
    versions:
      - effective_from: '2022-02-01'
        formula: |-
          initial_families_first_payment_includes_retroactive_portion_for_previous_month
  - name: new_snap_application_required_after_families_first_denial
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 'Policy 24.03 E.7: "A household whose FF application is denied shall not be required to file a new SNAP application..."'
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-03/page-3
              excerpt: "A household whose FF application is denied shall not be required to file a new SNAP application"
    versions:
      - effective_from: '2022-02-01'
        formula: |-
          not families_first_application_denied
