format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-14/page-9
  summary: '"YouthBuild Program Payments" are treated like WIOA payments, including
    on-the-job training earnings for individuals under age 19 under parental control
    and all income from other YouthBuild programs. "Non-Cash Items" are gains or benefits
    not in money payable directly to the household. Disaster income provisions exempt
    governmental home-restoration payments when misuse triggers a legal sanction,
    and NFIP flood-mitigation payments "shall not be counted as income or resources."
    Military combat-zone additional pay is excluded, while all other military pay
    is included. Filipino Veterans Equity Compensation payments and ABLE accounts
    are excluded as income. SNAP uses a prospective method of determining eligibility
    and allotment for available household income.'
  deferred_outputs:
  - output: us-tn:policies/dhs/snap/24-14/page-9#payment_excluded_from_snap_income
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
rules:
