format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-6
  summary: |-
    TDHS has thirty (30) days (unless the household is entitled to expedited service) to determine SNAP eligibility. The household must report any change in their circumstances within ten (10) days of the date the change becomes known to the household. However, cases assigned to Simplified Reporting are not subject to regular reporting requirements.
rules:
  - name: snap_eligibility_determination_days
    kind: parameter
    dtype: Integer
    source: TN DHS SNAP Policy 24.02 page 6, item 8
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-6
              excerpt: "TDHS has thirty (30) days (unless the household is entitled to expedited service) to determine SNAP eligibility"
    versions:
      - effective_from: '2022-12-01'
        formula: |-
          30
  - name: snap_change_reporting_days
    kind: parameter
    dtype: Integer
    source: TN DHS SNAP Policy 24.02 page 6, item 9
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-6
              excerpt: "to report any change in their circumstances within ten (10) days of the date the change becomes known to the household"
    versions:
      - effective_from: '2022-12-01'
        formula: |-
          10
  - name: snap_household_subject_to_change_reporting
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: TN DHS SNAP Policy 24.02 page 6, item 9
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-02/page-6
              excerpt: "cases assigned to Simplified Reporting are not subject to regular reporting requirements"
    versions:
      - effective_from: '2022-12-01'
        formula: |-
          not household_is_assigned_to_simplified_reporting
