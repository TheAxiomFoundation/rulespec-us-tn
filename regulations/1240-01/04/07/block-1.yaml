format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/regulation/1240-01/04/07/block-1
  summary: |-
    The fair market value of liquid resources and the fair market value less encumbrances (equity) of non-liquid resources are used to determine the total countable resources available to the HH/AG.
rules:
  - name: total_countable_resources
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Tenn. Comp. R. & Regs. 1240-01-04-.07
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-tn/regulation/1240-01/04/07/block-1
              excerpt: "The fair market value of liquid resources and the fair market value less encumbrances (equity) of non-liquid resources are used to determine the total countable resources available to the HH/AG."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          liquid_resources_fair_market_value + max(0, non_liquid_resources_fair_market_value - non_liquid_resources_encumbrances)
