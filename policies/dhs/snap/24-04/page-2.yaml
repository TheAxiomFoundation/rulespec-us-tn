format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-04/page-2
  summary: |-
    SNAP Household Composition (Policy 24.04, page 2 of 5). C. Purchasing and Preparing Meals: persons who purchase and prepare meals in common are treated as one HH unless eligible for separate HH status. D. Separate Household Status: lists who may qualify, including siblings not under parental control, children 22 and over living with parents, non-parent/sibling cohabitants, disabled persons unable to purchase their own food, and elderly and disabled individuals (and spouse) living with others when combined gross income of the others does not exceed 165% of the poverty level.
rules:
  - name: separate_household_others_income_limit_percentage_of_poverty
    kind: parameter
    dtype: Rate
    source: Policy 24.04 D.2.e.ii (165% of the poverty level)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-04/page-2
              excerpt: "does not exceed 165% of the poverty level"
    versions:
      - effective_from: '2019-03-01'
        formula: |-
          1.65
  - name: separate_household_age_threshold_child_with_parents
    kind: parameter
    dtype: Integer
    source: Policy 24.04 D.2.b (Children twenty-two (22) and over)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-04/page-2
              excerpt: "Children twenty-two (22) and over who live with their parents and purchase and prepare separately"
    versions:
      - effective_from: '2019-03-01'
        formula: |-
          22
  - name: purchase_and_prepare_meals_in_common
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Policy 24.04 C.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-04/page-2
              excerpt: "all persons who purchase and prepare their meals in common are treated as one HH"
    versions:
      - effective_from: '2019-03-01'
        formula: |-
          person_purchases_and_prepares_meals_in_common_with_others
          and not person_eligible_for_separate_household_status
  - name: sibling_not_under_parental_control_separate_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Policy 24.04 D.2.a
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-04/page-2
              excerpt: "Siblings (not under parental control) who live together and who purchase and prepare separately"
    versions:
      - effective_from: '2019-03-01'
        formula: |-
          person_is_sibling_living_with_other_siblings
          and not person_is_under_parental_control
          and person_purchases_and_prepares_meals_separately
  - name: child_living_with_parents_separate_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Policy 24.04 D.2.b
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-04/page-2
              excerpt: "Children twenty-two (22) and over who live with their parents and purchase and prepare separately"
    versions:
      - effective_from: '2019-03-01'
        formula: |-
          person_lives_with_parents
          and person_age >= separate_household_age_threshold_child_with_parents
          and person_purchases_and_prepares_meals_separately
  - name: non_parent_non_sibling_cohabitant_separate_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Policy 24.04 D.2.c
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-04/page-2
              excerpt: "Individuals other than parents and siblings who share living quarters with a SNAP HH, but who do not purchase and prepare meals with that HH"
    versions:
      - effective_from: '2019-03-01'
        formula: |-
          person_shares_living_quarters_with_snap_household
          and not person_is_parent_or_sibling_of_snap_household_member
          and not person_purchases_and_prepares_meals_with_snap_household
  - name: disabled_person_arranged_separate_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Policy 24.04 D.2.d
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-04/page-2
              excerpt: "A person who is disabled and unable to purchase their own food but who has arranged to have their food purchased and prepared separately from those with whom they live"
    versions:
      - effective_from: '2019-03-01'
        formula: |-
          person_is_disabled
          and person_unable_to_purchase_own_food
          and person_has_arranged_food_purchased_and_prepared_separately
  - name: elderly_and_disabled_separate_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Policy 24.04 D.2.e
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-04/page-2
              excerpt: "An elderly and disabled individual (and spouse of that individual) living with others when: i. the elderly and disabled individual is unable to purchase and prepare his/her own meals with others; and ii. the combined gross income of the others ... does not exceed 165% of the poverty level"
    versions:
      - effective_from: '2019-03-01'
        formula: |-
          person_is_elderly_and_disabled
          and person_lives_with_others
          and person_unable_to_purchase_and_prepare_own_meals_with_others
          and combined_gross_income_of_others_in_household <= separate_household_others_income_limit_percentage_of_poverty * federal_poverty_level_for_others_household_size
  - name: person_eligible_for_separate_household_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Policy 24.04 D.1-D.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-04/page-2
              excerpt: "Individuals who live together but purchase and prepare their meals separately may be eligible for separate HH status"
    versions:
      - effective_from: '2019-03-01'
        formula: |-
          sibling_not_under_parental_control_separate_status
          or child_living_with_parents_separate_status
          or non_parent_non_sibling_cohabitant_separate_status
          or disabled_person_arranged_separate_status
          or elderly_and_disabled_separate_status
