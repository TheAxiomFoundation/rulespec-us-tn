  summary: |-
    SNAP General Administrative Procedures (Policy 24.01, page 2 of 6): describes purposes of confidentiality safeguards, enumerates categories of information considered confidential (case records; reports of investigations and medical investigations; names and addresses of Family Assistance participants; other information known to the agency in connection with Family Assistance; personal information on applications and forms), and lists exceptions where confidential information may be disclosed subject to Office of General Counsel approval (law enforcement for fraud/child abuse; child support collection for TANF; service providers for abusive/neglectful parents; TDLWD for work registration; child's guardian ad litem; total expenditure of funds). No computable benefit, amount, threshold, rate, eligibility test, or other operative numeric/legal condition is stated; the text is administrative confidentiality policy.
