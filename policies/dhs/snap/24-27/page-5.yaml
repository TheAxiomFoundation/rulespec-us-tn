format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-27/page-5
  summary: |-
    Students meeting student eligibility criteria during the regular school year remain exempt from work registration during summer months if they continue meeting criteria. Ineligible students may become eligible at any time if they meet one eligibility criterion. Students who lose enrollment status, or do not intend to register for the next normal school session excluding summer school, lose student status. Acceptable verification examples include school records, Financial Aid Office statements, class schedules, tuition/fee receipts, disability benefit proof, physician or psychologist statements, Rehabilitation Services approval, and applicant/recipient statements for educational income amounts.
rules:
  - name: summer_work_registration_exemption_continues
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.27, page 5, H.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-27/page-5
    versions:
      - effective_from: '2019-05-01'
        formula: |-
          month_is_summer_month
          and met_student_eligibility_criteria_during_regular_school_year
          and continues_to_meet_student_eligibility_criteria_during_summer

  - name: ineligible_student_can_become_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.27, page 5, H.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-27/page-5
    versions:
      - effective_from: '2019-05-01'
        formula: |-
          student_is_ineligible
          and meets_one_student_eligibility_criterion

  - name: student_status_lost
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.27, page 5, H.4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-27/page-5
    versions:
      - effective_from: '2019-05-01'
        formula: |-
          student_lost_enrollment_status
          or does_not_intend_to_register_for_next_normal_school_session_excluding_summer_school

  - name: school_enrollment_verification_acceptable
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.27, page 5, I.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-27/page-5
    versions:
      - effective_from: '2019-05-01'
        formula: |-
          school_enrollment_verified_by_school_records
          or school_enrollment_verified_by_financial_aid_office_statement
          or school_enrollment_verified_by_class_schedule
          or school_enrollment_verified_by_tuition_and_mandatory_fee_receipt

  - name: disability_verification_for_student_eligibility_acceptable
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.27, page 5, I.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-27/page-5
    versions:
      - effective_from: '2019-05-01'
        formula: |-
          disability_verified_by_bendex_sdx_or_award_letter
          or disability_verified_by_physician_or_licensed_certified_psychologist_statement
          or disability_verified_by_department_of_rehabilitation_services_approval

  - name: educational_income_amount_statement_verification_acceptable
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SNAP Policy 24.27, page 5, I.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-27/page-5
    versions:
      - effective_from: '2019-05-01'
        formula: |-
          applicant_or_recipient_statement_verifies_unearned_educational_income_amount
