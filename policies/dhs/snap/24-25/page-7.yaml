format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-7
  summary: 'Policy 24.25 Effective Date: 02/15/2023. "If the household fails to provide
    the verification or provides verifications that change its benefits, the notice
    of adverse action is not required." "It will be considered that the household
    has reapplied timely if the application is received by the 15th of the last month
    of certification..." "The household must complete the interview on or after the
    date of application and provide all required verification timely in order to receive
    uninterrupted benefits..." The department accepts an application "as long as it
    is signed and contains a legible name and address," and SSI-only households may
    apply at the SSA office.'
  deferred_outputs:
  - output: us-tn:policies/dhs/snap/24-25/page-7#adverse_action_notice_not_required
    reason: Generated rule used a local name that collides with a sibling RuleSpec
      export. This output is deferred until it can be encoded with a semantic branch-specific
      name without creating ambiguous sibling imports.
rules:
- name: timely_reapplication_day_of_month
  kind: parameter
  dtype: Integer
  period: Month
  source: Policy 24.25, Recertification 1(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-7
          excerpt: application is received by the 15th of the last month of certification
  versions:
  - effective_from: '2023-02-15'
    formula: '15'
- name: recertification_application_timely
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: Policy 24.25, Recertification 1(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-7
          excerpt: received by the 15th of the last month of certification
  versions:
  - effective_from: '2023-02-15'
    formula: application_received_day_of_last_certification_month <= timely_reapplication_day_of_month
- name: uninterrupted_recertification_benefits_process_met
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: Policy 24.25, Recertification 1(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-7
  versions:
  - effective_from: '2023-02-15'
    formula: 'recertification_application_timely

      and recertification_interview_completed_on_or_after_application_date

      and required_verification_provided_timely'
- name: recertification_application_must_be_accepted
  kind: derived
  entity: Household
  dtype: Judgment
  period: Month
  source: Policy 24.25, Recertification 1(d)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-tn/manual/dhs/snap/24-25/page-7
  versions:
  - effective_from: '2023-02-15'
    formula: 'application_signed

