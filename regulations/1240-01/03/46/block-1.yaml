format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/regulation/1240-01/03/46/block-1
  summary: |-
    A household member who voluntarily quits his/her job of at least twenty (20) hours per week or voluntarily reduces his/her work hours to less than thirty (30) hours per week, without good cause, is subject to disqualification from participation in the Food Stamp Program.
rules:
  - name: voluntary_quit_minimum_hours_per_week
    kind: parameter
    dtype: Integer
    source: Tenn. Comp. R. & Regs. 1240-01-03-.46
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/regulation/1240-01/03/46/block-1
              excerpt: "voluntarily quits his/her job of at least twenty (20) hours per week"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          20
  - name: voluntary_reduction_hours_per_week_threshold
    kind: parameter
    dtype: Integer
    source: Tenn. Comp. R. & Regs. 1240-01-03-.46
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-tn/regulation/1240-01/03/46/block-1
              excerpt: "voluntarily reduces his/her work hours to less than thirty (30) hours per week"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30
  - name: member_subject_to_food_stamp_disqualification_for_voluntary_quit_or_reduction
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Tenn. Comp. R. & Regs. 1240-01-03-.46
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/regulation/1240-01/03/46/block-1
              excerpt: "is subject to disqualification from participation in the Food Stamp Program"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (
            (
              member_voluntarily_quit_job
              and prior_job_hours_per_week >= voluntary_quit_minimum_hours_per_week
            )
            or
            (
              member_voluntarily_reduced_work_hours
              and current_work_hours_per_week < voluntary_reduction_hours_per_week_threshold
            )
          )
          and not member_had_good_cause
