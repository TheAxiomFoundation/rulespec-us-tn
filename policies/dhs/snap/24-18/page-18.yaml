format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-18
  summary: |-
    Definitions/Acronyms: BUA means Basic Utility Allowance. Disabled is defined separately for FS work registration, special SNAP income and deduction considerations, and separate household status of elderly individuals living with others. Elderly means a person 60 years of age or older, or 59 on the date of application and 60 before the end of the month of application.
rules:
  - name: disabled_for_snap_work_registration
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: "Policy 24.18, Definitions/Acronyms, Disabled 1. FS (Work Registration)"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-18
    versions:
      - effective_from: '2018-09-17'
        formula: |-
          mental_or_physical_impairment_renders_incapable_of_gainful_employment_permanently_or_temporarily

  - name: snap_work_registration_disability_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: "Policy 24.18, Definitions/Acronyms, Disabled 1. FS (Work Registration)"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-18
    versions:
      - effective_from: '2018-09-17'
        formula: |-
          disabled_for_snap_work_registration

  - name: disabled_for_snap_special_income_and_deduction_consideration
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: "Policy 24.18, Definitions/Acronyms, Disabled 2. FS (Disability for Entitlement to Special Consideration Regarding Medical Deductions, Excess Shelter Deductions, Use of Net Income Standards, and Separate Household Status for Parent/Child and Siblings)"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-18
    versions:
      - effective_from: '2018-09-17'
        formula: |-
          receives_disability_or_blindness_payments_under_social_security_act_titles_i_ii_x_xiv_or_xvi
          or receives_federally_or_state_administered_supplemental_benefits_under_public_law_93_66_section_212_a
          or receives_governmental_disability_retirement_benefits_for_disability_permanent_under_social_security_act_section_221_i
          or veteran_receives_va_total_disability_benefits_or_needs_regular_aid_and_attendance_or_is_permanently_housebound
          or disabled_surviving_spouse_of_veteran_needs_regular_aid_and_attendance_or_is_permanently_housebound_by_va_standards
          or disabled_surviving_child_of_veteran_permanently_incapable_of_self_support_by_va_standards
          or surviving_spouse_or_child_of_veteran_entitled_to_va_death_compensation_or_pension_and_has_permanent_disability_under_social_security_act
          or receives_railroad_retirement_act_section_2_a_1_iv_annuity_and_railroad_retirement_board_medicare_eligible
          or receives_railroad_retirement_act_section_2_a_i_v_annuity_and_disabled_under_title_xvi_ssi_criteria
          or receives_interim_or_presumptive_payments_pending_ssi
          or receives_medicaid_based_on_disability_under_title_xix

  - name: disabled_for_snap_elderly_separate_household_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: "Policy 24.18, Definitions/Acronyms, FS (Disability for Determining Eligibility of Separate Household Status of Elderly Individuals Living With Others and Not Purchasing Food and Preparing Meals Separately from Others)"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-18
    versions:
      - effective_from: '2018-09-17'
        formula: |-
          disability_considered_permanent_under_social_security_act
          or non_disease_related_severe_permanent_disability_prevents_purchasing_and_preparing_own_food

  - name: elderly_for_snap
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: "Policy 24.18, Definitions/Acronyms, Elderly"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-tn/manual/dhs/snap/24-18/page-18
              excerpt: "sixty (60) years of age or older or is fifty nine (59) years old on the date of application and will be sixty (60) before the end of the month of application"
    versions:
      - effective_from: '2018-09-17'
        formula: |-
          person_is_sixty_years_of_age_or_older
          or person_is_fifty_nine_on_application_date_and_will_be_sixty_before_end_of_application_month
